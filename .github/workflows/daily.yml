name: 每日儀表板更新

on:
  schedule:
    - cron: '0 2 * * *'   # 台灣時間每天早上 10:00（UTC 02:00）
  workflow_dispatch:        # 手動觸發

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Run pipeline
        env:
          META_TOKEN: ${{ secrets.META_TOKEN }}
        run: |
          # 週一（weekday=1）加 --weekly，更新近 90 天 insights
          DAY=$(date +%u)
          if [ "$DAY" = "1" ]; then
            echo "週一：執行 weekly 模式（90天 insights）"
            python pipeline.py --weekly
          else
            echo "平日：執行 incremental 模式（28天 insights）"
            python pipeline.py
          fi

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html data/
          git diff --cached --quiet || git commit -m "update $(date +'%Y-%m-%d')"
          git push
