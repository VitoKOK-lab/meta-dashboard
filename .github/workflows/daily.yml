name: 每日儀表板更新

on:
  schedule:
    - cron: '0 1,3,5,7,9,11,13 * * *'  # 台灣時間 09:00–21:00，每 2 小時執行一次
    - cron: '0 16 * * 0'               # 台灣時間週一 00:00（UTC 週日 16:00），weekly 90天模式
    - cron: '0 18 1,20 * *'            # 每月 1 日和 20 日 02:00 台灣，拉 5 年歷史影片
  workflow_dispatch:
    inputs:
      mode:
        description: '執行模式'
        required: false
        default: 'incremental'
        type: choice
        options: [incremental, weekly, full, history]

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Run pipeline
        env:
          META_TOKEN: ${{ secrets.META_TOKEN }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            MODE="${{ github.event.inputs.mode }}"
          else
            DOW=$(date -u +%u)
            HOUR=$(date -u +%H)
            DOM=$(date -u +%d)
            # 每月 1 日和 20 日 UTC 18:00 = 台灣 02:00
            if { [ "$DOM" = "01" ] || [ "$DOM" = "20" ]; } && [ "$HOUR" = "18" ]; then
              MODE="history"
            # 週日 16:00 UTC = 週一 00:00 台灣時間
            elif [ "$DOW" = "7" ] && [ "$HOUR" = "16" ]; then
              MODE="weekly"
            else
              MODE="incremental"
            fi
          fi

          if [ "$MODE" = "history" ]; then
            echo "每月歷史模式：抓取 5 年內所有影片"
            python pipeline.py --history
          elif [ "$MODE" = "weekly" ]; then
            echo "週一午夜：執行 weekly 模式（90天 insights）"
            python pipeline.py --weekly
          elif [ "$MODE" = "full" ]; then
            echo "執行 full 重建模式"
            python pipeline.py --full
          else
            echo "執行 incremental 模式（28天 insights）"
            python pipeline.py
          fi

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html data/videos.json data/archive.json data/follower_history.json
          git diff --cached --quiet || git commit -m "update $(date +'%Y-%m-%d')"
          git push
