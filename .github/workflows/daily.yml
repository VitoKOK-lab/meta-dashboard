name: 每日儀表板更新

on:
  schedule:
    - cron: '0 2 * * 2-7'   # 台灣時間每天早上 10:00（UTC 02:00），週二到週日
    - cron: '0 16 * * 0'    # 台灣時間週一 00:00（UTC 週日 16:00），執行 weekly 90天模式
  workflow_dispatch:
    inputs:
      mode:
        description: '執行模式'
        required: false
        default: 'incremental'
        type: choice
        options: [incremental, weekly, full]

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Run pipeline
        env:
          META_TOKEN: ${{ secrets.META_TOKEN }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            MODE="${{ github.event.inputs.mode }}"
          else
            # 週日 16:00 UTC = 週一 00:00 台灣時間
            DOW=$(date -u +%u)
            HOUR=$(date -u +%H)
            if [ "$DOW" = "7" ] && [ "$HOUR" = "16" ]; then
              MODE="weekly"
            else
              MODE="incremental"
            fi
          fi

          if [ "$MODE" = "weekly" ]; then
            echo "週一午夜：執行 weekly 模式（90天 insights）"
            python pipeline.py --weekly
          elif [ "$MODE" = "full" ]; then
            echo "執行 full 重建模式"
            python pipeline.py --full
          else
            echo "執行 incremental 模式（28天 insights）"
            python pipeline.py
          fi

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html data/
          git diff --cached --quiet || git commit -m "update $(date +'%Y-%m-%d')"
          git push
