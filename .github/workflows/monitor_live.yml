name: 直播監控（IG）

on:
  workflow_dispatch:

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 360   # 最長 6 小時（2小時直播綽綽有餘）
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: 監控 IG 直播
        env:
          META_TOKEN: ${{ secrets.META_TOKEN }}
        run: python pipeline.py --monitor-live

      - name: Commit 直播記錄
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull origin main
          git add data/lives.json index.html
          git diff --cached --quiet || git commit -m "直播監控：記錄 IG 直播數據 $(date +'%Y-%m-%d')"
          git push
