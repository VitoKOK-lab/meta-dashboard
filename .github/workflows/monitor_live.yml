name: 直播後立即更新

on:
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: 執行增量更新（抓最新直播成效）
        env:
          META_TOKEN: ${{ secrets.META_TOKEN }}
        run: python pipeline.py

      - name: Commit 並推送
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html data/videos.json data/archive.json data/follower_history.json data/lives.json data/daily_snapshots.csv
          git diff --cached --quiet || git commit -m "直播後更新 $(date +'%Y-%m-%d %H:%M')"
          git push
