  var prevCom=lastMonthSame.filter(function(v){return v.type==='commerce'&&v.plays>0;});
  var comCR=thisCom.length?thisCom.reduce(function(s,v){return s+(v.comments||0);},0)/thisCom.reduce(function(s,v){return s+(v.plays||0);},0)*100:0;
  var prevComCR=prevCom.length?prevCom.reduce(function(s,v){return s+(v.comments||0);},0)/prevCom.reduce(function(s,v){return s+(v.plays||0);},0)*100:0;
  var thisFbNewF=thisMonth.filter(function(v){return v.platform==='fb';}).reduce(function(s,v){return s+(v.newFollowers||0);},0);
  var prevFbNewF=lastMonthSame.filter(function(v){return v.platform==='fb';}).reduce(function(s,v){return s+(v.newFollowers||0);},0);
  var prevFbCount=lastMonthSame.filter(function(v){return v.platform==='fb';}).length;
  // 流量型數字
  var thisTrPlays=thisMonth.filter(function(v){return v.type==='traffic';}).reduce(function(s,v){return s+(v.plays||0);},0);
  var prevTrPlays=lastMonthSame.filter(function(v){return v.type==='traffic';}).reduce(function(s,v){return s+(v.plays||0);},0);
  var thisTrShares=thisMonth.filter(function(v){return v.type==='traffic';}).reduce(function(s,v){return s+(v.shares||0);},0);
  var prevTrShares=lastMonthSame.filter(function(v){return v.type==='traffic';}).reduce(function(s,v){return s+(v.shares||0);},0);

  document.getElementById('summaryCenter').innerHTML =

    // 行動清單
    '<div class="cmd-card" style="margin-bottom:14px">'
    +'<div class="cmd-card-label">本週行動清單</div>'
    +actions.map(function(a){return '<div class="action-item"><span class="action-icon">'+actionIcon[a.t]+'</span><span>'+a.msg+'</span></div>';}).join('')
    +'</div>'

    // 頻道近況 + 本月效率
    +'<div class="cmd-row-2">'
    +'<div class="cmd-card"><div class="cmd-card-label">頻道近況 · 近30天</div>'
    +'<div class="health-emoji">'+hEmoji+'</div>'
    +'<div class="health-sentence" style="color:'+hColor+'">'+hSentence+'</div>'
    +'<div class="health-pct" style="color:'+hColor+'">'+(hPct>=0?'+':'')+hPct+'%</div>'
    +'<div class="health-meta">平均分 <strong>'+avgR.toFixed(0)+'</strong>（前30天 '+avgP.toFixed(0)+'）</div>'
    +'</div>'
    +'<div class="cmd-card"><div class="cmd-card-label">本月產出效率</div>'
    +'<div class="health-emoji">'+(qualRate>=30?'🎯':qualRate>=15?'📊':'😬')+'</div>'
    +'<div class="eff-num" style="color:'+qualColor+'">'+qualRate+'%</div>'
    +'<div class="health-sentence" style="color:'+qualColor+'">優質片比例</div>'
    +'<div class="eff-sub">本月 '+thisMonth.length+' 支，'+thisQual.length+' 支達65分以上<br>'+(prevQualRate>0?'上月 '+prevQualRate+'%，'+(qualTrend>=0?'▲ 進步':'▼ 下滑')+' '+Math.abs(qualTrend)+'%':'上月資料累積中')+'</div>'
    +'</div></div>'

    // 發片節奏 + 主題勝率
    +'<div class="cmd-row-2">'
    +'<div class="cmd-card"><div class="cmd-card-label">發片節奏 · 近 8 週</div>'
    +'<div style="font-size:14px;color:var(--muted);margin-bottom:10px">'+cadenceSummary+'</div>'
    +'<div class="cadence-chart">'+wkData.map(function(x,i){var h=Math.max(Math.round(x.cnt/maxWk*52),x.cnt>0?6:2);return '<div class="cadence-bar-col"><span class="cadence-num">'+(x.cnt||'·')+'</span><div class="cadence-bar-fill '+(i===7?'cur':'past')+'" style="height:'+h+'px"></div></div>';}).join('')+'</div>'
    +'<div style="display:flex;gap:5px">'+wkData.map(function(x){return '<div class="cadence-lbl" style="flex:1">'+x.label+'</div>';}).join('')+'</div>'
    +'</div>'
    +'<div class="cmd-card"><div class="cmd-card-label">主題勝率 · 詳細看「關鍵字」分頁</div>'
    +(kwTop.length===0?'<div style="color:var(--muted);font-size:14px;padding:10px 0">資料不足</div>'
      :kwTop.slice(0,6).map(function(x,xi){var barW=Math.round(x.avg/maxAvg*100);var sc=avgGradeCol(x.avg);return '<div class="winrate-row"><span class="winrate-kw'+(x.kw[0]==='#'?' kw-hash':'')+'">'+x.kw+(xi===0?'<span style="font-size:12px;background:#fff3cd;color:#856404;border-radius:3px;padding:1px 5px;margin-left:5px;font-weight:700">🏆</span>':'')+'</span><div class="winrate-bar-wrap"><div class="winrate-bar-fill" style="width:'+barW+'%;background:'+sc+'"></div></div><span class="winrate-score" style="color:'+sc+';font-weight:700">'+avgGrade(x.avg)+'</span><span class="winrate-cnt">'+x.cnt+'支</span></div>';}).join(''))
    +'</div></div>'

    // 詳細數字（優化：流量+帶貨都顯示）
    +'<div class="mini-section-divider">本月數字</div>'
    +'<div class="mini-kpi-row">'
    +miniKpiCell('📈 流量影片播放',fmtNum(thisTrPlays),momStr(thisTrPlays,prevTrPlays),'本月累計')
    +miniKpiCell('🔁 流量影片轉發',fmtNum(thisTrShares),momStr(thisTrShares,prevTrShares),'傳播力指標')
    +miniKpiCell('🛍 帶貨影片播放',fmtNum(thisComPlays),momStr(thisComPlays,prevComPlays),'本月累計')
    +miniKpiCell('💬 帶貨留言率',comCR.toFixed(2)+'%',momRateStr(comCR,prevComCR),'購買意圖訊號')
    +'</div>'
    +'<div class="mini-kpi-row" style="margin-top:8px">'
    +miniKpiCell('🔖 IG 收藏數',fmtNum(thisIgSaves),momStr(thisIgSaves,prevIgSaves),'想買但未買')
    +miniKpiCell('👥 FB 新增粉絲','+'+(thisFbNewF||0),momStr(thisFbNewF,prevFbNewF,prevFbCount===0?'本月首次記錄':''),'本月新追蹤')
    +miniKpiCell('📊 近30天均分',avgR.toFixed(0)+'分',(hPct>=0?'▲ +':'▼ ')+Math.abs(hPct)+'% vs 前30天','頻道健康')
    +miniKpiCell('🎯 優質片比例',qualRate+'%',(qualTrend>=0?'▲ +':'▼ ')+Math.abs(qualTrend)+'% vs 上月','分數≥65分')
    +'</div>'

    +'<details style="margin-top:28px">'
    +'<summary style="font-size:13px;color:var(--muted);cursor:pointer;user-select:none;list-style:none;display:flex;align-items:center;gap:6px"><span style="font-size:16px">📖</span> 指標說明（點擊展開）</summary>'
    +'<div style="margin-top:12px;font-size:13px;line-height:1.9;color:var(--ink);background:var(--white);border:1px solid var(--border);border-radius:var(--r);padding:16px 18px">'
    +'<strong>📊 分數說明（頻道相對制）</strong><br>分數是跟自己頻道內同類型影片比，50分 = 中位數，65分以上 = 前25%（優質），80分以上 = 前10%（強）<br>互動率計分需至少30次播放才有效，避免小樣本假高分<br><br>'
    +'<strong>🛍 帶貨型</strong>：留言為主（50%）+ IG儲存25% + 觸及 — 播放量只佔5-10%<br>'
    +'<strong>📈 流量型</strong>：播放量35% + 轉發30% + 留言20% + 觸及15%<br><br>'
    +'<strong>🔖 忠實度</strong>：（留言+轉發）÷ 播放，🟢前30% 🟡正常 🔴後30%'
    +'</div></details>'
    +'';
}

// ── 題材策略 ──────────────────────────────────────────────────────────────
function initTheme() {
  var all = STATIC_DATA.videos || [];
  var STOP = new Set(['的','了','我','你','他','她','它','們','在','是','有','和','也','但','都','到','就','這','那',
    '什麼','一個','可以','沒有','因為','所以','如果','不是','可是','還是','只是','還有','就是','其實',
    '現在','已經','非常','一起','大家','真的','這個','那個','一下','一直','好像','感覺','覺得']);

  // ── 內容分類：從觀眾的角度定義 ────────────────────────────────────────────
  var CATEGORIES = [
    { id:'gem',    emoji:'💎', label:'珠寶知識',
      viewer:'想了解這顆石頭，判斷值不值得買',
      // 用具體石頭名，不用「珠寶」(每支都有)
      seeds:['海藍寶','拉利瑪','祖母綠','透輝石','翡翠','鑽石','珍珠','水晶','碧璽','月光石','鈦晶',
             '紫龍晶','查羅','克拉','貓眼','剛玉','藍寶石','紅寶石','戒指','吊墜','鑲嵌','玉石','猜猜'] },
    { id:'deal',   emoji:'🛒', label:'限量優惠',
      viewer:'看到好東西，想用划算的價格入手',
      // 移除「寵粉/連結/留言/下單」(每支都有)，只留真正促銷詞
      seeds:['限量','市價','特價','加送','贈送','折扣','搶購','只要','火速'] },
    { id:'couple', emoji:'💑', label:'異國戀情',
      viewer:'對跨文化感情好奇，想找到共鳴',
      seeds:['異國婚姻','老外','外國人','AA制','婚姻','老公','老婆','另一半','求婚','交往','戀愛','嫁給','鑽戒','婚戒'] },
    { id:'life',   emoji:'🌟', label:'人生智慧',
      viewer:'想被激勵、找故事，尋找前進的力量',
      seeds:['人生','翻身','大運','高手','格局','成長','勵志','智慧','眼光','痛苦','翻盤','命運',
             '謀士','帝王','帝','王之','天下','勇氣','止損','秘密','覺醒','逆轉','女老闆','披荊','斬棘'] },
    { id:'biz',    emoji:'💼', label:'商業觀點',
      viewer:'想了解珠寶商機，有創業或投資念頭',
      seeds:['商業思維','創業','加盟','入局','生意','老闆','合作','商機','職場','投資','加盟店','珠寶店老闆'] },
    { id:'family', emoji:'🏠', label:'家庭關係',
      viewer:'對家庭議題有感，想找情緒出口',
      seeds:['婆媳','家庭','孩子','育兒','媽媽','爸爸','小孩','DNA入侵','教育','婆婆','媳婦'] },
  ];

  function extractKw(v) {
    var text = (v.description || v.caption || '');
    var hashtags = [];
    text = text.replace(/#([^\s#，。！？、；：\n]+)/g, function(m, tag) { hashtags.push('#'+tag); return ' '; });
    var words = text.split(/[\s，。！？、；：「」『』【】（）(),.!?;:\n]+/).filter(Boolean);
    var result = [], seen = new Set();
    words.concat(hashtags).forEach(function(w) {
      w = w.trim(); if (!w) return;
      var isH = w[0]==='#';
      if (!isH && (w.length<2 || STOP.has(w) || /^\d+$/.test(w))) return;
      if (!seen.has(w)) { seen.add(w); result.push(w); }
    });
    return result;
  }

  function arrAvg(arr) { return arr.length ? arr.reduce(function(s,x){return s+x;},0)/arr.length : 0; }

  // ── 分類匹配：找出影片最符合哪個分類 ───────────────────────────────────────
  function matchCategory(v) {
    var text = (v.description || v.caption || '');
    var best = null, bestN = 0;
    CATEGORIES.forEach(function(cat) {
      var n = 0;
      cat.seeds.forEach(function(s) { if (text.indexOf(s) >= 0) n++; });
      if (n > bestN) { bestN = n; best = cat.id; }
    });
    return bestN > 0 ? best : 'other';
  }

  // ── 建立分類統計 ────────────────────────────────────────────────────────────
  function buildCategoryData() {
    var cd = {};
    CATEGORIES.forEach(function(cat) {
      cd[cat.id] = { cat:cat, vids:[], scores:[], recent:[], prev:[], plays:[], lastAge:9999 };
    });
    all.forEach(function(v) {
      var cid = matchCategory(v);
      if (!cd[cid]) return;
      var age = daysBetween(v.created_time);
      var sn  = scoreNum(v);
      var d   = cd[cid];
      d.vids.push(v);
      // 只有有實際播放數據才計入分數，避免 0 分拉低平均
      if (sn > 0) {
        d.scores.push(sn);
        if (age <= 30) d.recent.push(sn);
        else if (age <= 60) d.prev.push(sn);
      }
      if (v.plays > 0) d.plays.push(v.plays);
      if (age < d.lastAge) d.lastAge = age;
    });
    return cd;
  }

  function catTrend(d) {
    if (!d.prev.length) return '<span class="trend-pill t-new">新</span>';
    if (!d.recent.length) return '<span class="trend-pill t-new">近期無片</span>';
    var pct = arrAvg(d.prev) > 0 ? Math.round((arrAvg(d.recent)-arrAvg(d.prev))/arrAvg(d.prev)*100) : 0;
    if (pct >=  8) return '<span class="trend-pill t-up">↑ +'+pct+'%</span>';
    if (pct <= -8) return '<span class="trend-pill t-down">↓ '+pct+'%</span>';
    return '<span class="trend-pill t-flat">→ 持平</span>';
  }

  // ── 渲染分類卡片 ────────────────────────────────────────────────────────────
  function renderCategoryGrid(cd) {
    var html = '<div class="cat-grid">';
    CATEGORIES.forEach(function(cat) {
      var d = cd[cat.id];
      if (!d || d.vids.length < 2) return;
      var avg      = d.scores.length ? arrAvg(d.scores) : null;
      var grade    = avg !== null ? avgGrade(avg) : '—';
      var gradeCol = avg !== null ? avgGradeCol(avg) : 'var(--muted)';
      var avgPlays = d.plays.length ? Math.round(arrAvg(d.plays)) : 0;
      var overdue  = d.lastAge >= 21 && d.lastAge < 9999 && avg !== null && avg >= 55;
      var lastStr  = d.lastAge < 9999 ? d.lastAge + '天前' : '—';
      var trend    = catTrend(d);

      // Top 6 影片（按分數排序）
      var top6 = d.vids.slice()
        .filter(function(v){ return v.plays > 0; })
        .sort(function(a,b){ return (b.score||0)-(a.score||0); })
        .slice(0, 6);
      var top6Html = top6.map(function(v, i) {
        var title = truncTitle(v.description||v.caption||'', 30);
        var g = scoreGrade(v);
        var gc = scoreCol(v);
        var cr = v.plays > 0 ? ((v.comments||0)/v.plays*100).toFixed(1) : '0.0';
        return '<div class="cat-vid-row">'
          + '<span class="cat-vid-rank">'+(i+1)+'</span>'
          + '<span class="cat-vid-title">'+title+'</span>'
          + '<span class="cat-vid-grade" style="color:'+gc+'">'+g+'</span>'
          + '<span class="cat-vid-plays">'+fmtNum(v.plays||0)+'播</span>'
          + '<span class="cat-vid-cr">'+cr+'%留言</span>'
          + '</div>';
      }).join('');

      html += '<div class="cat-card'+(overdue?' cat-ready':'')+'" onclick="toggleCatDetail(\''+cat.id+'\',this)" style="cursor:pointer">'
        + '<div class="cat-head">'
        + '<span class="cat-emoji">'+cat.emoji+'</span>'
        + '<div style="flex:1;min-width:0">'
        + '<div class="cat-label">'+cat.label+'</div>'
        + '<div class="cat-viewer">觀眾：'+cat.viewer+'</div>'
        + '</div>'
        + '<div class="cat-score-wrap">'
        + '<div class="cat-score" style="color:'+gradeCol+'">'+grade+'</div>'
        + '<div class="cat-score-lbl">均分</div>'
        + '</div>'
        + '</div>'
        + '<div class="cat-row">'
        + '<span>'+d.vids.length+' 支</span>'
        + '<div class="cat-divider"></div>'
        + '<span>均 '+fmtNum(avgPlays)+' 播</span>'
        + '<div class="cat-divider"></div>'
        + '<span>上次 '+lastStr+'</span>'
        + trend
        + (overdue ? '<span style="background:#e8f8f7;color:#1a9e95;font-size:11px;font-weight:700;border-radius:3px;padding:1px 6px">💡 可拍</span>' : '')
        + '</div>'
        + '<div class="cat-toggle-hint">點擊看 Top 6 ▾</div>'
        + '<div class="cat-detail" id="cat-detail-'+cat.id+'" style="display:none">'
        + '<div class="cat-detail-head">Top 6 表現最佳影片</div>'
        + top6Html
        + '</div>'
        + '</div>';
    });
    html += '</div>';
    return html;
  }

  window.toggleCatDetail = function(catId, card) {
    var panel = document.getElementById('cat-detail-'+catId);
    var hint  = card.querySelector('.cat-toggle-hint');
    if (!panel) return;
    var open = panel.style.display === 'none';
    panel.style.display = open ? 'block' : 'none';
    if (hint) hint.textContent = open ? '收起 ▴' : '點擊看 Top 6 ▾';
    card.style.boxShadow = open ? '0 4px 16px rgba(0,0,0,.12)' : '';
  };

  // ── 「下一支建議拍」區塊 ─────────────────────────────────────────────────────
  function renderSuggestBox(cd) {
    var ready = [];
    CATEGORIES.forEach(function(cat) {
      var d = cd[cat.id];
      if (!d || d.vids.length < 2) return;
      var avg = arrAvg(d.scores);
      if (d.lastAge >= 21 && d.lastAge < 9999 && avg !== null && avg >= 55) {
        ready.push({ cat:cat, avg:avg, lastAge:d.lastAge });
      }
    });
    if (!ready.length) return '';
    ready.sort(function(a,b){ return b.avg - a.avg; });
    return '<div class="cat-suggest-box">'
      + '<strong>💡 下一支建議拍</strong>（高分分類 + 超過 21 天沒發）<br>'
      + ready.map(function(r){
          return '<span style="display:inline-flex;align-items:center;gap:5px;background:rgba(255,255,255,.8);border:1px solid #a5d8d4;border-radius:5px;padding:2px 10px;margin:3px 4px 0 0;font-weight:700">'
            + r.cat.emoji + ' ' + r.cat.label
            + '<span style="font-weight:400;color:var(--muted);font-size:11px">'+r.lastAge+'天沒拍・均'+avgGrade(r.avg)+'</span>'
            + '</span>';
        }).join('')
      + '</div>';
  }

  function buildKwData(type) {
    var kd = {};
    all.filter(function(v){ return v.type===type; }).forEach(function(v) {
      var age = daysBetween(v.created_time);
      var plays = v.plays || 0;
      var cr = plays > 0 ? (v.comments || 0) / plays * 100 : 0;
      extractKw(v).forEach(function(kw) {
        if (!kd[kw]) kd[kw] = { scores:[], recent:[], prev:[], plays:[], commentRates:[], lastAge:9999, bestScore:0, bestTitle:'' };
        var d = kd[kw];
        var sn = scoreNum(v);  // 0 for 未及格/no-plays，不影響平均
        d.scores.push(sn);
        d.plays.push(plays);
        d.commentRates.push(cr);
        if (age < d.lastAge) d.lastAge = age;
        if (sn > d.bestScore) {
          d.bestScore = sn;
          d.bestTitle = truncTitle(v.description||v.caption||'', 28);
        }
        if (age<=30) d.recent.push(sn);
        else if (age<=60) d.prev.push(v.score||0);
      });
    });
    Object.keys(kd).forEach(function(k){ if (kd[k].scores.length<3) delete kd[k]; });
    return kd;
  }

  function trendPill(d) {
    if (!d.recent.length) return '<span class="trend-pill t-new">新</span>';
    if (!d.prev.length)   return '<span class="trend-pill t-new">近期</span>';
    var pct = arrAvg(d.prev)>0 ? Math.round((arrAvg(d.recent)-arrAvg(d.prev))/arrAvg(d.prev)*100) : 0;
    if (pct>=8)  return '<span class="trend-pill t-up">↑ +'+pct+'%</span>';
    if (pct<=-8) return '<span class="trend-pill t-down">↓ '+pct+'%</span>';
    return '<span class="trend-pill t-flat">→</span>';
  }

  function classify(d) {
    var a = arrAvg(d.scores);
    var pct = (d.prev.length&&arrAvg(d.prev)>0) ? Math.round((arrAvg(d.recent)-arrAvg(d.prev))/arrAvg(d.prev)*100) : 0;
    // 值得加碼 = 平均達 A 級（>=65）且近期沒有大幅衰退(>=-10%)
    // 考慮停拍 = 平均 C 級以下（<50），一直都不行才停
    // ※ 高分但近期下滑 → 持續觀察，不算停拍
    if (a>=65 && pct>=-10) return 'add';
    if (a<50)              return 'stop';
    return 'hold';
  }

  // 統一 row builder：顯示具體數字讓行動有依據
  function makeRow(kw, d) {
    var a = arrAvg(d.scores);
    var avgPlays = Math.round(arrAvg(d.plays));
    var avgCr = arrAvg(d.commentRates).toFixed(1);
    var sc = avgGradeCol(a);
    var dayStr = d.lastAge < 9999 ? d.lastAge+'天前' : '—';
    var readyBadge = (d.lastAge >= 21 && d.lastAge < 9999)
      ? '<span style="background:#e8f8f7;color:#1a9e95;font-size:11px;border-radius:3px;padding:1px 5px;font-weight:700;white-space:nowrap;flex-shrink:0">可拍</span>' : '';
    var metaLine = fmtNum(avgPlays)+' 播放・'+avgCr+'% 留言・'+d.scores.length+'支・上次 '+dayStr;
    return '<div class="theme-kw-row">'
      +'<div style="flex:1;min-width:0">'
      +'<div style="display:flex;align-items:center;gap:5px;flex-wrap:wrap">'
      +'<span class="theme-kw-name'+(kw[0]==='#'?' kw-hash':'')+'">'+kw+'</span>'
      +trendPill(d)
      +readyBadge
      +'</div>'
      +'<div class="theme-kw-meta">'+metaLine+'</div>'
      +'</div>'
      +'<span class="theme-kw-score" style="color:'+sc+'">'+avgGrade(a)+'</span>'
      +'</div>';
  }

  function renderKwRows(kd, limit, asc) {
    limit = limit || 10;
    var keys = Object.keys(kd).sort(function(a,b){
      return asc ? arrAvg(kd[a].scores)-arrAvg(kd[b].scores) : arrAvg(kd[b].scores)-arrAvg(kd[a].scores);
    });
    if (!keys.length) return '<div style="color:var(--muted);font-size:14px;padding:8px 0">'+(asc?'目前無此類主題':'資料不足（需3支以上）')+'</div>';
    var top = keys.slice(0, limit), rest = keys.slice(limit);
    var html = top.map(function(kw){ return makeRow(kw, kd[kw]); }).join('');
    if (rest.length) {
      html += '<details><summary style="font-size:13px;color:var(--muted);cursor:pointer;padding:6px 0;user-select:none">'
        +'還有 '+rest.length+' 個主題（點擊展開）</summary>'
        +rest.map(function(kw){ return makeRow(kw, kd[kw]); }).join('')
        +'</details>';
    }
    return html;
  }

  function recycleHtml(type) {
    var recs = all.filter(function(v){
      var age=daysBetween(v.created_time);
      return v.type===type && age>=30 && age<=150 && (v.score||0)>=65;
    }).sort(function(a,b){return (b.score||0)-(a.score||0);}).slice(0,5);
    if (!recs.length) return '<div style="color:var(--muted);font-size:14px;padding:6px 0">暫無符合條件影片</div>';
    return recs.map(function(v){
      var title=truncTitle(v.description||v.caption||'',28);
      var age=daysBetween(v.created_time);
      var sc=v.score||0;
      var plays=v.plays||0;
      var cr=plays>0?((v.comments||0)/plays*100).toFixed(1):'0.0';
      var nf=v.newFollowers||0;
      var nfStr=nf>0?' · <span style="color:#1a9e95;font-weight:700">+'+fmtNum(nf)+'粉</span>':'';
      return '<div class="theme-recycle-row">'
        +'<div style="flex:1;min-width:0">'
        +'<div style="font-weight:700;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+title+'</div>'
        +'<div style="font-size:12px;color:var(--muted);margin-top:3px">'+age+'天前・'+fmtNum(plays)+' 播放・'+cr+'% 留言'+nfStr+'</div>'
        +'</div>'
        +'<span style="font-size:15px;font-weight:700;color:'+(sc>=80?'#1a9e95':'#b5924e')+';min-width:32px;text-align:right;flex-shrink:0">'+sc+'分</span>'
        +'</div>';
    }).join('');
  }

  function renderTypeCol(type, label, icon) {
    var kd = buildKwData(type);
    var addKw={}, stopKw={}, holdKw={};
    Object.keys(kd).forEach(function(k){
      var c=classify(kd[k]);
      if(c==='add') addKw[k]=kd[k];
      else if(c==='stop') stopKw[k]=kd[k];
      else holdKw[k]=kd[k];
    });
    var holdCnt = Object.keys(holdKw).length;

    // 找「值得拍但超過21天沒拍」的高分主題 → 主動推薦
    var readyKws = Object.keys(addKw)
      .filter(function(k){ return addKw[k].lastAge >= 21; })
      .sort(function(a,b){ return arrAvg(addKw[b].scores)-arrAvg(addKw[a].scores); })
      .slice(0, 3);
    var nextShoot = readyKws.length
      ? '<div style="background:#e8f8f7;border:1px solid #a5d8d4;border-radius:6px;padding:10px 12px;margin-bottom:14px;font-size:13px;line-height:1.6">'
        +'<strong>💡 下一支建議拍</strong>（高分且超過21天沒拍）<br>'
        +readyKws.map(function(k){
          var d=addKw[k];
          return '<span style="display:inline-flex;align-items:center;gap:4px;background:#fff;border:1px solid #a5d8d4;border-radius:4px;padding:2px 8px;margin:3px 4px 0 0;font-weight:700">'
            +k+' <span style="font-weight:400;color:var(--muted);font-size:11px">'+d.lastAge+'天前・均'+avgGrade(arrAvg(d.scores))+'</span></span>';
        }).join('')
        +'</div>' : '';

    return '<div class="theme-col">'
      +'<div class="theme-col-head">'+icon+' '+label+'</div>'
      +nextShoot

      +'<div class="theme-sec">'
      +'<div class="theme-sec-title" style="color:#1a9e95">✅ 值得加碼（'+Object.keys(addKw).length+' 個主題）</div>'
      +renderKwRows(addKw, 10, false)
      +'</div>'

      +'<div class="theme-sec">'
      +'<div class="theme-sec-title" style="color:#be3a67">🚫 考慮停拍（'+Object.keys(stopKw).length+' 個主題）</div>'
      +renderKwRows(stopKw, 10, true)
      +'</div>'

      +(holdCnt ? '<details class="theme-sec"><summary style="font-size:13px;color:#b5924e;cursor:pointer;user-select:none;list-style:none;padding:4px 0">👀 持續觀察 '+holdCnt+' 個主題（點擊展開）</summary>'
        +renderKwRows(holdKw, 10, false)
        +'</details>' : '')

      +'<div class="theme-sec">'
      +'<div class="theme-sec-title" style="color:#b5924e;display:flex;align-items:center;justify-content:space-between">'
      +'<span>♻ 可復投影片（30-150天 · 分數≥65）</span>'
      +'<button class="flt-btn" id="recycleToggle_'+type+'" onclick="toggleRecycle(\''+type+'\')" style="font-size:11px;padding:2px 8px">展開</button>'
      +'</div>'
      +'<div id="recycleBody_'+type+'" style="display:none">'+recycleHtml(type)+'</div>'
      +'</div>'
      +'</div>';
  }

  window.toggleRecycle = function(type) {
    var body = document.getElementById('recycleBody_'+type);
    var btn  = document.getElementById('recycleToggle_'+type);
    if (!body) return;
    var open = body.style.display === 'none';
    body.style.display = open ? 'block' : 'none';
    btn.textContent = open ? '收起' : '展開';
    btn.classList.toggle('active', open);
  };

  var _themeType = 'traffic';
  window.showThemeType = function(type, btn) {
    _themeType = type;
    document.querySelectorAll('.theme-type-btn').forEach(function(b){ b.classList.remove('active'); });
    btn.classList.add('active');
    document.getElementById('themeColWrap').innerHTML = renderTypeCol(_themeType, _themeType==='traffic'?'流量型':'帶貨型', _themeType==='traffic'?'📈':'🛍');
  };

  var cd = buildCategoryData();

  document.getElementById('themeContent').innerHTML =
    '<div class="slabel">內容分類分析</div>'

    // ── 分類卡片
    + renderCategoryGrid(cd)

    // ── 建議下一支
    + renderSuggestBox(cd)

    // ── 折疊：個別關鍵字詳細分析
    + '<details style="margin-top:8px">'
    + '<summary style="font-size:13px;color:var(--muted);cursor:pointer;user-select:none;list-style:none;display:flex;align-items:center;gap:6px;padding:6px 0">'
    + '<span style="font-size:15px">🔍</span> 詳細關鍵字分析（點擊展開）</summary>'
    + '<div style="margin-top:14px">'
    + '<div style="display:flex;align-items:center;gap:10px;margin-bottom:14px;flex-wrap:wrap">'
    + '<button class="flt-btn theme-type-btn active" onclick="showThemeType(\'traffic\',this)">📈 流量型</button>'
    + '<button class="flt-btn theme-type-btn" onclick="showThemeType(\'commerce\',this)">🛍 帶貨型</button>'
    + '</div>'
    + '<div id="themeColWrap">'
    + renderTypeCol('traffic','流量型','📈')
    + '</div>'
    + '</div>'
    + '</details>'

    + '<details style="margin-top:14px">'
    + '<summary style="font-size:13px;color:var(--muted);cursor:pointer;user-select:none;list-style:none;display:flex;align-items:center;gap:6px;padding:6px 0">'
    + '<span style="font-size:16px">📖</span> 評分邏輯說明（點擊展開）</summary>'
    + '<div style="margin-top:12px;font-size:13px;line-height:1.9;color:var(--ink);background:var(--white);border:1px solid var(--border);border-radius:var(--r);padding:16px 18px">'
    + '💡 <strong>可拍</strong> = 均分 ≥ 55 且超過 21 天沒拍同類<br>'
    + '✅ <strong>值得加碼</strong>（關鍵字層）= 平均分 ≥ 60 且近30天沒有明顯衰退<br>'
    + '🚫 <strong>考慮停拍</strong>（關鍵字層）= 平均分 &lt; 40，一直表現差<br>'
    + '♻ <strong>可復投</strong> = 30-150天前發布、分數 ≥ 65 的舊片，換封面重發<br><br>'
    + '分數是頻道相對制：50分 = 頻道中位數，65分以上 = 前25%</div>'
    + '</details>';
}

function platCard(icon, name, count, avgSc, plays, goodCnt) {

    + '<div class="plat-head"><span class="plat-icon">' + icon + '</span>'
    + '<span class="plat-name">' + name + '</span>'

    + '<div class="plat-stat-grid">'

    + '<div class="plat-stat"><div class="plat-stat-label">本週播放</div><div class="plat-stat-val">' + fmtNum(plays) + '</div></div>'

    + '<div class="plat-stat"><div class="plat-stat-label">優質率</div><div class="plat-stat-val">' + (count ? Math.round(goodCnt/count*100) : '—') + '%</div></div>'
    + '</div></div>';
}

function sitTag(v) {
  var dev = reachDev(v);
  var lt  = loyaltyTier(v);
  if (lt === 'tier3' && dev >= -0.1)  return '<span class="sit-tag sit-no-engage">有流量沒互動</span>';
  if (lt === 'tier3' && dev < -0.1)   return '<span class="sit-tag sit-both-low">低流量低互動</span>';
  if (lt !== 'tier3' && dev < -0.3)   return '<span class="sit-tag sit-no-reach">低流量高互動</span>';
  return '';
}
var TIER_ADVICE = {
  tier1: '<div class="tier-advice" style="border-color:#1a9e95">✅ <strong>複製這類腳本</strong>：粉絲黏度高，這種主題/形式是你的強項。考慮同系列再拍，或直接重新剪輯投廣。</div>',
  tier2: '<div class="tier-advice">📌 <strong>觀察趨勢即可</strong>：屬於頻道正常水準，不需要特別優化，持續產出保持節奏。</div>',
  tier3: '<div class="tier-advice" style="border-color:var(--warn)">'
    + '⚡ <strong>有流量沒互動</strong>：演算法有在推，但觀眾看完就走。→ 結尾加互動問句（「你覺得呢？留言告訴我」），或在影片中加入更明確的購買 CTA。<br>'
    + '🚫 <strong>低流量低互動</strong>：這類主題客人不買單。→ 分析共同特徵（見低效分析頁），這類選題要少拍或完全換方向。<br>'
    + '💎 <strong>低流量高互動</strong>：鐵粉很喜歡但演算法沒推。→ 換個封面/標題重新發，或考慮小額投廣，這種片值得復活。'
    + '</div>',
};
function perfDistRow(color, label, count, total, desc, videos, panelId) {
  var pct = Math.round(count / total * 100);
  var tier = panelId === 'panel-t1' ? 'tier1' : panelId === 'panel-t2' ? 'tier2' : 'tier3';
  var panelRows = videos.slice().sort(function(a,b){ return b.plays-a.plays; }).map(function(v) {
    var lr = loyaltyRate(v).toFixed(2);
    var platLabel = v.platform === 'fb' ? '📘FB' : '📸IG';
    return '<div class="perf-panel-row">'
      + '<div style="color:var(--muted)">' + fmtDate(v.created_time) + '</div>'
      + '<div class="rt-title" data-full="' + escAttr(v.description||v.caption||'') + '">' + truncTitle(v.description||v.caption||'') + sitTag(v) + '</div>'
      + '<div>' + platLabel + '</div>'
      + '<div style="font-weight:800">' + fmtNum(v.plays) + '</div>'
      + '<div style="font-weight:800">' + lr + '%</div>'
      + '</div>';
  }).join('');
  return '<div style="margin-bottom:4px">'
    + '<div class="perf-dist-row">'
    + '<div class="perf-dot" style="background:' + color + '"></div>'
    + '<div class="perf-label">' + label + '</div>'
    + '<div class="perf-bar-wrap"><div class="perf-bar-fill" style="width:' + pct + '%;background:' + color + '"></div></div>'
    + '<div class="perf-count">' + count + '</div>'
    + '<div class="perf-desc">' + desc + '</div>'
    + '<button class="perf-toggle" onclick="togglePanel(\'' + panelId + '\',this)">' + count + ' 支 ▾</button>'
    + '</div>'
    + '<div class="perf-panel" id="' + panelId + '">'
    + (TIER_ADVICE[tier] || '')
    + '<div class="perf-panel-row perf-panel-head"><div>日期</div><div>影片標題</div><div>平台</div><div>播放</div><div>互動率</div></div>'
    + (panelRows || '<div style="padding:12px;text-align:center;color:var(--muted);font-size:14px">本週無此類影片</div>')
    + '</div>'
    + '</div>';
}

// ── 影片詳細 ──────────────────────────────────────────────────────────────

var _recentPlat = 'all';

    + '</div>'
    + '<div class="period-btns" style="margin-bottom:16px">'

    + '<button class="period-btn" onclick="setRecentPlat(\'fb\',this)">Facebook</button>'
    + '<button class="period-btn" onclick="setRecentPlat(\'ig\',this)">Instagram</button>'

function setRecentType(type, el) {
  _recentType = type;
  document.querySelectorAll('#detailGrid .t20-tab').forEach(function(t){ t.classList.remove('active'); });
  el.classList.add('active');
  renderRecentTable();
}

function setRecentPlat(plat, el) {
  _recentPlat = plat;
  document.querySelectorAll('#detailGrid .period-btn').forEach(function(b){ b.classList.remove('active'); });
  el.classList.add('active');
  renderRecentTable();
}

function renderRecentTable() {
  var container = document.getElementById('recentTable');
  if (!container) return;

  var videos = STATIC_DATA.videos.filter(function(v) {
    if (daysBetween(v.created_time) > 7) return false;
    if (v.type !== _recentType) return false;
    if (_recentPlat !== 'all' && v.platform !== _recentPlat) return false;
    return true;
  }).sort(function(a, b){ return new Date(b.created_time) - new Date(a.created_time); });

  if (videos.length === 0) {
    container.innerHTML = '<div class="state-box"><div class="state-icon">📭</div><h3>此分類近7天暫無影片</h3></div>';
    return;
  }

  container.innerHTML = '<div class="ranking-table"><div class="table-scroll">'
    + '<div class="rt-head recent-grid-cols"><div>上架</div><div>片名</div><div>分數</div><div>播放</div><div>留言率</div><div>忠實度</div></div>'
    + videos.map(function(v) {
        var age    = daysBetween(v.created_time);
        var ageStr = age===0?'今天':age===1?'昨天':age+'天前';
        var title  = v.description || v.caption || '';
        var sc     = scoreCol(v);
        var lt     = loyaltyTier(v);
        var cr     = v.plays ? (v.comments/v.plays*100).toFixed(2)+'%' : '—';
        var plat   = v.platform==='fb'?'📘 FB':'📸 IG';
        return '<div class="rt-row recent-grid-cols">'
          + '<div><div style="font-size:14px;font-weight:700;color:var(--ink)">' + ageStr + '</div>'
          + '<div style="font-size:12px;color:var(--muted)">' + plat + '</div></div>'
          + '<div><div class="rt-title" data-full="' + escAttr(title) + '">' + truncTitle(title,24) + '</div>'
          + '<div class="rt-date">' + fmtDate(v.created_time) + '</div></div>'
          + '<div class="rt-score" style="color:' + sc + ';font-size:' + (v.low_plays?'11px':'') + '">' + scoreStr(v) + '</div>'
          + '<div class="rt-num">' + fmtNum(v.plays||0) + '</div>'
          + '<div class="rt-num">' + cr + '</div>'
          + '<div><span class="badge ' + lt + '">' + tierLabel(lt) + '</span></div>'
          + '</div>';
      }).join('')
    + '</div></div>';
}

// ── 排行榜 ────────────────────────────────────────────────────────────────
function renderTop10() {
  var platF = document.getElementById('platFilter').value;
  var days  = Number(activePeriod);
  var data  = STATIC_DATA.videos.filter(function(v) { return v.type === currentTop20Type; });
  if (platF !== 'all') data = data.filter(function(v) { return v.platform === platF; });
  data = data.filter(function(v) { return daysBetween(v.created_time) <= days; });
  data.sort(function(a, b) { return b.score - a.score; });
  var top10 = data.slice(0, 10);

  var insightBox = document.getElementById('insightBox');
  if (top10.length > 0) {
    insightBox.classList.remove('hidden');
    document.getElementById('insightBody').innerHTML = buildHighlight(top10[0]);
  } else {
    insightBox.classList.add('hidden');
  }

  if (top10.length === 0) {
    document.getElementById('rankingTable').innerHTML = '<div class="loading-row">暫無符合條件的影片</div>';
    return;
  }

  var rankClass  = function(i) { return i===0?'gold-r':i===1?'silver-r':i===2?'bronze-r':''; };
  var scoreClass = currentTop20Type === 'traffic' ? 't-score' : 'c-score';
  var colHeaders = currentTop20Type === 'traffic'
    ? ['#','影片','評分','播放','轉發率','留言率','觸及偏離','新增粉絲']
    : ['#','影片','評分','播放','留言率','觸及偏離','儲存','新增粉絲'];

  var rows = top10.map(function(v, i) {
    var dev     = reachDev(v);
    var devPct  = (dev >= 0 ? '+' : '') + (dev * 100).toFixed(1) + '%';
    var devColor = dev >= 0.05 ? '#1a9e95' : dev <= -0.05 ? 'var(--warn)' : '#7a6428';
    var daysOld = daysBetween(v.created_time);
    var nf      = v.newFollowers || 0;
    var nfStr   = nf > 0 ? '<span style="color:#1a9e95;font-weight:700">+' + fmtNum(nf) + '</span>' : '<span style="color:var(--muted)">—</span>';
    var title   = v.description || v.caption || '';
    var cols;
    if (currentTop20Type === 'traffic') {
      cols = [
        '<div class="rt-rank ' + rankClass(i) + '">' + (i+1) + '</div>',
        '<div><div class="rt-title" data-full="' + escAttr(title) + '">' + truncTitle(title) + '</div><div class="rt-date">' + daysOld + '天前 · ' + v.platform.toUpperCase() + '</div></div>',
        '<div class="rt-score ' + scoreClass + '" style="' + (v.low_plays?'font-size:11px':'') + '">' + scoreStr(v) + '</div>',
        '<div class="rt-num">' + fmtNum(v.plays||0) + '</div>',
        '<div class="rt-num">' + (v.plays?(v.shares/v.plays*100).toFixed(2)+'%':'—') + '</div>',
        '<div class="rt-num">' + (v.plays?(v.comments/v.plays*100).toFixed(2)+'%':'—') + '</div>',
        '<div class="rt-num" style="color:' + devColor + '">' + devPct + '</div>',
        '<div class="rt-num">' + nfStr + '</div>',
      ];
    } else {
      cols = [
        '<div class="rt-rank ' + rankClass(i) + '">' + (i+1) + '</div>',
        '<div><div class="rt-title" data-full="' + escAttr(title) + '">' + truncTitle(title) + '</div><div class="rt-date">' + daysOld + '天前 · ' + v.platform.toUpperCase() + '</div></div>',
        '<div class="rt-score ' + scoreClass + '" style="' + (v.low_plays?'font-size:11px':'') + '">' + scoreStr(v) + '</div>',
        '<div class="rt-num">' + fmtNum(v.plays||0) + '</div>',
        '<div class="rt-num">' + (v.plays?(v.comments/v.plays*100).toFixed(2)+'%':'—') + '</div>',
        '<div class="rt-num" style="color:' + devColor + '">' + devPct + '</div>',
        '<div class="rt-num">' + (v.platform==='ig'?fmtNum(v.saved||0):'—') + '</div>',
        '<div class="rt-num">' + nfStr + '</div>',
      ];
    }
    return '<div class="rt-row">' + cols.join('') + '</div>';
  }).join('');

  document.getElementById('rankingTable').innerHTML =
    '<div class="rt-head">' + colHeaders.map(function(c) { return '<div>' + c + '</div>'; }).join('') + '</div>'
    + rows;
}

// ── 低效分析 ──────────────────────────────────────────────────────────────
function initWaste() {
  var all = STATIC_DATA.videos.filter(function(v){ return (v.plays||0) > 0; });
  // 爛片 = 低互動 + 低觸及（低流量低互動）
  var bad = all.filter(function(v){
    return loyaltyTier(v) === 'tier3' && reachDev(v) < -0.1;
  }).sort(function(a,b){ return a.score - b.score; });

  // 有流量沒互動（另一類需關注）
  var noEngage = all.filter(function(v){
    return loyaltyTier(v) === 'tier3' && reachDev(v) >= -0.1;
  }).sort(function(a,b){ return a.score - b.score; });

  // 低流量高互動（潛力片）
  var hidden = all.filter(function(v){
    return loyaltyTier(v) !== 'tier3' && reachDev(v) < -0.3;
  }).sort(function(a,b){ return b.plays - a.plays; });

  // 關鍵詞分析（從爛片標題取高頻詞）
  var stopWords = '的了是在我你他她它這那就都也很到說要去好不大沒來可會但和與及而或所如為上下中之以被得著過嗎呢啊喔哦吧呀一個有人片影片我們泰熙爾札娜IP'.split('');
  var wordCount = {};
  bad.slice(0,20).forEach(function(v){
    var text = (v.description || v.caption || '').replace(/[！？，。、「」【】\n\r!?,.]/g,' ');
    text.split(/\s+/).forEach(function(w){
      w = w.trim();
      if (w.length < 2) return;
      if (w.charAt(0) === '#') return;  // 排除 hashtag
      var isStop = stopWords.some(function(s){ return w === s; });
      if (isStop) return;
      wordCount[w] = (wordCount[w]||0) + 1;
    });
  });
  var topWords = Object.keys(wordCount).filter(function(w){ return wordCount[w] >= 2; })
    .sort(function(a,b){ return wordCount[b]-wordCount[a]; }).slice(0,12);

  var badComRate = bad.length ? Math.round(bad.filter(function(v){return v.type==='commerce';}).length/bad.length*100) : 0;
  var badFbRate  = bad.length ? Math.round(bad.filter(function(v){return v.platform==='fb';}).length/bad.length*100) : 0;
  var avgBadPlays = bad.length ? Math.round(bad.reduce(function(s,v){return s+(v.plays||0);},0)/bad.length) : 0;
  var medAll = (function(){
    var ps = all.map(function(v){return v.plays||0;}).sort(function(a,b){return a-b;});
    return ps.length ? ps[Math.floor(ps.length/2)] : 1;
  })();

  function badRow(v,i){
    var dev = reachDev(v); var devStr = (dev>=0?'+':'')+(dev*100).toFixed(0)+'%';
    var lr = loyaltyRate(v).toFixed(2);
    var title = v.description||v.caption||'';
    return '<div class="perf-panel-row" style="background:'+(i%2?'var(--off)':'')+';">'
      +'<div style="color:var(--muted)">'+(i+1)+'</div>'
      +'<div class="rt-title" data-full="'+escAttr(title)+'">'+truncTitle(title,14)+'</div>'
      +'<div style="font-weight:800">'+fmtNum(v.plays||0)+'</div>'
      +'<div style="color:var(--warn);font-weight:800">'+lr+'%</div>'
      +'<div style="color:var(--warn);font-size:13px">觸及 '+devStr+'</div>'
      +'</div>';
  }

  var html = '';

  // 區塊 1：爛片排行
  html += '<div class="slabel" style="margin-bottom:8px">🚫 低流量低互動 · 建議減少拍攝的主題（'+bad.length+' 支）</div>'
    +'<div class="perf-panel open" style="max-height:none;overflow:visible;margin-bottom:16px">'
    +'<div class="perf-panel-row perf-panel-head"><div>#</div><div>影片</div><div>播放</div><div>互動率</div><div>觸及</div></div>'
    +(bad.slice(0,10).map(badRow).join('') || '<div style="padding:12px;text-align:center;color:var(--muted)">暫無符合條件影片</div>')
    +'</div>';

  // 區塊 2：有流量沒互動
  if (noEngage.length) {
    html += '<div class="insight-box" style="border-color:rgba(251,146,60,.4);margin-bottom:14px">'
      +'<div class="insight-title" style="color:#c2580a">⚡ 有流量沒互動（'+noEngage.length+' 支）· 有機會翻身</div>'
      +'<div style="font-size:14px;line-height:1.7">演算法有在推，但觀眾看完就走。<strong>行動</strong>：①結尾加互動問句 ②加強 CTA「留言+1 領取」 ③前 3 秒鉤子要更強</div>'
      +'<div class="perf-panel open" style="max-height:none;overflow:visible;margin-top:10px">'
      +'<div class="perf-panel-row perf-panel-head"><div>#</div><div>影片</div><div>播放</div><div>互動率</div><div>觸及</div></div>'
      +noEngage.slice(0,10).map(badRow).join('')
      +'</div></div>';
  }

  // 區塊 3：潛力片
  if (hidden.length) {
    html += '<div class="insight-box" style="border-color:rgba(99,102,241,.3);margin-bottom:14px">'
      +'<div class="insight-title" style="color:#4f46e5">💎 低流量高互動（'+hidden.length+' 支）· 鐵粉喜歡但沒被推</div>'
      +'<div style="font-size:14px;line-height:1.7"><strong>行動</strong>：①換封面／標題重新發布 ②這類腳本值得重拍或複製 ③小額投廣測試看看</div>'
      +'<div class="perf-panel open" style="max-height:none;overflow:visible;margin-top:10px">'
      +'<div class="perf-panel-row perf-panel-head"><div>#</div><div>影片</div><div>播放</div><div>互動率</div><div>觸及</div></div>'
      +hidden.slice(0,10).map(badRow).join('')
      +'</div></div>';
  }

  document.getElementById('wasteContent').innerHTML = html;
}

function runSearch(q) {
  var out = document.getElementById('searchResults');
  q = (q || '').trim();
  if (!q) {
    out.innerHTML = '<div class="search-empty">輸入關鍵字尋找影片</div>';
    return;
  }
  var lq = q.toLowerCase();
  var all = (STATIC_DATA.videos || []);
  var matches = all.filter(function(v) {
    var t = (v.description || v.caption || '').toLowerCase();
    return t.indexOf(lq) !== -1;
  });
  if (!matches.length) {
    out.innerHTML = '<div class="search-empty">找不到「' + q + '」相關影片</div>';
    return;
  }
  out.innerHTML = matches.slice(0, 20).map(function(v) {
    var title = v.description || v.caption || '(無標題)';
    var age = daysBetween(v.created_time);
    var platIcon = v.platform === 'fb' ? '📘 FB' : '📸 IG';
    var scoreColor = scoreCol(v);
    var lr = loyaltyRate(v).toFixed(2);
    var lt = loyaltyTier(v);
    var tl = tierLabel(lt);
    var dev = reachDev(v);
    var devPct = (dev >= 0 ? '+' : '') + (dev * 100).toFixed(1) + '%';
    var devClass = dev >= 0.05 ? 'pos' : dev <= -0.05 ? 'neg' : 'neu';
    // similar-score comparisons
    var comps = all.filter(function(c) {
      return c !== v && Math.abs((c.score || 0) - (v.score || 0)) <= 10;
    }).sort(function(a, b) { return (b.plays || 0) - (a.plays || 0); }).slice(0, 5);
    var compsHtml = comps.length
      ? '<div class="search-comps"><div class="search-comps-title">相似等級影片</div>'
        + comps.map(function(c) {
            var ct = c.description || c.caption || '(無標題)';
            return '<div class="search-comp-row">'
              + '<span class="search-comp-score" style="color:' + scoreCol(c) + '">' + scoreStr(c) + '</span>'
              + '<span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:14px">' + ct + '</span>'
              + '<span style="font-size:13px;color:var(--muted);margin-left:8px;white-space:nowrap">' + fmtNum(c.plays || 0) + ' 播</span>'
              + '</div>';
          }).join('')
        + '</div>'
      : '';
    return '<div class="search-result">'
      + '<div class="search-result-head">'
      + '<div class="search-result-title">' + title + '</div>'
      + '<div class="search-result-meta">' + fmtDate(v.created_time) + ' · ' + age + '天前 · ' + platIcon
      + ' · <span style="color:' + scoreColor + ';font-weight:800">' + scoreStr(v) + '</span>'
      + ' · <span class="badge ' + lt + '">' + tl + '</span>'
      + '</div>'
      + '</div>'
      + '<div class="search-stats">'
      + '<div class="search-stat"><div class="search-stat-val">' + fmtNum(v.plays || 0) + '</div><div class="search-stat-lbl">播放</div></div>'
      + '<div class="search-stat"><div class="search-stat-val">' + fmtNum(v.likes || 0) + '</div><div class="search-stat-lbl">讚</div></div>'
      + '<div class="search-stat"><div class="search-stat-val">' + fmtNum(v.comments || 0) + '</div><div class="search-stat-lbl">留言</div></div>'
      + '<div class="search-stat"><div class="search-stat-val"><span class="devbadge ' + devClass + '">' + devPct + '</span></div><div class="search-stat-lbl">觸及偏離</div></div>'
      + '</div>'
      + compsHtml
      + '</div>';
  }).join('');
}

// ── 直播頁 ────────────────────────────────────────────────────────────────
function renderLiveTab() {
  var container = document.getElementById('liveContent');
  if (!container) return;
  var lives = (STATIC_DATA.lives || []).slice()
    .sort(function(a, b) { return b.startTime.localeCompare(a.startTime); });

  if (!lives.length) {
    container.innerHTML = '<div class="live-empty">尚無直播記錄</div>';
    return;
  }

  function fmt(n) {
    if (!n) return '0';
    return n >= 10000 ? (n/10000).toFixed(1)+'萬' : n.toLocaleString();
  }
  function fmtDur(sec) {
    if (!sec) return '—';
    var h = Math.floor(sec / 3600);
    var m = Math.floor((sec % 3600) / 60);
    return h > 0 ? h+'h '+m+'m' : m+'m';
  }
  function fmtWatch(ms) {
    if (!ms) return '—';
    var s = Math.round(ms / 1000);
    var m = Math.floor(s / 60);
    s = s % 60;
    return m > 0 ? m+'m '+s+'s' : s+'s';
  }
  function retainPct(lv) {
    if (!lv.durationSec || !lv.avgWatchMs) return null;
    var pct = (lv.avgWatchMs / 1000) / lv.durationSec * 100;
    return Math.min(Math.round(pct), 100);
  }
  function daysBetween(iso) {
    if (!iso) return 9999;
    var d = new Date(iso.replace('Z','').split('+')[0]);
    return Math.floor((Date.now() - d.getTime()) / 86400000);
  }

  // ── 彙總統計 ──
  var recent90 = lives.filter(function(lv){ return daysBetween(lv.startTime) <= 90; });
  var totalPlays = 0, totalReach = 0, totalInteract = 0, totalDur = 0;
  recent90.forEach(function(lv) {
    totalPlays    += lv.plays      || 0;
    totalReach    += lv.reach      || 0;
    totalInteract += (lv.comments || 0) + (lv.likes || 0);
    totalDur      += lv.durationSec || 0;
  });
  var avgReach = recent90.length ? Math.round(totalReach / recent90.length) : 0;

  var statsHtml = '<div class="live-stat-row">'
    + '<div class="live-stat"><div class="live-stat-val">'+recent90.length+'</div><div class="live-stat-lbl">近90天場數</div></div>'
    + '<div class="live-stat"><div class="live-stat-val">'+(avgReach ? fmt(avgReach) : '—')+'</div><div class="live-stat-lbl">平均觸及／場</div></div>'
    + '<div class="live-stat"><div class="live-stat-val">'+fmt(totalPlays)+'</div><div class="live-stat-lbl">累計觀看</div></div>'
    + '<div class="live-stat"><div class="live-stat-val">'+fmtDur(totalDur)+'</div><div class="live-stat-lbl">累計時長</div></div>'
    + '</div>';

  // ── 每場直播卡片 ──
  var cardsHtml = lives.map(function(lv) {
    var isIG   = lv.platform === 'ig';
    var age    = daysBetween(lv.startTime);
    var ageStr = age === 0 ? '今天' : age === 1 ? '昨天' : age + '天前';
    // 台灣時間（UTC+8）：週幾 + 幾點開播
    var twDow = ''; var twTime = '';
    if (lv.startTime) {
      var twDate = new Date(new Date(lv.startTime.replace('Z','').split('+')[0]+'Z').getTime() + 8*3600000);
      twDow  = ['日','一','二','三','四','五','六'][twDate.getUTCDay()];
      var hh = twDate.getUTCHours().toString().padStart(2,'0');
      var mm = twDate.getUTCMinutes().toString().padStart(2,'0');
      twTime = hh + ':' + mm;
    }
    var interact = (lv.comments || 0) + (lv.likes || 0);
    // 互動率：互動數 ÷ VOD觀看
    var engRate = (lv.plays > 0) ? (interact / lv.plays * 100) : 0;
    var engStr  = engRate > 0 ? engRate.toFixed(1) + '%' : '—';

    var platBadge = isIG
      ? '<span class="live-badge" style="background:#e1306c">IG 直播</span>'
      : '<span class="live-badge">FB 直播</span>';
    var titleText = lv.title || (isIG ? '（IG 不提供標題）' : '（無標題）');

    var metricsHtml = ''
      + '<div class="live-metric lm-main"><div class="live-metric-val">'+fmt(lv.plays)+'</div><div class="live-metric-lbl">觀看</div></div>'
      + '<div class="live-metric"><div class="live-metric-val">'+fmt(lv.reach)+'</div><div class="live-metric-lbl">觸及人數</div></div>'
      + '<div class="live-metric"><div class="live-metric-val">'+fmt(lv.comments)+'</div><div class="live-metric-lbl">💬 留言</div></div>'
      + '<div class="live-metric"><div class="live-metric-val">'+fmt(lv.likes)+'</div><div class="live-metric-lbl">👍 按讚</div></div>'
      + '<div class="live-metric"><div class="live-metric-val">'+fmtWatch(lv.avgWatchMs)+'</div><div class="live-metric-lbl">平均觀看</div></div>'
      + '<div class="live-metric lm-eng"><div class="live-metric-val">'+engStr+'</div><div class="live-metric-lbl">互動率</div></div>';

    return '<div class="live-card">'
      + '<div class="live-card-head">'
      + platBadge
      + '<div style="flex:1">'
      + '<div class="live-title">'+titleText+'</div>'
      + '<div class="live-meta">'+lv.date+'（'+twDow+'）・'+ageStr+' '+twTime+' 開播・時長 '+fmtDur(lv.durationSec)+'</div>'
      + '</div>'
      + '</div>'
      + '<div class="live-metrics">' + metricsHtml + '</div>'
      + '</div>';
  }).join('');

  container.innerHTML = statsHtml + cardsHtml;
}

var initiated = { overview: false, summary: false, theme: false, top20: false, search: false, live: false };

function switchTab(id, el) {
  document.querySelectorAll('.section').forEach(function(s) { s.classList.remove('active'); });
  document.querySelectorAll('.tab').forEach(function(t) { t.classList.remove('active'); });
  document.getElementById('sec-' + id).classList.add('active');
  el.classList.add('active');
  if (!initiated[id]) {
    initiated[id] = true;
    if (id === 'overview') initOverview();
    if (id === 'summary') initSummary();
    if (id === 'theme') initTheme();
    if (id === 'top20') renderTop10();
    if (id === 'live') renderLiveTab();
  }
  if (id === 'search') {
    setTimeout(function() { document.getElementById('searchInput').focus(); }, 50);
    var sr = document.getElementById('searchResults');
    if (!sr.innerHTML) sr.innerHTML = '<div class="search-empty">輸入關鍵字尋找影片</div>';
  }
}

function mobileSwitchTab(id, el) {
  // 桌面 tab 順序：0=近期 1=總覽 2=關鍵字 3=排行榜 4=尋找 5=直播
  var tabMap = { overview: 0, theme: 2, top20: 3, search: 4, live: 5 };
  var tabs = document.querySelectorAll('.tab');
  if (tabs[tabMap[id]] !== undefined) tabs[tabMap[id]].click();
  document.querySelectorAll('.mob-tab').forEach(function(t) { t.classList.remove('active'); });
  el.classList.add('active');
}

// ── 標題點擊展開 ──────────────────────────────────────────────────────────
document.addEventListener('click', function(e) {
  var el = e.target;
  if (el.classList.contains('vcard-title') || el.classList.contains('rt-title')) {
    var full = el.dataset.full || el.textContent;
    if (el.classList.contains('expanded')) {
      el.textContent = truncTitle(full);
      el.classList.remove('expanded');
    } else {
      el.textContent = full;
      el.classList.add('expanded');
    }
  }
});

// ── 初始化 ────────────────────────────────────────────────────────────────
window.addEventListener('DOMContentLoaded', function() {
  function updateClock() {
    var now = new Date();
    var pad = function(n) { return n < 10 ? '0' + n : '' + n; };
    var s = now.getFullYear() + '-' + pad(now.getMonth()+1) + '-' + pad(now.getDate())
          + ' ' + pad(now.getHours()) + ':' + pad(now.getMinutes()) + ':' + pad(now.getSeconds());
    document.getElementById('snapshotBadge').textContent = '🕐 ' + s;
  }
  updateClock();
  setInterval(updateClock, 1000);
  initiated.overview = true;
  initOverview();
});

// ── 影片詳細 drawer ─────────────────────────────────────────────────────────
var _vidMap = {};
(STATIC_DATA.videos || []).forEach(function(v){ _vidMap[v.id] = v; });

function showVidDetail(id) {
  var v = _vidMap[id]; if (!v) return;
  var title = v.description || v.caption || '（無標題）';
  var plays = v.plays || 0;
  var comments = v.comments || 0;
  var shares = v.shares || 0;
  var reach = v.reach || 0;
  var saved = v.saved || 0;
  var nf = v.newFollowers || 0;
  var cr = plays > 0 ? (comments/plays*100).toFixed(1) : '0.0';
  var sr = plays > 0 ? (shares/plays*100).toFixed(1) : '0.0';
  var sc = v.score || 0;
  var age = daysBetween(v.created_time);
  var scColor = scoreCol(v);
  var ageStr = age===0?'今天':age===1?'昨天':age+'天前';
  var platStr = v.platform==='fb'?'📘 Facebook':'📸 Instagram';
  function cell(lbl, val, color) {
    return '<div class="vd-cell"><div class="vd-lbl">'+lbl+'</div><div class="vd-val"'+(color?' style="color:'+color+'"':'')+'>'+val+'</div></div>';
  }
  var metrics = cell('播放',fmtNum(plays))
    + cell('留言',fmtNum(comments))
    + cell('分享',fmtNum(shares))
    + cell('觸及',fmtNum(reach))
    + cell('留言率',cr+'%', cr>=2?'#1a9e95':cr>=1?'#b5924e':'#be3a67')
    + cell('分享率',sr+'%')
    + (v.platform==='ig' ? cell('儲存',fmtNum(saved)) : '')
    + (nf>0 ? cell('新增粉絲','+'+fmtNum(nf),'#1a9e95') : cell('新增粉絲','—'));
  document.getElementById('vdTitle').textContent = title;
  document.getElementById('vdMeta').textContent = platStr+' · '+ageStr;
  document.getElementById('vdScore').innerHTML = '<span style="color:'+scoreCol(v)+';font-size:36px;font-weight:700;line-height:1">'+scoreGrade(v)+'</span>';
  document.getElementById('vdMetrics').innerHTML = metrics;
  document.getElementById('vdTrend').innerHTML = renderTrendChart(id);
  document.getElementById('vidDrawer').classList.add('vd-open');
  document.getElementById('vidBackdrop').classList.add('vd-open');
}

function renderTrendChart(vid_id) {
  var snaps = _snapMap[vid_id];
  if (!snaps || snaps.length < 2) {
    return '<div class="vd-trend"><div class="vd-trend-no-data">📈 趨勢資料累積中（需至少 2 天快照）</div></div>';
  }

  var W = 440, H = 80, PAD = 6;
  var maxPlays = Math.max.apply(null, snaps.map(function(s){ return s.plays; })) || 1;
  var maxReach = Math.max.apply(null, snaps.map(function(s){ return s.reach; })) || 1;
  var n = snaps.length;

  function px(i) { return PAD + (i / (n-1)) * (W - PAD*2); }
  function pyPlays(v) { return H - PAD - (v / maxPlays) * (H - PAD*2); }
  function pyReach(v) { return H - PAD - (v / maxReach) * (H - PAD*2); }

  // 折線點
  var playsPoints = snaps.map(function(s,i){ return px(i)+','+pyPlays(s.plays); }).join(' ');
  var reachPoints = snaps.map(function(s,i){ return px(i)+','+pyReach(s.reach); }).join(' ');

  // 最新一天的值
  var last = snaps[snaps.length-1];
  var first = snaps[0];
  var playsGrowth = first.plays > 0 ? Math.round((last.plays - first.plays) / first.plays * 100) : 0;
  var growthStr = playsGrowth > 0 ? '+'+playsGrowth+'%' : playsGrowth+'%';
  var growthCol = playsGrowth > 0 ? 'var(--good)' : playsGrowth < 0 ? 'var(--warn)' : 'var(--muted)';

  // X 軸日期標籤（只顯示第一天和最後一天）
  var d1 = snaps[0].date.slice(5);      // MM-DD
  var d2 = last.date.slice(5);

  var svg = '<svg class="vd-trend-chart" viewBox="0 0 '+W+' '+H+'" preserveAspectRatio="none">'
    // 播放折線（主）
    + '<polyline points="'+playsPoints+'" fill="none" stroke="var(--teal)" stroke-width="2" stroke-linejoin="round"/>'
    // 觸及折線（次）
    + '<polyline points="'+reachPoints+'" fill="none" stroke="var(--gold)" stroke-width="1.5" stroke-dasharray="4,3" stroke-linejoin="round"/>'
    // 最後一點圓點
    + '<circle cx="'+px(n-1)+'" cy="'+pyPlays(last.plays)+'" r="3" fill="var(--teal)"/>'
    + '</svg>';

  return '<div class="vd-trend">'
    + '<div class="vd-trend-title"><span>📈 20天趨勢</span>'
    + '<span style="font-size:12px;color:'+growthCol+';font-weight:700">播放 '+growthStr+'</span></div>'
    + svg
    + '<div style="display:flex;justify-content:space-between;font-size:10px;color:var(--muted);margin-top:2px"><span>'+d1+'</span><span>'+d2+'</span></div>'
    + '<div class="vd-trend-legend">'
    + '<span><i style="background:var(--teal)"></i>播放 '+fmtNum(last.plays)+'</span>'
    + '<span><i style="background:var(--gold);opacity:.8"></i>觸及 '+fmtNum(last.reach)+'</span>'
    + '</div></div>';
}
function closeVidDrawer() {
  document.getElementById('vidDrawer').classList.remove('vd-open');
  document.getElementById('vidBackdrop').classList.remove('vd-open');
}
</script>

<div id="vidBackdrop" onclick="closeVidDrawer()"></div>
<div id="vidDrawer">
  <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:14px">
    <div style="flex:1;min-width:0;padding-right:12px">
      <div id="vdTitle" style="font-size:15px;font-weight:800;line-height:1.45;word-break:break-all"></div>
      <div id="vdMeta" style="font-size:13px;color:var(--muted);margin-top:5px"></div>
    </div>
    <div style="display:flex;flex-direction:column;align-items:flex-end;gap:6px;flex-shrink:0">
      <div id="vdScore" style="font-size:26px;font-weight:800;line-height:1"></div>
      <button onclick="closeVidDrawer()" style="border:none;background:none;color:var(--muted);font-size:22px;cursor:pointer;line-height:1;padding:0">✕</button>
    </div>
  </div>
  <div id="vdMetrics" style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px"></div>
  <div id="vdTrend"></div>
</div>
</body>
