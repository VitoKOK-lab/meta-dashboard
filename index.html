<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>電商部-短影音成效即時分析</title>
<style>
:root{
  --pink:#9b2c7e;--rose:#7d1a5e;--teal:#0d9488;--gold:#b5924e;
  --black:#1e293b;--white:#fff;--off:#f8f7f5;--ink:#1a1a1a;--muted:#7a7a7a;--border:#e8e8e8;
  --good:#0d9488;--ok:#b5924e;--warn:#be3a67;
  --font:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang TC','Microsoft JhengHei',sans-serif;
  --r:6px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font);background:var(--off);color:var(--ink);min-height:100vh;-webkit-font-smoothing:antialiased}
.hdr{background:var(--white);position:sticky;top:0;z-index:200;border-bottom:2px solid var(--teal);box-shadow:0 1px 8px rgba(0,0,0,.07)}
.hdr-in{max-width:1400px;margin:0 auto;padding:0 16px 0 20px;display:flex;align-items:stretch;min-height:52px;gap:0}
.brand{display:flex;align-items:center;gap:8px;flex-shrink:0;padding-right:12px;border-right:1px solid var(--border)}
.brand-mark{width:26px;height:26px;background:var(--pink);border-radius:5px;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}
.brand-name{font-size:13px;font-weight:800;color:var(--ink);letter-spacing:.3px;line-height:1.3;white-space:nowrap}
.brand-name small{display:block;font-size:11px;font-weight:400;color:var(--muted);letter-spacing:.5px}
@media(max-width:640px){.brand-name small{display:none}}
.hdr-tabs{display:flex;flex:1;overflow-x:auto;scrollbar-width:none}
.hdr-tabs::-webkit-scrollbar{display:none}
.hdr-right{display:flex;align-items:center;gap:8px;flex-shrink:0;padding-left:8px}
.snapshot-badge{font-size:12px;font-weight:700;color:var(--muted);background:var(--off);border:1px solid var(--border);border-radius:6px;padding:3px 8px;white-space:nowrap}
.tab{padding:0 18px;font-size:14px;font-weight:600;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;transition:all .2s;white-space:nowrap;display:flex;align-items:center;height:100%}
.tab:hover{color:var(--ink)}
.tab.active{color:var(--teal);border-bottom-color:var(--teal)}
/* filter toggle buttons */
.flt-row{display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap}
.flt-btn{font-size:12px;font-weight:600;padding:4px 11px;border-radius:20px;border:1.5px solid var(--border);background:var(--white);color:var(--muted);cursor:pointer;transition:all .15s}
.flt-btn.active{background:var(--teal);color:#fff;border-color:var(--teal)}
.page{max-width:1400px;margin:0 auto;padding:24px 28px 60px}
.section{display:none}
.section.active{display:block}
.slabel{font-size:12px;font-weight:800;text-transform:uppercase;letter-spacing:2px;color:var(--muted);margin-bottom:18px;display:flex;align-items:center;gap:10px}
.slabel::before{content:'';width:16px;height:3px;background:var(--gold);border-radius:2px;flex-shrink:0}

/* ── 總覽 KPI ── */
.kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:28px}
@media(max-width:900px){.kpi-grid{grid-template-columns:repeat(2,1fr)}}
.kpi-card{background:var(--white);border:1px solid var(--border);border-radius:var(--r);padding:18px 20px;position:relative;overflow:hidden}
.kpi-label{font-size:12px;color:var(--muted);margin-bottom:8px;font-weight:700;text-transform:uppercase;letter-spacing:.8px}
.kpi-val{font-size:32px;font-weight:600;line-height:1;letter-spacing:-0.5px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.kpi-sub{font-size:13px;color:var(--muted);margin-top:6px}
.kpi-accent{position:absolute;bottom:0;left:0;right:0;height:3px}

/* ── 本週精選 ── */
.top3-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:28px}
@media(max-width:960px){.top3-grid{grid-template-columns:1fr 1fr}}
@media(max-width:600px){.top3-grid{grid-template-columns:1fr}}
.mini-card{background:var(--white);border:1px solid var(--border);border-radius:var(--r);padding:16px}
.mini-card-rank{font-size:12px;font-weight:800;color:var(--muted);margin-bottom:8px;display:flex;align-items:center;gap:6px;text-transform:uppercase;letter-spacing:.8px}
.mini-rank-num{font-size:22px;font-weight:900}
.mini-rank-num.gold-r{color:var(--gold)}
.mini-rank-num.silver-r{color:#b0b0b0}
.mini-rank-num.bronze-r{color:#cd7f32}
.mini-card-title{font-size:15px;font-weight:700;line-height:1.4;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;margin-bottom:12px;min-height:36px}
.mini-score{font-size:38px;font-weight:600;letter-spacing:-1px;line-height:1;margin-bottom:6px}
.mini-card-stats{display:flex;gap:14px;font-size:13px;margin-bottom:10px}
.mini-card-stats span{display:flex;flex-direction:column;gap:2px}
.mini-card-stats .ms-label{color:var(--muted)}
.mini-card-stats .ms-val{font-size:15px;font-weight:800;color:var(--ink)}
.mini-card-why{background:var(--off);border-radius:6px;padding:8px 10px;font-size:13px;color:var(--ink);line-height:1.6}
.mini-plat-badge{display:inline-flex;padding:2px 7px;border-radius:4px;font-size:12px;font-weight:700}

/* ── 平台對比 ── */
.plat-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:28px}
@media(max-width:640px){.plat-grid{grid-template-columns:1fr}}
.plat-card{background:var(--white);border:1px solid var(--border);border-radius:var(--r);padding:18px 20px}
.plat-head{display:flex;align-items:center;gap:10px;margin-bottom:14px;border-bottom:1px solid var(--border);padding-bottom:12px}
.plat-icon{font-size:24px}
.plat-name{font-size:17px;font-weight:800}
.plat-count{font-size:13px;color:var(--muted);margin-left:auto}
.plat-stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.plat-stat{padding:10px;background:var(--off);border-radius:6px}
.plat-stat-label{font-size:12px;color:var(--muted);margin-bottom:4px;font-weight:600}
.plat-stat-val{font-size:18px;font-weight:900}

/* ── 表現分佈 ── */
.perf-dist{background:var(--white);border:1px solid var(--border);border-radius:var(--r);padding:20px;margin-bottom:28px}
.perf-dist-title{font-size:14px;font-weight:700;color:var(--ink);margin-bottom:14px}
.perf-dist-rows{display:flex;flex-direction:column;gap:12px}
.perf-dist-row{display:flex;align-items:center;gap:10px}
.perf-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.perf-label{font-size:14px;color:var(--ink);width:64px;font-weight:600;flex-shrink:0}
.perf-bar-wrap{flex:1;height:10px;background:var(--off);border-radius:5px;overflow:hidden}
.perf-bar-fill{height:100%;border-radius:5px}
.perf-count{font-size:15px;font-weight:800;min-width:24px;text-align:right}
.perf-desc{font-size:12px;color:var(--muted);margin-left:6px;white-space:nowrap}
.perf-toggle{margin-left:auto;flex-shrink:0;font-size:13px;font-weight:700;padding:3px 10px;border-radius:5px;border:1px solid var(--border);background:var(--white);cursor:pointer;color:var(--ink);font-family:var(--font)}
.perf-toggle:hover{background:var(--off)}
.perf-panel{display:none;margin-top:10px;border:1px solid var(--border);border-radius:8px;overflow:hidden}
.perf-panel.open{display:block}
.perf-panel-row{display:grid;grid-template-columns:70px 1fr 60px 50px 60px;gap:8px;padding:9px 14px;border-bottom:1px solid var(--border);align-items:center;font-size:14px}
.perf-panel-row:last-child{border-bottom:none}
.perf-panel-row:hover{background:var(--off)}
.perf-panel-head{background:var(--off);font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--muted)}
.perf-panel-title{font-weight:700;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
@media(max-width:640px){.perf-panel-row{grid-template-columns:60px 1fr 50px}.perf-panel-row>div:nth-child(n+4){display:none}}

/* ── 尋找 ── */
.search-bar-wrap{padding:8px 0 18px}
.search-input{width:100%;box-sizing:border-box;padding:12px 16px;font-size:17px;border:1.5px solid var(--border);border-radius:10px;background:var(--off);color:var(--ink);outline:none;transition:border-color .2s}
.search-input:focus{border-color:var(--teal)}
.search-empty{text-align:center;padding:40px 0;color:var(--muted);font-size:15px}
.search-result{background:var(--white);border:1px solid var(--border);border-radius:var(--r);margin-bottom:14px;overflow:hidden}
.search-result-head{padding:14px 16px 10px;border-bottom:1px solid var(--border)}
.search-result-title{font-size:16px;font-weight:800;line-height:1.4;margin-bottom:4px}
.search-result-meta{font-size:13px;color:var(--muted)}
.search-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;padding:12px 16px}
.search-stat{text-align:center}
.search-stat-val{font-size:18px;font-weight:600}
.search-stat-lbl{font-size:12px;color:var(--muted);margin-top:1px}
.search-comps{padding:0 16px 14px}
.search-comps-title{font-size:13px;font-weight:700;color:var(--muted);margin-bottom:8px;text-transform:uppercase;letter-spacing:.5px}
.search-comp-row{display:flex;align-items:center;gap:10px;padding:6px 0;border-bottom:1px solid var(--border);font-size:14px}
.search-comp-row:last-child{border-bottom:none}
.search-comp-score{font-weight:700;min-width:36px;color:var(--teal)}

/* ── 指揮中心 ── */
.cmd-row{display:grid;grid-template-columns:1fr 2fr;gap:14px;margin-bottom:14px}
.cmd-row-2{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px}
.cmd-row-3{display:grid;grid-template-columns:1fr 1fr 2fr;gap:14px;margin-bottom:14px}
@media(max-width:900px){.cmd-row,.cmd-row-2,.cmd-row-3{grid-template-columns:1fr}}
.cmd-card{background:var(--white);border:1px solid var(--border);border-radius:var(--r);padding:20px}
.cmd-card-label{font-size:12px;font-weight:800;text-transform:uppercase;letter-spacing:1.5px;color:var(--muted);margin-bottom:14px}
/* 頻道健康 */
.health-emoji{font-size:40px;line-height:1;margin-bottom:8px}
.health-sentence{font-size:18px;font-weight:600;line-height:1.3;margin-bottom:6px}
.health-pct{font-size:24px;font-weight:400;letter-spacing:-0.3px}
.health-meta{font-size:13px;color:var(--muted);margin-top:8px;line-height:1.7}
/* 行動清單 */
.action-item{display:flex;align-items:flex-start;gap:10px;padding:10px 0;border-bottom:1px solid var(--border);font-size:15px;line-height:1.6}
.action-item:last-child{border-bottom:none}
.action-icon{font-size:18px;flex-shrink:0;line-height:1.4}
/* 發片節奏 */
.cadence-chart{display:flex;align-items:flex-end;gap:5px;height:64px;margin:14px 0 5px}
.cadence-bar-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px}
.cadence-bar-fill{width:100%;border-radius:3px 3px 0 0;min-height:3px;transition:opacity .2s}
.cadence-bar-fill:hover{opacity:.7}
.cadence-bar-fill.cur{background:var(--pink)}
.cadence-bar-fill.past{background:var(--teal);opacity:.55}
.cadence-bar-fill.past:hover{opacity:.9}
.cadence-lbl{font-size:11px;color:var(--muted);text-align:center;white-space:nowrap}
.cadence-num{font-size:11px;font-weight:700;color:var(--muted)}
/* 主題勝率 */
.winrate-row{display:flex;align-items:center;gap:10px;padding:7px 0;border-bottom:1px solid var(--border);font-size:14px}
.winrate-row:last-child{border-bottom:none}
.winrate-kw{font-weight:700;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.winrate-bar-wrap{width:70px;height:5px;background:var(--off);border-radius:3px;flex-shrink:0}
.winrate-bar-fill{height:100%;border-radius:3px;background:var(--teal)}
.winrate-score{font-size:15px;font-weight:600;min-width:34px;text-align:right;flex-shrink:0}
.winrate-cnt{font-size:12px;color:var(--muted);min-width:28px;text-align:right;flex-shrink:0}
/* 小字數據帶 */
.mini-section-divider{margin:22px 0 16px;display:flex;align-items:center;gap:10px;font-size:12px;font-weight:800;letter-spacing:1.5px;color:var(--muted);text-transform:uppercase}
.mini-section-divider::before,.mini-section-divider::after{content:'';flex:1;height:1px;background:var(--border)}
.mini-kpi-row{display:grid;grid-template-columns:repeat(4,1fr);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;margin-bottom:14px}
@media(max-width:640px){.mini-kpi-row{grid-template-columns:repeat(2,1fr)}}
.mini-kpi-cell{padding:10px 14px;border-right:1px solid var(--border);border-bottom:0;min-width:0;overflow:hidden}
.mini-kpi-cell:nth-child(4n){border-right:none}
@media(max-width:640px){.mini-kpi-cell:nth-child(2n){border-right:none}.mini-kpi-cell:nth-child(-n+2){border-bottom:1px solid var(--border)}}
.mini-kpi-lbl{font-size:12px;color:var(--muted);margin-bottom:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.mini-kpi-val{font-size:20px;font-weight:400;letter-spacing:-0.3px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.mini-kpi-sub{font-size:12px;color:var(--muted);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.mini-top3{background:var(--white);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;margin-bottom:14px}
.mini-top3-row{display:flex;align-items:center;gap:10px;padding:9px 14px;border-bottom:1px solid var(--border);font-size:14px}
/* ── 產出效率 ── */
.eff-num{font-size:34px;font-weight:400;letter-spacing:-1px;line-height:1;margin-bottom:4px}
.eff-sub{font-size:14px;color:var(--muted);line-height:1.6;margin-top:6px}
/* ── 演算法起飛 ── */
.rising-card{background:linear-gradient(135deg,rgba(155,44,126,.05),rgba(13,148,136,.05));border:1.5px solid rgba(155,44,126,.2);border-radius:var(--r);padding:16px 18px;margin-bottom:14px}
.rising-hdr{font-size:14px;font-weight:800;color:var(--pink);margin-bottom:12px;display:flex;align-items:center;gap:6px}
.rising-row{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid rgba(155,44,126,.1);font-size:14px;cursor:pointer;transition:background .12s;border-radius:4px;padding-left:4px;padding-right:4px}
.rising-row:hover{background:rgba(155,44,126,.06)}
.rising-row:last-child{border-bottom:none}
.rising-gain{font-size:14px;font-weight:700;color:var(--pink);min-width:68px;flex-shrink:0}
.rising-verdict{font-size:13px;font-weight:800;padding:2px 8px;border-radius:4px;flex-shrink:0}
.rv-good{background:rgba(13,148,136,.12);color:#1a9e95}
.rv-miss{background:rgba(190,58,103,.1);color:var(--warn)}
/* ── 粉絲增減 ── */
.follower-totals{display:flex;gap:24px;margin-bottom:14px;flex-wrap:wrap}
.follower-total-item{display:flex;flex-direction:column;gap:2px}
.follower-total-lbl{font-size:12px;color:var(--muted)}
.follower-total-val{font-size:22px;font-weight:800;line-height:1.1}
.follower-table{width:100%;border-collapse:collapse;font-size:14px}
.follower-table th{font-size:12px;color:var(--muted);font-weight:600;padding:4px 10px;text-align:center}
.follower-table th:first-child{text-align:left;padding-left:0}
.follower-table td{padding:9px 10px;text-align:center;border-top:1px solid var(--border)}
.follower-table td:first-child{text-align:left;padding-left:0;font-size:13px;color:var(--muted)}
.follower-table tr.total-row td{border-top:2px solid var(--border);font-weight:700}
.follower-table tr.total-row td:first-child{color:var(--ink)}
/* ── 內容簡報 ── */
.brief-section{background:var(--white);border:1px solid var(--border);border-radius:var(--r);padding:14px 16px;margin-bottom:14px}
.brief-action{background:#fff7ed;border-left:3px solid #f97316;border-radius:0 6px 6px 0;padding:7px 12px;margin:4px 0;font-size:13px;line-height:1.5}
.brief-share-row{display:flex;align-items:center;gap:8px;cursor:pointer;padding:5px 0;border-top:1px solid var(--border);font-size:13px}
.brief-share-row:first-child{border-top:none}
.brief-share-row:hover{opacity:.75}
/* ── 直播 ── */
.live-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.live-stat-row{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:18px}
.live-stat{background:var(--white);border:1px solid var(--border);border-radius:var(--r);padding:10px 14px;flex:1;min-width:100px;text-align:center}
.live-stat-val{font-size:22px;font-weight:700;color:var(--ink);line-height:1.2}
.live-stat-lbl{font-size:11px;color:var(--muted);margin-top:2px}
.live-card{background:var(--white);border:1px solid var(--border);border-radius:var(--r);padding:14px 16px;margin-bottom:12px;transition:box-shadow .15s}
.live-card:hover{box-shadow:0 2px 10px rgba(0,0,0,.08)}
.live-card-head{display:flex;align-items:flex-start;gap:10px;margin-bottom:10px}
.live-badge{background:#ef4444;color:#fff;font-size:11px;font-weight:700;border-radius:4px;padding:2px 7px;white-space:nowrap;flex-shrink:0}
.live-title{font-size:14px;font-weight:600;color:var(--ink);line-height:1.4;flex:1}
.live-meta{font-size:12px;color:var(--muted)}
.live-metrics{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px}
.live-metric{background:var(--off);border-radius:6px;padding:6px 12px;font-size:12px;color:var(--ink);display:flex;flex-direction:column;align-items:center;min-width:64px}
.live-metric-val{font-size:15px;font-weight:700;line-height:1.2}
.live-metric-lbl{font-size:10px;color:var(--muted);margin-top:2px;white-space:nowrap}
.live-metric.lm-main{background:rgba(20,184,166,.08);border:1px solid rgba(20,184,166,.25)}
.live-metric.lm-main .live-metric-val{color:var(--teal);font-size:18px}
.live-metric.lm-eng{background:rgba(234,179,8,.08);border:1px solid rgba(234,179,8,.3)}
.live-metric.lm-eng .live-metric-val{color:#92740a}
.live-empty{text-align:center;padding:60px 0;color:var(--muted);font-size:15px}
.btn-cancel{background:var(--off);color:var(--muted)}
.btn-save{background:var(--teal);color:#fff}
/* ── 近日上片 ── */
.today-list{background:var(--white);border:1px solid var(--border);border-radius:var(--r);overflow:hidden}
.today-row{display:flex;align-items:center;gap:10px;padding:9px 14px;border-bottom:1px solid var(--border);font-size:14px;cursor:pointer;transition:background .12s}
.today-row:hover{background:var(--off)}
.today-row:last-child{border-bottom:none}
/* ── 影片詳細 drawer ── */
#vidBackdrop{display:none;position:fixed;inset:0;background:rgba(0,0,0,.38);z-index:900}
#vidBackdrop.vd-open{display:block}
#vidDrawer{display:none;position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:min(100vw,500px);background:var(--white);border-radius:16px 16px 0 0;padding:20px 18px 36px;z-index:901;box-shadow:0 -6px 32px rgba(0,0,0,.14);max-height:90vh;overflow-y:auto}
#vidDrawer.vd-open{display:block}
.vd-cell{background:var(--off);border-radius:6px;padding:10px 12px;min-width:0}
.vd-lbl{font-size:11px;color:var(--muted);margin-bottom:3px;white-space:nowrap}
.vd-val{font-size:16px;font-weight:700;white-space:nowrap}
/* ── 趨勢圖 ── */
.vd-trend{margin-top:14px;background:var(--off);border-radius:8px;padding:12px 14px}
.vd-trend-title{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center}
.vd-trend-chart{width:100%;height:80px;display:block}
.vd-trend-legend{display:flex;gap:12px;margin-top:6px}
.vd-trend-legend span{font-size:11px;color:var(--muted);display:flex;align-items:center;gap:4px}
.vd-trend-legend i{display:inline-block;width:18px;height:2px;border-radius:2px;flex-shrink:0}
.vd-trend-no-data{font-size:12px;color:var(--muted);text-align:center;padding:16px 0}
/* ── 題材策略 ── */
.theme-cols{display:grid;grid-template-columns:1fr 1fr;gap:16px}
@media(max-width:900px){.theme-cols{grid-template-columns:1fr}}
.theme-col{background:var(--white);border:1px solid var(--border);border-radius:var(--r);padding:20px}
.theme-col-head{font-size:16px;font-weight:800;margin-bottom:18px;padding-bottom:12px;border-bottom:2px solid var(--border);display:flex;align-items:center;gap:8px}
.theme-sec{margin-bottom:20px}
.theme-sec:last-child{margin-bottom:0}
.theme-sec-title{font-size:12px;font-weight:800;text-transform:uppercase;letter-spacing:1.2px;margin-bottom:10px;display:flex;align-items:center;gap:6px}
.theme-kw-row{display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid var(--border);font-size:14px}
.theme-kw-row:last-child{border-bottom:none}
.theme-kw-name{font-weight:700;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.theme-kw-meta{font-size:12px;color:var(--muted);margin-top:3px;line-height:1.4}
/* ── 內容分類卡 ── */
.cat-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(270px,1fr));gap:14px;margin-bottom:22px}
.cat-card{background:var(--white);border:1px solid var(--border);border-radius:var(--r);padding:14px 16px;transition:box-shadow .15s}
.cat-card:hover{box-shadow:0 3px 12px rgba(0,0,0,.09)}
.cat-card.cat-ready{border-color:rgba(20,184,166,.4);background:#fafffe}
.cat-head{display:flex;align-items:flex-start;gap:10px;margin-bottom:8px}
.cat-emoji{font-size:26px;flex-shrink:0;line-height:1}
.cat-label{font-size:15px;font-weight:700;color:var(--ink);margin-bottom:3px}
.cat-viewer{font-size:11px;color:var(--muted);line-height:1.45}
.cat-score-wrap{margin-left:auto;flex-shrink:0;text-align:right}
.cat-score{font-size:24px;font-weight:700;line-height:1}
.cat-score-lbl{font-size:10px;color:var(--muted)}
.cat-row{display:flex;gap:7px;flex-wrap:wrap;align-items:center;font-size:12px;color:var(--muted);margin-bottom:8px}
.cat-divider{width:1px;height:12px;background:var(--border);flex-shrink:0}
.cat-best{font-size:12px;color:var(--ink);background:var(--off);border-radius:6px;padding:5px 9px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.cat-suggest-box{background:#e8f8f7;border:1px solid #a5d8d4;border-radius:10px;padding:12px 16px;margin-bottom:20px;font-size:13px;line-height:1.9}
.cat-toggle-hint{font-size:11px;color:var(--muted);margin-top:8px;text-align:center;letter-spacing:.5px}
.cat-detail{margin-top:10px;border-top:1px solid var(--border);padding-top:10px}
.cat-detail-head{font-size:11px;font-weight:700;color:var(--muted);letter-spacing:.8px;margin-bottom:8px}
.cat-vid-row{display:flex;align-items:center;gap:7px;padding:5px 0;border-bottom:1px solid var(--border);font-size:12px}
.cat-vid-row:last-child{border-bottom:none}
.cat-vid-rank{font-size:11px;color:var(--muted);min-width:14px;text-align:center;flex-shrink:0}
.cat-vid-title{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--ink);font-weight:500}
.cat-vid-grade{font-weight:800;font-size:13px;flex-shrink:0;min-width:18px;text-align:right}
.cat-vid-plays{color:var(--muted);flex-shrink:0;white-space:nowrap}
.cat-vid-cr{color:var(--muted);flex-shrink:0;white-space:nowrap}
.trend-pill{font-size:12px;font-weight:800;padding:2px 6px;border-radius:3px;flex-shrink:0}
.t-up{background:rgba(13,148,136,.12);color:#1a9e95}
.t-down{background:rgba(190,58,103,.1);color:var(--warn)}
.t-flat{background:rgba(181,146,78,.1);color:#7a6428}
.t-new{background:rgba(100,100,100,.1);color:var(--muted)}
.theme-kw-score{font-size:16px;font-weight:700;min-width:24px;text-align:right;flex-shrink:0}
.theme-kw-cnt{font-size:12px;color:var(--muted);min-width:26px;text-align:right;flex-shrink:0}
.theme-recycle-row{display:flex;align-items:center;gap:8px;padding:7px 10px;border-bottom:1px solid var(--border);font-size:14px;background:var(--off);border-radius:4px;margin-bottom:5px}
.theme-recycle-row:last-child{margin-bottom:0}
.mini-top3-row:last-child{border-bottom:none}
.mini-top3-rank{font-size:16px;font-weight:700;min-width:20px;flex-shrink:0}
.mini-top3-title{flex:1;font-weight:700;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.mini-top3-score{font-size:16px;font-weight:400;min-width:36px;text-align:right;flex-shrink:0}
.mini-top3-plays{font-size:13px;color:var(--muted);min-width:56px;text-align:right;flex-shrink:0}
/* ── 低效分析頁 ── */
.waste-advice{background:rgba(190,58,103,.06);border:1px solid rgba(190,58,103,.2);border-radius:8px;padding:14px 16px;margin-bottom:16px;font-size:15px;line-height:1.8}
.waste-advice-title{font-weight:900;font-size:15px;margin-bottom:6px;color:var(--warn)}
.waste-kw-grid{display:flex;flex-wrap:wrap;gap:6px;margin-top:10px}
.waste-kw{padding:4px 10px;border-radius:20px;font-size:14px;font-weight:700;background:rgba(190,58,103,.1);color:var(--warn)}
.waste-stat-row{display:flex;gap:10px;flex-wrap:wrap;margin:10px 0}
.waste-stat{flex:1;min-width:110px;background:var(--off);border-radius:8px;padding:10px 12px;text-align:center}
.waste-stat-val{font-size:20px;font-weight:900;color:var(--warn)}
.waste-stat-lbl{font-size:12px;color:var(--muted);margin-top:2px}
/* 忠實度 per-video 情境標籤 */
.sit-tag{display:inline-block;font-size:12px;font-weight:800;padding:2px 7px;border-radius:3px;margin-left:6px;vertical-align:middle}
.sit-no-engage{background:rgba(251,146,60,.15);color:#c2580a}
.sit-no-reach{background:rgba(99,102,241,.15);color:#4f46e5}
.sit-both-low{background:rgba(190,58,103,.12);color:var(--warn)}
/* 行動建議 */
.tier-advice{background:var(--off);border-left:3px solid var(--border);border-radius:0 6px 6px 0;padding:10px 14px;margin:8px 0 4px;font-size:14px;line-height:1.7;color:var(--text)}


/* ── 排行亮點解析 ── */
.insight-box{background:linear-gradient(135deg,rgba(13,148,136,.06),rgba(181,146,78,.06));border:1px solid rgba(13,148,136,.25);border-radius:var(--r);padding:16px 18px;margin-bottom:18px}
.insight-box.hidden{display:none}
.insight-title{font-size:13px;font-weight:800;color:var(--teal);text-transform:uppercase;letter-spacing:.8px;margin-bottom:8px}
.insight-body{font-size:14px;line-height:1.8;color:var(--ink)}

/* ── 通用元件 ── */
.alert-banner{display:flex;align-items:center;gap:12px;background:rgba(190,58,103,.06);border:1px solid rgba(190,58,103,.2);border-left:4px solid var(--warn);border-radius:var(--r);padding:12px 18px;margin-bottom:20px;font-size:15px}
.alert-banner.hidden{display:none}
.alert-banner strong{color:var(--warn)}
.state-box{background:var(--white);border:1px solid var(--border);border-radius:var(--r);padding:48px 24px;text-align:center;color:var(--muted)}
.state-box .state-icon{font-size:42px;margin-bottom:12px}
.state-box h3{font-size:17px;font-weight:700;color:var(--ink);margin-bottom:6px}
.yday-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:16px}
@media(max-width:900px){.yday-grid{grid-template-columns:1fr}}
.vcard{background:var(--white);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;transition:transform .2s,box-shadow .2s}
.vcard:hover{transform:translateY(-2px);box-shadow:0 8px 28px rgba(0,0,0,.08)}
.vcard.tier3{border-color:rgba(190,58,103,.3)}
.vcard-top{padding:16px 18px 12px;display:flex;align-items:flex-start;gap:14px;border-bottom:1px solid var(--border)}
.vcard-thumb{width:52px;height:52px;border-radius:8px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:26px}
.vcard-meta{flex:1;min-width:0}
.vcard-badges{display:flex;gap:6px;margin-bottom:6px;flex-wrap:wrap}
.badge{display:inline-flex;align-items:center;gap:3px;padding:2px 8px;border-radius:4px;font-size:12px;font-weight:700;letter-spacing:.3px}
.badge.commerce{background:rgba(155,44,126,.1);color:var(--pink);border:1px solid rgba(155,44,126,.2)}
.badge.traffic{background:rgba(13,148,136,.1);color:#0d9488;border:1px solid rgba(13,148,136,.2)}
.badge.fb{background:rgba(197,179,130,.12);color:#7a6428}
.badge.ig{background:rgba(13,148,136,.1);color:#1a9e95}
.badge.tier1{background:rgba(13,148,136,.12);color:#1a9e95}
.badge.tier2{background:rgba(197,179,130,.15);color:#7a6428}
.badge.tier3{background:rgba(190,58,103,.08);color:var(--warn)}
.vcard-title{font-size:15px;font-weight:700;line-height:1.4;margin-bottom:2px;display:-webkit-box;-webkit-line-clamp:1;-webkit-box-orient:vertical;overflow:hidden;cursor:pointer;user-select:none}
.vcard-title.expanded{display:block;overflow:visible;white-space:normal;-webkit-line-clamp:unset}
.vcard-date{font-size:13px;color:var(--muted)}
.score-tile{width:54px;height:54px;border-radius:6px;flex-shrink:0;display:flex;flex-direction:column;align-items:center;justify-content:center;border:1.5px solid;line-height:1}
.score-tile .st-num{font-size:22px;font-weight:600;letter-spacing:-0.5px}
.score-tile .st-lbl{font-size:10px;color:var(--muted);margin-top:3px;font-weight:400}
.score-tile.st-good{background:rgba(13,148,136,.07);border-color:rgba(13,148,136,.3)}
.score-tile.st-mid{background:rgba(155,44,126,.07);border-color:rgba(155,44,126,.3)}
.score-tile.st-low{background:rgba(190,58,103,.07);border-color:rgba(190,58,103,.28)}
.score-tile.st-b{background:rgba(181,146,78,.07);border-color:rgba(181,146,78,.4)}
.score-tile.st-na{background:var(--off);border-color:var(--border)}
.vcard-metrics{padding:14px 18px;display:grid;grid-template-columns:repeat(3,1fr);gap:10px;border-bottom:1px solid var(--border)}
.metric-label{font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px}
.metric-val{font-size:16px;font-weight:800;margin-top:2px}
.metric-val.pink{color:var(--pink)}
.metric-val.teal{color:#1a9e95}
.metric-val.gold{color:#7a6428}
.mbar{height:3px;background:var(--off);border-radius:2px;overflow:hidden;margin-top:4px}
.mbar-fill{height:100%;border-radius:2px}
.retention-strip{padding:10px 18px;border-bottom:1px solid var(--border);background:var(--off)}
.retention-label{font-size:12px;color:var(--muted);margin-bottom:5px}
.retention-bar{display:flex;gap:1px;height:18px;align-items:flex-end}
.ret-seg{flex:1;border-radius:1px;min-width:2px}
.retention-insight{font-size:13px;color:var(--ink);margin-top:6px;padding:5px 8px;background:var(--white);border-radius:4px;line-height:1.5}
.vcard-bottom{padding:12px 18px;display:flex;gap:16px;background:var(--off)}
.loyalty-val{font-size:15px;font-weight:800}
.loyalty-val.t1{color:#1a9e95}
.loyalty-val.t2{color:#7a6428}
.loyalty-val.t3{color:var(--warn)}
.tier-explain{font-size:12px;color:var(--muted);margin-top:3px;line-height:1.5}
.devbadge{display:inline-flex;font-size:13px;font-weight:700;padding:2px 7px;border-radius:4px}
.devbadge.pos{background:rgba(13,148,136,.12);color:#1a9e95}
.devbadge.neg{background:rgba(190,58,103,.08);color:var(--warn)}
.devbadge.neu{background:rgba(197,179,130,.12);color:#7a6428}
.period-btns{display:flex;gap:0;border:1px solid var(--border);border-radius:var(--r);overflow:hidden;width:fit-content}
.period-btn{padding:7px 18px;font-size:14px;font-weight:700;cursor:pointer;background:var(--white);color:var(--muted);border:none;border-right:1px solid var(--border);font-family:var(--font);transition:all .2s}
.period-btn:last-child{border-right:none}
.period-btn.active{background:var(--black);color:var(--white)}
.top20-tabs{display:flex;gap:0;margin-bottom:20px;border:1px solid var(--border);border-radius:var(--r);overflow:hidden;width:fit-content}
.t20-tab{padding:9px 22px;font-size:15px;font-weight:700;cursor:pointer;background:var(--white);color:var(--muted);transition:all .2s;border-right:1px solid var(--border)}
.t20-tab:last-child{border-right:none}
.t20-tab.active.traffic{background:var(--teal);color:var(--white)}
.t20-tab.active.commerce{background:var(--pink);color:var(--white)}
.top20-filters{display:flex;gap:10px;margin-bottom:18px;flex-wrap:wrap;align-items:center}
.filter-select{background:var(--white);border:1px solid var(--border);border-radius:6px;padding:6px 12px;font-size:14px;font-family:var(--font);color:var(--ink);cursor:pointer}
.ranking-table{background:var(--white);border:1px solid var(--border);border-radius:var(--r);overflow:hidden}
.table-scroll{overflow-x:auto}
.rt-head{display:grid;background:var(--off);border-bottom:1px solid var(--border);padding:9px 18px;font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--muted);grid-template-columns:32px 2fr 64px 80px 80px 80px 90px 80px}
.rt-row{display:grid;padding:12px 18px;border-bottom:1px solid var(--border);align-items:center;transition:background .15s;grid-template-columns:32px 2fr 64px 80px 80px 80px 90px 80px;min-width:600px}
@media(max-width:640px){
  .rt-head{grid-template-columns:28px 1fr 44px;padding:8px 12px}
  .rt-head div:nth-child(n+4){display:none}
  .rt-row{grid-template-columns:28px 1fr 44px;min-width:0;padding:10px 12px}
  .rt-row>div:nth-child(n+4){display:none}
  .rt-row>div:nth-child(2){min-width:0;overflow:hidden}
}
.rt-row:last-child{border-bottom:none}
.rt-row:hover{background:var(--off)}
.rt-rank{font-size:18px;font-weight:900;color:var(--border)}
.rt-rank.gold-r{color:var(--gold)}
.rt-rank.silver-r{color:#b0b0b0}
.rt-rank.bronze-r{color:#cd7f32}
.rt-title{font-size:15px;font-weight:700;line-height:1.3;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;cursor:pointer;user-select:none;max-width:100%}
.rt-title.expanded{white-space:normal;overflow:visible;text-overflow:unset}
.rt-date{font-size:13px;color:var(--muted);margin-top:1px}
.rt-score{font-size:22px;font-weight:600;letter-spacing:-0.5px}
.rt-score.t-score{color:#1a9e95}
.rt-score.c-score{color:var(--pink)}
.rt-num{font-size:15px;font-weight:700}
.reuse-badge{display:inline-flex;align-items:center;gap:4px;padding:3px 8px;border-radius:4px;font-size:12px;font-weight:800;background:var(--black);color:var(--white)}
.loading-row{padding:20px;text-align:center;color:var(--muted);font-size:15px;border-bottom:1px solid var(--border)}
.mob-nav{display:none;position:fixed;bottom:0;left:0;right:0;background:var(--black);border-top:1px solid rgba(255,255,255,.08);z-index:200;padding:8px 0 max(8px,env(safe-area-inset-bottom))}
.mob-nav-in{display:flex;justify-content:space-around}
.mob-tab{display:flex;flex-direction:column;align-items:center;gap:2px;color:rgba(255,255,255,.3);font-size:11px;cursor:pointer;padding:4px 10px;transition:color .2s}
.mob-tab .mi{font-size:20px}
.mob-tab.active{color:var(--teal)}
@media(max-width:640px){.mob-nav{display:block}body{padding-bottom:70px}.hdr-tabs{display:none}}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
</style>
</head>
<body>

<header class="hdr">
  <div class="hdr-in">
    <div class="brand">
      <div class="brand-mark">◈</div>
      <div class="brand-name">電商部<small>短影音成效即時分析</small></div>
    </div>
    <div class="hdr-tabs">
      <div class="tab active" onclick="switchTab('overview',this)">📊 近期</div>
      <div class="tab" onclick="switchTab('summary',this)">📋 總覽</div>
      <div class="tab" onclick="switchTab('theme',this)">🎯 關鍵字</div>
      <div class="tab" onclick="switchTab('top20',this)">🏆 排行榜</div>
      <div class="tab" onclick="switchTab('search',this)">🔍 尋找</div>
      <div class="tab" onclick="switchTab('live',this)">📺 直播</div>
    </div>
    <div class="hdr-right">
      <span class="snapshot-badge" id="snapshotBadge">載入中…</span>
    </div>
  </div>
</header>

<div class="page">

  <!-- 本週指令 -->
  <div class="section active" id="sec-overview">
    <div id="cmdCenter"></div>
  </div>

  <!-- 總覽 -->
  <div class="section" id="sec-summary">
    <div id="summaryCenter"></div>
  </div>

  <!-- 題材策略 -->
  <div class="section" id="sec-theme">
    <div id="themeContent"></div>
  </div>

  <!-- 排行榜 -->
  <div class="section" id="sec-top20">
    <div class="slabel">長期排行 · Top 10</div>
    <div class="top20-tabs">
      <div class="t20-tab active traffic" onclick="switchTop20('traffic',this)">📈 流量型 Top 10</div>
      <div class="t20-tab commerce" onclick="switchTop20('commerce',this)">🛍 帶貨型 Top 10</div>
    </div>
    <div class="top20-filters">
      <div class="period-btns">
        <button class="period-btn active" onclick="setPeriod('7',this)">7天</button>
        <button class="period-btn" onclick="setPeriod('30',this)">30天</button>
        <button class="period-btn" onclick="setPeriod('90',this)">90天</button>
        <button class="period-btn" onclick="setPeriod('9999',this)">全部</button>
      </div>
      <select class="filter-select" id="platFilter" onchange="renderTop10()">
        <option value="all">全部平台</option>
        <option value="fb">Facebook</option>
        <option value="ig">Instagram</option>
      </select>
    </div>
    <div class="insight-box hidden" id="insightBox">
      <div class="insight-title">🔍 第一名亮點解析</div>
      <div class="insight-body" id="insightBody"></div>
    </div>
    <div class="table-scroll">
      <div class="ranking-table" id="rankingTable">
        <div class="loading-row">載入中…</div>
      </div>
    </div>
  </div>

  <!-- 尋找 -->
  <div class="section" id="sec-search">
    <div class="search-bar-wrap">
      <input class="search-input" id="searchInput" type="text" placeholder="輸入關鍵字或部份片名…" oninput="runSearch(this.value)" autocomplete="off">
    </div>
    <div id="searchResults"></div>
  </div>

  <!-- 直播 -->
  <div class="section" id="sec-live">
    <div id="liveContent"></div>
  </div>

</div>

<div class="mob-nav">
  <div class="mob-nav-in">
    <div class="mob-tab active" onclick="mobileSwitchTab('overview',this)"><span class="mi">📊</span>近期</div>
    <div class="mob-tab" onclick="mobileSwitchTab('theme',this)"><span class="mi">🎯</span>關鍵字</div>
    <div class="mob-tab" onclick="mobileSwitchTab('top20',this)"><span class="mi">🏆</span>排行</div>
    <div class="mob-tab" onclick="mobileSwitchTab('live',this)"><span class="mi">📺</span>直播</div>
  </div>

const AVG = { fb: STATIC_DATA.avg_fb, ig: STATIC_DATA.avg_ig };

// ── 每日快照 CSV 載入 ─────────────────────────────────────────────────────────
var _snapMap = {};  // { video_id: [{date,plays,reach,comments,likes,shares,score}, ...] }
(function loadSnapshots() {
  fetch('data/daily_snapshots.csv')
    .then(function(r){ return r.ok ? r.text() : ''; })
    .then(function(text) {
      if (!text) return;
      var lines = text.trim().split('\n');
      if (lines.length < 2) return;
      var headers = lines[0].split(',');
      for (var i = 1; i < lines.length; i++) {
        var cols = lines[i].split(',');
        var row = {};
        headers.forEach(function(h, idx){ row[h.trim()] = cols[idx] ? cols[idx].trim() : ''; });
        var vid = row.video_id;
        if (!vid) continue;
        if (!_snapMap[vid]) _snapMap[vid] = [];
        _snapMap[vid].push({
          date:     row.date,
          plays:    parseInt(row.plays)    || 0,
          reach:    parseInt(row.reach)    || 0,
          comments: parseInt(row.comments) || 0,
          likes:    parseInt(row.likes)    || 0,
          shares:   parseInt(row.shares)   || 0,
          score:    parseInt(row.score)    || 0,
        });
      }
      // 每個影片按日期排序
      Object.keys(_snapMap).forEach(function(vid){
        _snapMap[vid].sort(function(a,b){ return a.date.localeCompare(b.date); });
      });
    })
    .catch(function(){});  // 第一次執行前檔案不存在，靜默忽略
})();

// ── 評分 helpers ──────────────────────────────────────────────────────────
// S≥80 / A≥65 / B≥50 / C<50 / F=未及格（播放不足）
function scoreGrade(v) {
  if (!v.plays)    return '—';
  if (v.low_plays) return 'F';
  var s = v.score || 0;
  return s >= 80 ? 'S' : s >= 65 ? 'A' : s >= 50 ? 'B' : 'C';
}
function scoreStr(v) { return scoreGrade(v); }  // 所有顯示點統一用 grade
function scoreCol(v) {
  var g = scoreGrade(v);
  return g==='S'?'#1a9e95' : g==='A'?'#7b5ea7' : g==='B'?'#b5924e' : g==='C'?'#be3a67' : 'var(--muted)';
}
function scoreTileCls(v) {
  var g = scoreGrade(v);
  return g==='S'?'st-good' : g==='A'?'st-mid' : g==='B'?'st-b' : g==='C'?'st-low' : 'st-na';
}
// 計算用（排除未及格影片的分數干擾）
function scoreNum(v) { return (v.low_plays || !v.plays) ? 0 : (v.score || 0); }
// 關鍵字/主題平均分 → 等級（平均值，非個別影片）
function avgGrade(avg) {
  return avg >= 80 ? 'S' : avg >= 65 ? 'A' : avg >= 50 ? 'B' : 'C';
}
function avgGradeCol(avg) {
  return avg >= 80 ? '#1a9e95' : avg >= 65 ? '#7b5ea7' : avg >= 50 ? '#b5924e' : '#be3a67';
}
// score tile HTML — 大字母，不顯示數字
function scoreTileHtml(v) {
  var g = scoreGrade(v), c = scoreCol(v), cls = scoreTileCls(v);
  return '<div class="score-tile '+cls+'"><span class="st-num" style="color:'+c+'">'+g+'</span></div>';
}

// ── 工具 ──────────────────────────────────────────────────────────────────
function daysBetween(isoStr) {
  return Math.floor((Date.now() - new Date(isoStr)) / 86400000);
}
function fmtDate(isoStr) {
  return new Date(isoStr).toLocaleDateString('zh-TW', {
    timeZone: 'Asia/Taipei', month: '2-digit', day: '2-digit'
  });
}
function fmtNum(n) {
  n = n || 0;
  return n >= 1000000 ? (n/1000000).toFixed(2)+'M'
       : n >= 1000    ? (n/1000).toFixed(1)+'K'
       : n.toString();
}
function reachDev(v) {
  var avg = v.platform === 'fb' ? AVG.fb : AVG.ig;
  return avg > 0 ? ((v.reach || 0) - avg) / avg : 0;
}


function loyaltyRate(v) {
  return v.plays > 0 ? ((v.comments + v.shares) / v.plays * 100) : 0;
}

// 動態門檻：依自身資料的 30th / 70th 百分位數計算
var LOYALTY_HIGH, LOYALTY_LOW;
(function() {
  var rates = STATIC_DATA.videos
    .filter(function(v){ return v.plays > 0; })
    .map(function(v){ return loyaltyRate(v); })
    .sort(function(a,b){ return a-b; });
  if (rates.length < 5) { LOYALTY_HIGH = 3; LOYALTY_LOW = 1; return; }
  LOYALTY_HIGH = rates[Math.floor(rates.length * 0.7)];
  LOYALTY_LOW  = rates[Math.floor(rates.length * 0.3)];
})();

function loyaltyTier(v) {
  var r = loyaltyRate(v);
  return r >= LOYALTY_HIGH ? 'tier1' : r >= LOYALTY_LOW ? 'tier2' : 'tier3';
}
function tierLabel(lt) {
  return { tier1:'🟢 優質', tier2:'🟡 正常', tier3:'🔴 待優化' }[lt];
}
function tierExplain(lt) {
  var h = LOYALTY_HIGH != null ? LOYALTY_HIGH.toFixed(2) : '—';
  var l = LOYALTY_LOW  != null ? LOYALTY_LOW.toFixed(2)  : '—';
  return {
    tier1: '原粉互動率 ≥ ' + h + '%，高於頻道七成影片',
    tier2: '原粉互動率 ' + l + '–' + h + '%，屬頻道正常水準',
    tier3: '原粉互動率 < ' + l + '%，低於頻道三成影片，建議複盤'
  }[lt];
}

// 月比月變化（上月同期 = 上月 1 日到同天數為止）
function momBadge(pct) {
  var up = pct >= 0;
  return '<span style="display:inline-flex;align-items:center;font-size:14px;font-weight:900;padding:2px 7px;border-radius:4px;margin-left:4px;background:'
    + (up ? 'rgba(13,148,136,.15);color:#0d9488' : 'rgba(190,58,103,.12);color:#be3a67') + '">'
    + (up ? '▲ +' : '▼ ') + Math.abs(pct) + '%</span>';
}
function momStr(curr, prev, noDataLabel) {
  if (prev === 0) return noDataLabel || '尚無上月資料';
  var pct = Math.round((curr - prev) / prev * 100);
  return '上月同期 ' + fmtNum(prev) + momBadge(pct);
}
function momRateStr(currPct, prevPct) {
  if (prevPct === 0) return '尚無上月資料';
  var pct = Math.round((currPct - prevPct) / prevPct * 100);
  return '上月同期 ' + prevPct.toFixed(2) + '%' + momBadge(pct);
}

// 標題截斷（14字）
function truncTitle(s, len) {
  len = len || 14;
  if (!s) return '';
  return s.length > len ? s.slice(0, len) + '…' : s;
}
function escAttr(s) {
  return (s || '').replace(/&/g,'&amp;').replace(/"/g,'&quot;');
}

// ── 為何表現好 ────────────────────────────────────────────────────────────
function whyGood(v) {
  var reasons = [];
  var shareRate = v.plays ? v.shares/v.plays*100 : 0;
  var commentRate = v.plays ? v.comments/v.plays*100 : 0;
  var dev = reachDev(v);
  var completion = v.retention && v.retention.length > 0 ? v.retention[v.retention.length-1]*100 : 0;
  if (shareRate >= 2) reasons.push('轉發強（' + shareRate.toFixed(2) + '%）');
  else if (shareRate >= 1) reasons.push('轉發不錯（' + shareRate.toFixed(2) + '%）');
  if (commentRate >= 1.5) reasons.push('留言熱（' + commentRate.toFixed(2) + '%）');
  else if (commentRate >= 0.8) reasons.push('留言偏高（' + commentRate.toFixed(2) + '%）');
  if (dev >= 0.5) reasons.push('觸及遠超平均 +' + (dev*100).toFixed(0) + '%（演算法推爆）');
  else if (dev >= 0.2) reasons.push('觸及高於平均 +' + (dev*100).toFixed(0) + '%');
  if (completion >= 35) reasons.push('完播率佳（' + completion.toFixed(0) + '%）');
  if (reasons.length === 0) reasons.push('各項指標均衡穩健');
  return reasons.join('、');
}

// ── 排行第一名亮點解析 ────────────────────────────────────────────────────
function buildHighlight(v) {
  if (!v) return '';
  var lines = [];
  var shareRate = v.plays ? v.shares/v.plays*100 : 0;
  var commentRate = v.plays ? v.comments/v.plays*100 : 0;
  var dev = reachDev(v);
  var completion = v.retention && v.retention.length > 0 ? v.retention[v.retention.length-1]*100 : 0;
  var title = (v.description || v.caption || '').slice(0,40);
  lines.push('《' + title + (title.length >= 40 ? '…' : '') + '》拿到第一名的原因：');
  if (shareRate >= 1) lines.push('📤 轉發率 ' + shareRate.toFixed(2) + '% — 觀眾願意主動分享，話題性強');
  if (commentRate >= 0.8) lines.push('💬 留言率 ' + commentRate.toFixed(2) + '% — 觀眾有話說，互動熱度高');
  if (dev >= 0.2) lines.push('🚀 觸及超出均值 +' + (dev*100).toFixed(0) + '% — 演算法判斷優質並加大推播');
  if (completion >= 25) lines.push('⏱ 完播率 ' + completion.toFixed(0) + '% — 觀眾願意看到最後');
  if (lines.length === 1) lines.push('各項指標表現均衡，綜合評分最高');
  return lines.join('<br>');
}

// ── 續看率下降點分析 ──────────────────────────────────────────────────────
function retentionInsight(retention) {
  if (!retention || retention.length < 4) return '';
  var drops = [];
  for (var i = 1; i < retention.length; i++) {
    var drop = retention[i-1] - retention[i];
    if (drop > 0) drops.push({ i: i, drop: drop });
  }
  drops.sort(function(a, b) { return b.drop - a.drop; });
  var parts = [];
  if (drops.length > 0) {
    var pct = Math.round(drops[0].i / retention.length * 100);
    parts.push('最大流失點在 ' + pct + '% 進度');
  }
  var final = retention[retention.length-1] * 100;
  if (final < 15) parts.push('完播率 ' + final.toFixed(1) + '% 偏低，結尾可加強');
  else if (final >= 30) parts.push('完播率 ' + final.toFixed(1) + '% 佳，觀眾投入度高');
  return parts.length ? '💡 ' + parts.join('；') : '';
}

// ── Canvas 環形評分 ───────────────────────────────────────────────────────
function drawRing(canvas, score) {
  if (!canvas) return;
  var dpr = devicePixelRatio || 1;
  canvas.width = 58 * dpr; canvas.height = 58 * dpr;
  var ctx = canvas.getContext('2d');
  ctx.scale(dpr, dpr);
  var cx = 29, cy = 29, r = 24, lw = 5;
  var color = score >= 80 ? '#1a9e95' : score >= 65 ? '#9b2c7e' : '#be3a67';
  ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI * 2);
  ctx.strokeStyle = '#f0f0f0'; ctx.lineWidth = lw; ctx.stroke();
  if (score > 0) {
    ctx.beginPath();
    ctx.arc(cx, cy, r, -Math.PI / 2, -Math.PI / 2 + (score / 100) * Math.PI * 2);
    ctx.strokeStyle = color; ctx.lineWidth = lw; ctx.lineCap = 'round'; ctx.stroke();
  }
}

// ── 續看率條 ──────────────────────────────────────────────────────────────
function renderRetentionStrip(v) {
  var retention = v.retention;
  if (!retention || retention.length === 0) return '';
  var max = retention[0] || 1;
  var segs = retention.map(function(val) {
    var pct = (val / max * 100).toFixed(0);
    var alpha = (0.2 + (val / max) * 0.8).toFixed(2);
    return '<div class="ret-seg" style="height:' + Math.max(pct, 4) + '%;background:rgba(0,0,0,' + alpha + ')"></div>';
  }).join('');
  var last = retention[retention.length - 1];
  var insight = retentionInsight(retention);
  return '<div class="retention-strip">'
    + '<div class="retention-label">觀眾續看率曲線 · 完播率 ' + (last * 100).toFixed(1) + '%</div>'
    + '<div class="retention-bar">' + segs + '</div>'
    + (insight ? '<div class="retention-insight">' + insight + '</div>' : '')
    + '</div>';
}

function renderContentBrief(all, rising, todayVids) {
  var GCOL = {S:'#1a9e95',A:'#7b5ea7',B:'#b5924e',C:'#be3a67',F:'#9ca3af'};

  // 關鍵字提取（用於工作指令推薦）
  var KSTOP = new Set(['的','了','我','你','他','她','它','們','在','是','有','和','也','但','都','到','就','這','那',
    '什麼','一個','可以','沒有','因為','所以','如果','不是','可是','還是','只是','還有','就是','其實',
    '現在','已經','非常','一起','大家','真的','這個','那個','一下','一直','好像','感覺','覺得']);
  function _xKw(v) {
    var text=(v.description||v.caption||''), tags=[];
    text=text.replace(/#([^\s#，。！？、；：\n]+)/g,function(m,t){tags.push('#'+t);return ' ';});
    var res=[],seen=new Set();
    text.split(/[\s，。！？、；：「」『』【】（）(),.!?;:\n]+/).filter(Boolean).concat(tags).forEach(function(w){
      w=w.trim();if(!w)return;
      if(w[0]!=='#'&&(w.length<2||KSTOP.has(w)||/^\d+$/.test(w)))return;
      if(!seen.has(w)){seen.add(w);res.push(w);}
    });
    return res.slice(0,8);
  }

  var html = '';

  // ════════════════════════════════════════════
  // ① 昨今成效：每支影片一張卡
  // ════════════════════════════════════════════
  var recent2 = all.filter(function(v){ return daysBetween(v.created_time) <= 1; })
    .sort(function(a,b){ return b.created_time.localeCompare(a.created_time); });

  html += '<div class="brief-section">';
  html += '<div class="slabel" style="margin-bottom:8px">📅 昨今成效</div>';

  if (recent2.length === 0) {
    html += '<div style="color:var(--muted);font-size:13px;padding:6px 0">近48小時沒有新影片</div>';
  } else {
    recent2.forEach(function(v) {
      var age     = daysBetween(v.created_time);

      var gcol    = GCOL[grade] || 'var(--muted)';
      var plays   = v.plays || 0;
      var prev    = v.plays_prev || 0;
      var gain    = prev > 0 ? plays - prev : null;
      var nf      = v.newFollowers || 0;
      var cr      = plays > 0 ? (v.comments||0)/plays*100 : 0;
      var sr      = plays > 0 ? (v.shares||0)/plays*100 : 0;
      var title   = truncTitle(v.description||v.caption||'', 24);
      var safeId  = String(v.id||'').replace(/['"\\]/g,'');
      var platIcon= v.platform==='fb'?'📘 FB':'📸 IG';
      var typeIcon= v.type==='commerce'?'🛍':'📈';
      var isViral = (age===0&&plays>=3000)||(gain!==null&&gain>=1000);

      // 信號徽章
      var badges = [];

        badges.push('<span style="background:#fff7ed;color:#f97316;font-size:11px;font-weight:700;border-radius:4px;padding:2px 6px">🔥 爆紅中</span>');
      if (nf >= 10)
        badges.push('<span style="background:#e8f8f7;color:#1a9e95;font-size:11px;font-weight:700;border-radius:4px;padding:2px 6px">👥 +'+nf+' 粉</span>');
      if (v.type==='commerce' && plays>=200 && cr>=1)
        badges.push('<span style="background:rgba(123,94,167,.1);color:#7b5ea7;font-size:11px;font-weight:700;border-radius:4px;padding:2px 6px">🛍 帶貨熱</span>');
      if (v.type==='commerce' && plays>=200 && v.platform==='ig' && (v.saved||0)/plays*100>=0.5)
        badges.push('<span style="background:#fff0f6;color:#be3a67;font-size:11px;font-weight:700;border-radius:4px;padding:2px 6px">🏷 加入收藏</span>');
      if (age===0 && plays<1500)
        badges.push('<span style="background:var(--off);color:var(--muted);font-size:11px;border-radius:4px;padding:2px 6px">⏳ 觀察中</span>');

      // 數字列
      var nums = fmtNum(plays)+' 播';
      if (gain!==null && gain>0) nums += ' <span style="color:#1a9e95;font-weight:700">↑+'+fmtNum(gain)+'</span>';
      if (cr>0) nums += '　留言 '+cr.toFixed(1)+'%';
      if (sr>0) nums += '　分享 '+sr.toFixed(1)+'%';
      if (v.platform==='ig' && (v.saved||0)>0) nums += '　收藏 '+fmtNum(v.saved);

      html += '<div onclick="showVidDetail(\''+safeId+'\')" style="display:flex;align-items:flex-start;gap:10px;padding:10px 12px;background:var(--white);border-radius:8px;margin-bottom:7px;border:1.5px solid '+(isViral?'#f97316':'var(--border)')+';cursor:pointer">'
        +'<div style="font-size:22px;font-weight:800;color:'+gcol+';min-width:22px;line-height:1.2;margin-top:1px">'+grade+'</div>'
        +'<div style="flex:1;min-width:0">'
          +'<div style="font-weight:700;font-size:14px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+title+'</div>'
          +'<div style="font-size:12px;color:var(--muted);margin-top:2px">'+platIcon+' '+typeIcon+' '+ageStr+' · '+nums+'</div>'
          +(badges.length?'<div style="display:flex;gap:4px;flex-wrap:wrap;margin-top:5px">'+badges.join('')+'</div>':'')
        +'</div>'
        +'<div style="font-size:11px;color:var(--muted);flex-shrink:0;align-self:center">›</div>'
        +'</div>';

  }
  html += '</div>';

  // ════════════════════════════════════════════
  // ② 本週快報
  // ════════════════════════════════════════════
  var thisWeek = all.filter(function(v){ return daysBetween(v.created_time)<=7; });
  var lastWeek = all.filter(function(v){ var d=daysBetween(v.created_time); return d>7&&d<=14; });

  var gd={S:0,A:0,B:0,C:0,F:0};
  thisWeek.forEach(function(v){ var g=scoreGrade(v); if(gd[g]!==undefined) gd[g]++; });

  var twP=thisWeek.reduce(function(s,v){return s+(v.plays||0);},0);

  var pDelta=lwP>0?Math.round((twP-lwP)/lwP*100):null;

  var twNf=thisWeek.reduce(function(s,v){return s+(v.newFollowers||0);},0);
  var twCr=twP>0?thisWeek.reduce(function(s,v){return s+(v.comments||0);},0)/twP*100:0;
  var lwCr=lwP>0?lastWeek.reduce(function(s,v){return s+(v.comments||0);},0)/lwP*100:0;
  var crDelta=lwCr>0?twCr-lwCr:null;

  function dStr(val,unit,decimals){
    if(val===null)return '';
    var d=decimals||0;
    var s=val>=0?'▲ +':'▼ ';
    var col=val>=0?'#1a9e95':'#be3a67';
    return ' <span style="color:'+col+';font-weight:700">'+s+Math.abs(val).toFixed(d)+unit+' vs 上週</span>';
  }

  var gradeBar = ['S','A','B','C','F'].filter(function(g){return gd[g]>0;}).map(function(g){
    return '<span style="color:'+GCOL[g]+';font-weight:700;margin-right:8px">'+g+'<span style="color:var(--muted);font-weight:400;font-size:12px">×'+gd[g]+'</span></span>';
  }).join('');

  html += '<div class="brief-section" style="margin-top:10px">';
  html += '<div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:6px">'

    +'<span style="font-size:14px">'+gradeBar+'</span>'
    +'</div>';
  html += '<div style="font-size:12px;color:var(--muted);display:flex;gap:16px;flex-wrap:wrap">'
    +'<span>播放 '+fmtNum(twP)+dStr(pDelta,'%',0)+'</span>'
    +(twNf>0?'<span>👥 本週帶粉 <strong style="color:#1a9e95">+'+fmtNum(twNf)+'</strong></span>':'')
    +'<span>留言率 '+twCr.toFixed(2)+'%'+dStr(crDelta,'%pt',2)+'</span>'
    +'</div>';
  html += '</div>';

  // ════════════════════════════════════════════
  // ③ 今日工作指令
  // ════════════════════════════════════════════
  var tasks = [];

  // 🔥 趁熱追拍
  if (rising.length > 0) {
    var hot = rising[0];
    var hotGain = (hot.plays||0)-(hot.plays_prev||0);
    tasks.push({icon:'🔥',col:'#f97316',label:'趁熱追拍',
      detail:'《'+truncTitle(hot.description||hot.caption||'',18)+'》↑+'+fmtNum(hotGain)+' 播，拍同主題延伸片'});
  }

  // 📤 今天 FB/IG 沒發
  var fbT=all.filter(function(v){return v.platform==='fb'&&daysBetween(v.created_time)===0;});
  var igT=all.filter(function(v){return v.platform==='ig'&&daysBetween(v.created_time)===0;});
  if(!fbT.length&&!igT.length) tasks.push({icon:'📤',col:'var(--warn)',label:'今天還沒發片',detail:'FB 和 IG 都還沒上片'});
  else if(!fbT.length) tasks.push({icon:'📤',col:'var(--warn)',label:'FB 今天沒發',detail:'IG 已發，建議補 FB'});
  else if(!igT.length) tasks.push({icon:'📤',col:'var(--warn)',label:'IG 今天沒發',detail:'FB 已發，建議補 IG'});

  // 🎬 建議拍：高等級 + 14天沒拍的主題
  var kwMap={};
  all.forEach(function(v){
    var age=daysBetween(v.created_time);
    _xKw(v).forEach(function(k){
      if(!kwMap[k]) kwMap[k]={scores:[],lastAge:9999,nf:0};
      kwMap[k].scores.push(scoreNum(v));
      kwMap[k].nf+=(v.newFollowers||0);
      if(age<kwMap[k].lastAge) kwMap[k].lastAge=age;
    });
  });
  var shootNext=Object.keys(kwMap).filter(function(k){
    var d=kwMap[k]; if(d.scores.length<3||d.lastAge<14) return false;
    return d.scores.reduce(function(s,x){return s+x;},0)/d.scores.length>=65;
  }).sort(function(a,b){
    var sa=kwMap[a].scores.reduce(function(s,x){return s+x;},0)/kwMap[a].scores.length;
    var sb=kwMap[b].scores.reduce(function(s,x){return s+x;},0)/kwMap[b].scores.length;
    return sb-sa;
  }).slice(0,2);
  if(shootNext.length){
    var recs=shootNext.map(function(k){
      var d=kwMap[k];
      var avg=d.scores.reduce(function(s,x){return s+x;},0)/d.scores.length;
      return '<strong>'+k+'</strong>（均'+avgGrade(avg)+'・'+d.lastAge+'天沒拍'+(d.nf>0?'・曾帶+'+fmtNum(d.nf)+'粉':'')+'）';
    }).join('　');
    tasks.push({icon:'🎬',col:'#7b5ea7',label:'建議今天拍',detail:recs});
  }

  // ♻️ 復投：高分+帶過粉的30-120天舊片
  var recyc=all.filter(function(v){
    var age=daysBetween(v.created_time);
    var g=scoreGrade(v);
    return age>=30&&age<=120&&(g==='S'||g==='A');

    var wa=(b.newFollowers||0)*3+(scoreNum(b));
    var wb=(a.newFollowers||0)*3+(scoreNum(a));
    return wa-wb;
  })[0];
  if(recyc){
    var rAge=daysBetween(recyc.created_time);
    var rNf=recyc.newFollowers||0;
    tasks.push({icon:'♻️',col:'#1a9e95',label:'考慮復投',

  }

  if(tasks.length){
    html += '<div class="brief-section" style="margin-top:10px">';
    html += '<div class="slabel" style="margin-bottom:8px">📋 今日工作指令</div>';

        +'<span style="font-size:16px;flex-shrink:0;line-height:1.4">'+t.icon+'</span>'
        +'<div style="line-height:1.6"><span style="font-weight:700">'+t.label+'</span><span style="color:var(--muted)"> — </span>'+t.detail+'</div>'
        +'</div>';
    });
    html += '</div>';
  }

  return html;
}

  var lastMonthStart   = new Date(now.getFullYear(), now.getMonth() - 1, 1);
  var lastMonthSameEnd = new Date(now.getFullYear(), now.getMonth() - 1, dayOfMonth + 1);
  var thisMonth    = all.filter(function(v){ return new Date(v.created_time) >= thisMonthStart; });
  var lastMonthSame= all.filter(function(v){ var d=new Date(v.created_time); return d>=lastMonthStart && d<lastMonthSameEnd; });
  var week         = all.filter(function(v){ return daysBetween(v.created_time) <= 7; });
  var fbWeek       = week.filter(function(v){ return v.platform==='fb'; });
  var igWeek       = week.filter(function(v){ return v.platform==='ig'; });

  // ── 頻道健康：近30天 vs 前30天平均分 ──
  var recent30 = all.filter(function(v){ var d=daysBetween(v.created_time); return d<=30; });
  var prev30   = all.filter(function(v){ var d=daysBetween(v.created_time); return d>30&&d<=60; });
  var avgR = recent30.length ? recent30.reduce(function(s,v){return s+(v.score||0);},0)/recent30.length : 0;
  var avgP = prev30.length   ? prev30.reduce(function(s,v){return s+(v.score||0);},0)/prev30.length   : 0;
  var hPct = avgP > 0 ? Math.round((avgR-avgP)/avgP*100) : 0;
  var hArrow = Math.abs(hPct)<5 ? '→' : hPct>0 ? '↑' : '↓';
  var hColor = Math.abs(hPct)<5 ? '#b5924e' : hPct>0 ? '#1a9e95' : '#be3a67';

  // ── 行動清單（純規則） ──
  var actions = [];
  var weekCounts4 = 0;
  for (var ww=0;ww<4;ww++) weekCounts4 += all.filter(function(v){var d=daysBetween(v.created_time);return d>ww*7&&d<=(ww+1)*7;}).length;
  var avgWeekly = Math.round(weekCounts4/4);
  var thisW = all.filter(function(v){return daysBetween(v.created_time)<=7;}).length;
  if (thisW===0)                              actions.push({t:'warn',msg:'本週還沒有新影片！近月均速 '+avgWeekly+' 支/週，今天就要開拍。'});
  else if (avgWeekly>1 && thisW < avgWeekly-1) actions.push({t:'warn',msg:'本週只發了 '+thisW+' 支，低於近月均速（'+avgWeekly+' 支/週），需要補齊。'});
  else                                         actions.push({t:'good',msg:'本週發片節奏正常（'+thisW+' 支），繼續維持。'});
  // 新百分位制：50分是中位數，35分（底部四分位）才是真正需要注意的
  var badCom = all.filter(function(v){return v.type==='commerce'&&!v.low_plays&&(v.score||0)<35&&daysBetween(v.created_time)<=30;});
  if (badCom.length>=3) actions.push({t:'warn',msg:'近30天有 '+badCom.length+' 支帶貨影片分數偏低（底部25%），複盤這些片的共同點，減少類似主題。'});
  var hidden = all.filter(function(v){return loyaltyTier(v)!=='tier3'&&reachDev(v)<-0.3&&daysBetween(v.created_time)<=60;});
  if (hidden.length>=2) actions.push({t:'act',msg:'有 '+hidden.length+' 支影片鐵粉喜歡但流量低，值得改標題重發或加投廣告。'});
  var fbR=all.filter(function(v){return v.platform==='fb'&&daysBetween(v.created_time)<=30;}).length;
  var igR=all.filter(function(v){return v.platform==='ig'&&daysBetween(v.created_time)<=30;}).length;
  if (fbR>0&&igR>0&&Math.max(fbR,igR)/Math.min(fbR,igR)>=2){
    var more=fbR>igR?'FB':'IG', less=fbR>igR?'IG':'FB';
    actions.push({t:'act',msg:'近30天 '+more+'（'+Math.max(fbR,igR)+'支）遠多於 '+less+'（'+Math.min(fbR,igR)+'支），建議補齊 '+less+'。'});
  }
  if (avgP>0&&avgR<avgP*0.85) actions.push({t:'warn',msg:'近30天平均分 '+avgR.toFixed(0)+' vs 前30天 '+avgP.toFixed(0)+'，品質下滑 '+Math.abs(hPct)+'%，需檢視內容方向。'});
  if (actions.length===1&&actions[0].t==='good') actions.push({t:'good',msg:'帶貨影片品質穩定，繼續這個方向。'});

  // ── 發片節奏：近 8 週 ──
  var wkData=[];
  for (var w2=7;w2>=0;w2--){
    var c=all.filter(function(v){var d=daysBetween(v.created_time);return d>w2*7&&d<=(w2+1)*7;}).length;
    wkData.push({cnt:c,label:w2===0?'本週':w2===1?'上週':'-'+w2+'週'});
  }
  var maxWk=Math.max.apply(null,wkData.map(function(x){return x.cnt;})); if(maxWk<1)maxWk=1;

  // ── 主題勝率：關鍵字平均分 ≥ 3支 ──
  var STOP3=new Set(['的','了','我','你','他','她','它','們','在','是','有','和','也','但','都','到','就','這','那','什麼','一個','可以','沒有','因為','所以','如果','不是','可是','還是','只是','還有','就是','其實','現在','已經','非常','一起','大家','真的','這個','那個','一下','一直','好像','感覺','覺得']);
  var kwS={},kwC={};
  all.forEach(function(v){
    var txt=(v.description||v.caption||''),tags=[];
    txt=txt.replace(/#([^\s#，。！？、；：\n]+)/g,function(m,t){tags.push('#'+t);return ' ';});
    var tokens=txt.split(/[\s，。！？、；：「」『』【】（）(),.!?;:\n]+/).filter(Boolean).concat(tags);
    var seen=new Set();
    tokens.forEach(function(w){
      w=w.trim(); if(!w)return;
      var isH=w[0]==='#';
      if(!isH&&(w.length<2||STOP3.has(w)||/^\d+$/.test(w)))return;
      if(seen.has(w))return; seen.add(w);
      kwS[w]=(kwS[w]||0)+(v.score||0);
      kwC[w]=(kwC[w]||0)+1;
    });
  });
  var kwTop=Object.keys(kwC).filter(function(k){return kwC[k]>=3;})
    .map(function(k){return{kw:k,avg:kwS[k]/kwC[k],cnt:kwC[k]};})
    .sort(function(a,b){return b.avg-a.avg;}).slice(0,8);
  var maxAvg=kwTop.length?kwTop[0].avg:100;

  // ── Mini KPIs（小字帶） ──
  var thisComPlays=thisMonth.filter(function(v){return v.type==='commerce';}).reduce(function(s,v){return s+(v.plays||0);},0);
  var prevComPlays=lastMonthSame.filter(function(v){return v.type==='commerce';}).reduce(function(s,v){return s+(v.plays||0);},0);
  var thisIgSaves =thisMonth.filter(function(v){return v.platform==='ig';}).reduce(function(s,v){return s+(v.saved||0);},0);
  var prevIgSaves =lastMonthSame.filter(function(v){return v.platform==='ig';}).reduce(function(s,v){return s+(v.saved||0);},0);
  var thisCom=thisMonth.filter(function(v){return v.type==='commerce'&&v.plays>0;});
  var prevCom=lastMonthSame.filter(function(v){return v.type==='commerce'&&v.plays>0;});
  var comCR=thisCom.length?thisCom.reduce(function(s,v){return s+(v.comments||0);},0)/thisCom.reduce(function(s,v){return s+(v.plays||0);},0)*100:0;
  var prevComCR=prevCom.length?prevCom.reduce(function(s,v){return s+(v.comments||0);},0)/prevCom.reduce(function(s,v){return s+(v.plays||0);},0)*100:0;
  var thisFbNewF=thisMonth.filter(function(v){return v.platform==='fb';}).reduce(function(s,v){return s+(v.newFollowers||0);},0);
  var prevFbNewF=lastMonthSame.filter(function(v){return v.platform==='fb';}).reduce(function(s,v){return s+(v.newFollowers||0);},0);
  var prevFbCount=lastMonthSame.filter(function(v){return v.platform==='fb';}).length;

  // ── Top 3 本週（小列表） ──
  var top3=week.slice().sort(function(a,b){return b.score-a.score;}).slice(0,3);
  var rnk=['🥇','🥈','🥉'];

  // ── Loyalty（小字） ──
  var lh=LOYALTY_HIGH!=null?LOYALTY_HIGH.toFixed(2):'—';
  var ll=LOYALTY_LOW!=null?LOYALTY_LOW.toFixed(2):'—';
  var t1v=week.filter(function(v){return loyaltyTier(v)==='tier1';}),
      t2v=week.filter(function(v){return loyaltyTier(v)==='tier2';}),
      t3v=week.filter(function(v){return loyaltyTier(v)==='tier3';});
  var tot=week.length||1;

  // ── 健康描述（白話） ──
  var hEmoji, hSentence;
  if (avgP===0)      { hEmoji='📊'; hSentence='開始累積數據中'; }
  else if (hPct>10)  { hEmoji='🚀'; hSentence='越來越好！品質持續提升'; }
  else if (hPct>4)   { hEmoji='📈'; hSentence='小幅進步，方向正確'; }
  else if (hPct>=-4) { hEmoji='➡️'; hSentence='穩定發揮，維持現狀'; }
  else if (hPct>=-10){ hEmoji='📉'; hSentence='稍微滑落，需要留意'; }
  else               { hEmoji='⚠️'; hSentence='品質明顯下滑，需要檢視'; }

  // ── 產出效率 ──
  var lastMonthAll = all.filter(function(v){ var d=new Date(v.created_time); return d>=lastMonthStart && d<thisMonthStart; });
  var thisQual = thisMonth.filter(function(v){ return (v.score||0)>=65; });
  var prevQual = lastMonthAll.filter(function(v){ return (v.score||0)>=65; });
  var qualRate = thisMonth.length ? Math.round(thisQual.length/thisMonth.length*100) : 0;
  var prevQualRate = lastMonthAll.length ? Math.round(prevQual.length/lastMonthAll.length*100) : 0;
  var qualTrend = prevQualRate > 0 ? qualRate - prevQualRate : 0;
  var qualColor = qualTrend > 0 ? '#1a9e95' : qualTrend < -5 ? '#be3a67' : '#b5924e';

  // ── 演算法正在推 ──
  var rising = all.filter(function(v){
    if (daysBetween(v.created_time) > 7) return false;
    var prev = v.playsPrev || 0; if (prev <= 0) return false;
    return (v.plays||0) - prev >= 300;
  }).sort(function(a,b){ return ((b.plays||0)-(b.playsPrev||0))-((a.plays||0)-(a.playsPrev||0)); }).slice(0,5);

  // ── 近日上片（永遠顯示 48 小時內）──
  var todayVids = all.filter(function(v){ return daysBetween(v.created_time)<=1; })
    .sort(function(a,b){ return new Date(b.created_time)-new Date(a.created_time); });

  // ── 商品名提取（帶貨型最後一個 # ）──
  var PRODUCT_STOP = new Set(['分享','推薦','廣告','優惠','限時','商品','購物','福利','爆款','開箱','直播','新品','精選','連結','詳情','合作','代購','贈品','限量','活動','折扣','特價','上架','測評','體驗','好物','清單','必買','必看','流量']);
  function extractProduct(v) {
    if (v.type !== 'commerce') return '';
    var text = v.description || v.caption || '';
    var tags = [];
    text.replace(/#([^\s#，。！？、；：\n]+)/g, function(m, t) { tags.push(t); });
    if (!tags.length) return '';
    var last = tags[tags.length - 1].trim();
    if (last.length < 2 || PRODUCT_STOP.has(last) || /^\d+$/.test(last)) return '';
    return last;
  }

  // ── RENDER ──
  document.getElementById('cmdCenter').innerHTML =

    // ① 今日內容簡報（最頂端，團隊每早必看）
    renderContentBrief(all, rising, todayVids)

    // ② 粉絲小字（精簡資訊列）
    + renderFollowerChart()

    // ③ 近日上片
    + '<div class="slabel">近日上片 <span style="color:var(--muted);font-weight:400;font-size:13px">（點列查看詳細數據）</span></div>'
    + '<div class="flt-row" id="recentFltRow">'
    + '<button class="flt-btn active" onclick="setRecentFlt(\'type\',\'all\',this)">全部</button>'
    + '<button class="flt-btn" onclick="setRecentFlt(\'type\',\'traffic\',this)">📈 流量型</button>'
    + '<button class="flt-btn" onclick="setRecentFlt(\'type\',\'commerce\',this)">🛍 帶貨型</button>'
    + '<span style="width:1px;background:var(--border);margin:0 4px;align-self:stretch"></span>'
    + '<button class="flt-btn active" onclick="setRecentFlt(\'plat\',\'all\',this)">全部</button>'
    + '<button class="flt-btn" onclick="setRecentFlt(\'plat\',\'fb\',this)">📘 FB</button>'
    + '<button class="flt-btn" onclick="setRecentFlt(\'plat\',\'ig\',this)">📸 IG</button>'
    + '</div>'
    + '<div id="recentList" style="margin-bottom:14px"></div>'

    // ② 演算法起飛（緊急行動，有資料才顯示）
    + (rising.length===0 ? '' :
      '<div class="rising-card">'
      + '<div class="rising-hdr">🚀 演算法正在推這些片</div>'
      + rising.map(function(v){
          var gain = (v.plays||0)-(v.playsPrev||0);
          var lt = loyaltyTier(v);
          var caught = lt!=='tier3';
          var title = truncTitle(v.description||v.caption||'',16);
          var age = daysBetween(v.created_time);
          var safeId = String(v.id||'').replace(/['"\\]/g,'');
          return '<div class="rising-row" onclick="showVidDetail(\''+safeId+'\')">'
            +'<span class="rising-gain">+'+fmtNum(gain)+' 播</span>'
            +'<span style="flex:1;font-weight:700;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+title+'</span>'
            +'<span style="font-size:13px;color:var(--muted);flex-shrink:0;margin:0 6px">'+age+'天前</span>'
            +'<span class="rising-verdict '+(caught?'rv-good':'rv-miss')+'">'+(caught?'✅ 有效流量':'⚠️ 無效流量')+'</span>'
            +'<span style="font-size:12px;color:var(--muted);flex-shrink:0;margin-left:4px">›</span>'
            +'</div>';
        }).join('')
      + '</div>')

    + '';

  // 初始渲染近日上片列表
  renderRecentList(todayVids);
}

// ── 近日上片 filter 狀態 ──────────────────────────────────────────────────
var _recentTypeFlt = 'all', _recentPlatFlt = 'all', _todayVidsCache = [];

function setRecentFlt(dim, val, btn) {
  if (dim === 'type') {
    _recentTypeFlt = val;
    document.querySelectorAll('#recentFltRow .flt-btn').forEach(function(b){
      if (['all','traffic','commerce'].includes(b.textContent.replace(/📈|🛍|\s/g,'').trim()) ||
          b.textContent.includes('全部') && b !== document.querySelectorAll('#recentFltRow .flt-btn')[3] &&
          b !== document.querySelectorAll('#recentFltRow .flt-btn')[4] &&
          b !== document.querySelectorAll('#recentFltRow .flt-btn')[5]) {
        // handled below
      }
    });
    // simpler: toggle by index group
    var btns = document.querySelectorAll('#recentFltRow .flt-btn');
    [btns[0],btns[1],btns[2]].forEach(function(b){ b.classList.remove('active'); });
    btn.classList.add('active');
  } else {
    _recentPlatFlt = val;
    var btns = document.querySelectorAll('#recentFltRow .flt-btn');
    [btns[3],btns[4],btns[5]].forEach(function(b){ b.classList.remove('active'); });
    btn.classList.add('active');
  }
  renderRecentList(_todayVidsCache);
}

function renderRecentList(vids) {
  _todayVidsCache = vids;
  var filtered = vids.filter(function(v){
    if (_recentTypeFlt !== 'all' && v.type !== _recentTypeFlt) return false;
    if (_recentPlatFlt !== 'all' && v.platform !== _recentPlatFlt) return false;
    return true;
  });
  var PRODUCT_STOP2 = new Set(['分享','推薦','廣告','優惠','限時','商品','購物','福利','爆款','開箱','直播','新品','精選','連結','詳情','合作','代購','贈品','限量','活動','折扣','特價','上架','測評','體驗','好物','清單','必買','必看','流量']);
  function getProduct(v) {
    if (v.type !== 'commerce') return '';
    var tags = []; (v.description||v.caption||'').replace(/#([^\s#，。！？、；：\n]+)/g,function(m,t){tags.push(t);});
    if (!tags.length) return '';
    var last = tags[tags.length-1].trim();
    if (last.length < 2 || PRODUCT_STOP2.has(last) || /^\d+$/.test(last)) return '';
    return last;
  }
  var el = document.getElementById('recentList');
  if (!el) return;
  if (filtered.length === 0) {
    el.innerHTML = '<div style="color:var(--muted);font-size:14px;padding:8px 0 16px">近48小時'+(vids.length?'無符合條件的影片':'暫無新影片')+'</div>';
    return;
  }
  el.innerHTML = '<div class="today-list">'
    + filtered.slice(0,15).map(function(v){
        var sc=scoreCol(v);
        var lt=loyaltyTier(v);
        var age=daysBetween(v.created_time);
        var nf=v.newFollowers||0;
        var nfStr=nf>0?'<span style="font-size:12px;color:#1a9e95;font-weight:700;flex-shrink:0;white-space:nowrap">+'+fmtNum(nf)+'粉</span>':'';
        var safeId=(v.id||'').replace(/['"\\]/g,'');
        var typeBadge=v.type==='commerce'
          ?'<span style="font-size:10px;background:#fff3e0;color:#e65100;border-radius:3px;padding:1px 4px;flex-shrink:0;font-weight:700">🛍</span>'
          :'<span style="font-size:10px;background:#e8f5e9;color:#1b5e20;border-radius:3px;padding:1px 4px;flex-shrink:0;font-weight:700">📈</span>';
        var prod=getProduct(v);
        var prodBadge=prod?'<span style="font-size:11px;background:rgba(155,44,126,.1);color:var(--pink);border-radius:3px;padding:1px 5px;flex-shrink:0;font-weight:700;margin-left:3px">'+prod+'</span>':'';
        return '<div class="today-row" onclick="showVidDetail(\''+safeId+'\')">'
          +'<span style="font-size:12px;color:var(--muted);min-width:30px;flex-shrink:0">'+(age===0?'今天':'昨天')+'</span>'
          +'<span style="font-size:13px;flex-shrink:0">'+(v.platform==='fb'?'📘':'📸')+'</span>'
          +typeBadge
          +'<span style="flex:1;font-weight:700;font-size:14px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+truncTitle(v.description||v.caption||'',15)+'</span>'
          +prodBadge
          +'<span class="badge '+lt+'" style="flex-shrink:0;margin:0 4px">'+tierLabel(lt)+'</span>'
          +nfStr
          +'<span style="font-size:'+(v.low_plays?'12px':'15px')+';font-weight:700;color:'+sc+';min-width:28px;text-align:right;flex-shrink:0;margin-left:4px">'+scoreStr(v)+'</span>'
          +'<span style="font-size:12px;color:var(--muted);flex-shrink:0;margin-left:3px">›</span>'
          +'</div>';
      }).join('')
    + '</div>';
}

function miniKpiCell(lbl, val, sub, hint) {
  return '<div class="mini-kpi-cell"><div class="mini-kpi-lbl">'+lbl+'</div>'
    + '<div class="mini-kpi-val">'+val+'</div>'
    + '<div class="mini-kpi-sub">'+sub+'</div>'
    + (hint?'<div style="font-size:12px;color:var(--border);margin-top:1px">'+hint+'</div>':'')
    + '</div>';
}

// ── 總覽 ──────────────────────────────────────────────────────────────────
function initSummary() {
  var all = STATIC_DATA.videos;
  var now = new Date();
  var dayOfMonth = now.getDate();
  var thisMonthStart = new Date(now.getFullYear(), now.getMonth(), 1);
  var lastMonthStart = new Date(now.getFullYear(), now.getMonth()-1, 1);
  var lastMonthSameEnd = new Date(now.getFullYear(), now.getMonth()-1, dayOfMonth+1);
  var thisMonth    = all.filter(function(v){ return new Date(v.created_time) >= thisMonthStart; });
  var lastMonthSame= all.filter(function(v){ var d=new Date(v.created_time); return d>=lastMonthStart&&d<lastMonthSameEnd; });
  var lastMonthAll = all.filter(function(v){ var d=new Date(v.created_time); return d>=lastMonthStart&&d<thisMonthStart; });

  var recent30=all.filter(function(v){return daysBetween(v.created_time)<=30;});
  var prev30  =all.filter(function(v){var d=daysBetween(v.created_time);return d>30&&d<=60;});
  var avgR=recent30.length?recent30.reduce(function(s,v){return s+(v.score||0);},0)/recent30.length:0;
  var avgP=prev30.length  ?prev30.reduce(function(s,v){return s+(v.score||0);},0)/prev30.length  :0;
  var hPct=avgP>0?Math.round((avgR-avgP)/avgP*100):0;
  var hColor=Math.abs(hPct)<5?'#b5924e':hPct>0?'#1a9e95':'#be3a67';
  var hEmoji,hSentence;
  if(avgP===0){hEmoji='📊';hSentence='開始累積數據中';}
  else if(hPct>10){hEmoji='🚀';hSentence='越來越好！品質持續提升';}
  else if(hPct>4){hEmoji='📈';hSentence='小幅進步，方向正確';}
  else if(hPct>=-4){hEmoji='➡️';hSentence='穩定發揮，維持現狀';}
  else if(hPct>=-10){hEmoji='📉';hSentence='稍微滑落，需要留意';}
  else{hEmoji='⚠️';hSentence='品質明顯下滑，需要檢視';}

  var thisQual=thisMonth.filter(function(v){return (v.score||0)>=65;});
  var prevQual=lastMonthAll.filter(function(v){return (v.score||0)>=65;});
  var qualRate=thisMonth.length?Math.round(thisQual.length/thisMonth.length*100):0;
  var prevQualRate=lastMonthAll.length?Math.round(prevQual.length/lastMonthAll.length*100):0;
  var qualTrend=prevQualRate>0?qualRate-prevQualRate:0;
  var qualColor=qualTrend>0?'#1a9e95':qualTrend<-5?'#be3a67':'#b5924e';

  // 行動清單
  var weekCounts4=0;
  for(var ww=0;ww<4;ww++) weekCounts4+=all.filter(function(v){var d=daysBetween(v.created_time);return d>ww*7&&d<=(ww+1)*7;}).length;
  var avgWeekly=Math.round(weekCounts4/4);

  // 發片節奏
  var wkData=[];
  for(var w2=7;w2>=0;w2--){var c=all.filter(function(v){var d=daysBetween(v.created_time);return d>w2*7&&d<=(w2+1)*7;}).length;wkData.push({cnt:c,label:w2===0?'本週':w2===1?'上週':'-'+w2+'週'});}
  var maxWk=Math.max.apply(null,wkData.map(function(x){return x.cnt;}));if(maxWk<1)maxWk=1;
  var cadenceSummary='近4週均速 '+avgWeekly+' 支/週，本週 '+thisW+' 支 '+(thisW>=avgWeekly?'👍':'⚡');

  // 主題勝率
  var STOP3=new Set(['的','了','我','你','他','她','它','們','在','是','有','和','也','但','都','到','就','這','那','什麼','一個','可以','沒有','因為','所以','如果','不是','可是','還是','只是','還有','就是','其實','現在','已經','非常','一起','大家','真的','這個','那個','一下','一直','好像','感覺','覺得']);
  var kwS={},kwC={};
  all.forEach(function(v){var txt=(v.description||v.caption||''),tags=[];txt=txt.replace(/#([^\s#，。！？、；：\n]+)/g,function(m,t){tags.push('#'+t);return ' ';});var tokens=txt.split(/[\s，。！？、；：「」『』【】（）(),.!?;:\n]+/).filter(Boolean).concat(tags);var seen=new Set();tokens.forEach(function(w){w=w.trim();if(!w)return;var isH=w[0]==='#';if(!isH&&(w.length<2||STOP3.has(w)||/^\d+$/.test(w)))return;if(seen.has(w))return;seen.add(w);kwS[w]=(kwS[w]||0)+(v.score||0);kwC[w]=(kwC[w]||0)+1;});});
  var kwTop=Object.keys(kwC).filter(function(k){return kwC[k]>=3;}).map(function(k){return{kw:k,avg:kwS[k]/kwC[k],cnt:kwC[k]};}).sort(function(a,b){return b.avg-a.avg;}).slice(0,8);
  var maxAvg=kwTop.length?kwTop[0].avg:100;

  // 詳細數字
  var thisComPlays=thisMonth.filter(function(v){return v.type==='commerce';}).reduce(function(s,v){return s+(v.plays||0);},0);
  var prevComPlays=lastMonthSame.filter(function(v){return v.type==='commerce';}).reduce(function(s,v){return s+(v.plays||0);},0);
  var thisIgSaves=thisMonth.filter(function(v){return v.platform==='ig';}).reduce(function(s,v){return s+(v.saved||0);},0);
  var prevIgSaves=lastMonthSame.filter(function(v){return v.platform==='ig';}).reduce(function(s,v){return s+(v.saved||0);},0);
