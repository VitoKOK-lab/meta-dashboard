<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>泰熙爾札娜 IP 影片成效儀表板</title>
<style>
:root{
  --pink:#9b2c7e;--rose:#7d1a5e;--teal:#0d9488;--gold:#b5924e;
  --black:#1e293b;--white:#fff;--off:#f8f7f5;--ink:#1a1a1a;--muted:#7a7a7a;--border:#e8e8e8;
  --good:#0d9488;--ok:#b5924e;--warn:#be3a67;
  --font:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang TC','Microsoft JhengHei',sans-serif;
  --r:6px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font);background:var(--off);color:var(--ink);min-height:100vh;-webkit-font-smoothing:antialiased}
.hdr{background:var(--white);position:sticky;top:0;z-index:200;border-bottom:2px solid var(--teal);box-shadow:0 1px 8px rgba(0,0,0,.07)}
.hdr-in{max-width:1400px;margin:0 auto;padding:0 28px;display:flex;align-items:stretch;justify-content:space-between;min-height:56px;gap:16px}
.brand{display:flex;align-items:center;gap:10px}
.brand-mark{width:30px;height:30px;background:var(--pink);border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0}
.brand-name{font-size:13px;font-weight:800;color:var(--ink);letter-spacing:.3px;line-height:1.3}
.brand-name small{display:block;font-size:10px;font-weight:400;color:var(--muted);letter-spacing:.5px}
@media(max-width:640px){.brand-name{font-size:11px;white-space:nowrap}.brand-name small{display:none}}
.hdr-right{display:flex;align-items:center;gap:10px}
.snapshot-badge{font-size:12px;font-weight:700;color:var(--muted);background:var(--off);border:1px solid var(--border);border-radius:6px;padding:4px 10px;white-space:nowrap}
.tabs{background:var(--white);border-bottom:1px solid var(--border)}
.tabs-in{max-width:1400px;margin:0 auto;padding:0 28px;display:flex}
.tab{padding:12px 22px;font-size:13px;font-weight:600;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;transition:all .2s;white-space:nowrap}
.tab:hover{color:var(--ink)}
.tab.active{color:var(--teal);border-bottom-color:var(--teal)}
.page{max-width:1400px;margin:0 auto;padding:24px 28px 60px}
.section{display:none}
.section.active{display:block}
.slabel{font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:2px;color:var(--muted);margin-bottom:18px;display:flex;align-items:center;gap:10px}
.slabel::before{content:'';width:16px;height:3px;background:var(--gold);border-radius:2px;flex-shrink:0}

/* ── 總覽 KPI ── */
.kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:28px}
@media(max-width:900px){.kpi-grid{grid-template-columns:repeat(2,1fr)}}
.kpi-card{background:var(--white);border:1px solid var(--border);border-radius:var(--r);padding:18px 20px;position:relative;overflow:hidden}
.kpi-label{font-size:10px;color:var(--muted);margin-bottom:8px;font-weight:700;text-transform:uppercase;letter-spacing:.8px}
.kpi-val{font-size:30px;font-weight:600;line-height:1;letter-spacing:-0.5px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.kpi-sub{font-size:11px;color:var(--muted);margin-top:6px}
.kpi-accent{position:absolute;bottom:0;left:0;right:0;height:3px}

/* ── 本週精選 ── */
.top3-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:28px}
@media(max-width:960px){.top3-grid{grid-template-columns:1fr 1fr}}
@media(max-width:600px){.top3-grid{grid-template-columns:1fr}}
.mini-card{background:var(--white);border:1px solid var(--border);border-radius:var(--r);padding:16px}
.mini-card-rank{font-size:10px;font-weight:800;color:var(--muted);margin-bottom:8px;display:flex;align-items:center;gap:6px;text-transform:uppercase;letter-spacing:.8px}
.mini-rank-num{font-size:20px;font-weight:900}
.mini-rank-num.gold-r{color:var(--gold)}
.mini-rank-num.silver-r{color:#b0b0b0}
.mini-rank-num.bronze-r{color:#cd7f32}
.mini-card-title{font-size:13px;font-weight:700;line-height:1.4;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;margin-bottom:12px;min-height:36px}
.mini-score{font-size:36px;font-weight:600;letter-spacing:-1px;line-height:1;margin-bottom:6px}
.mini-card-stats{display:flex;gap:14px;font-size:11px;margin-bottom:10px}
.mini-card-stats span{display:flex;flex-direction:column;gap:2px}
.mini-card-stats .ms-label{color:var(--muted)}
.mini-card-stats .ms-val{font-size:13px;font-weight:800;color:var(--ink)}
.mini-card-why{background:var(--off);border-radius:6px;padding:8px 10px;font-size:11px;color:var(--ink);line-height:1.6}
.mini-plat-badge{display:inline-flex;padding:2px 7px;border-radius:4px;font-size:10px;font-weight:700}

/* ── 平台對比 ── */
.plat-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:28px}
@media(max-width:640px){.plat-grid{grid-template-columns:1fr}}
.plat-card{background:var(--white);border:1px solid var(--border);border-radius:var(--r);padding:18px 20px}
.plat-head{display:flex;align-items:center;gap:10px;margin-bottom:14px;border-bottom:1px solid var(--border);padding-bottom:12px}
.plat-icon{font-size:22px}
.plat-name{font-size:15px;font-weight:800}
.plat-count{font-size:11px;color:var(--muted);margin-left:auto}
.plat-stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.plat-stat{padding:10px;background:var(--off);border-radius:6px}
.plat-stat-label{font-size:10px;color:var(--muted);margin-bottom:4px;font-weight:600}
.plat-stat-val{font-size:16px;font-weight:900}

/* ── 表現分佈 ── */
.perf-dist{background:var(--white);border:1px solid var(--border);border-radius:var(--r);padding:20px;margin-bottom:28px}
.perf-dist-title{font-size:12px;font-weight:700;color:var(--ink);margin-bottom:14px}
.perf-dist-rows{display:flex;flex-direction:column;gap:12px}
.perf-dist-row{display:flex;align-items:center;gap:10px}
.perf-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.perf-label{font-size:12px;color:var(--ink);width:64px;font-weight:600;flex-shrink:0}
.perf-bar-wrap{flex:1;height:10px;background:var(--off);border-radius:5px;overflow:hidden}
.perf-bar-fill{height:100%;border-radius:5px}
.perf-count{font-size:13px;font-weight:800;min-width:24px;text-align:right}
.perf-desc{font-size:10px;color:var(--muted);margin-left:6px;white-space:nowrap}
.perf-toggle{margin-left:auto;flex-shrink:0;font-size:11px;font-weight:700;padding:3px 10px;border-radius:5px;border:1px solid var(--border);background:var(--white);cursor:pointer;color:var(--ink);font-family:var(--font)}
.perf-toggle:hover{background:var(--off)}
.perf-panel{display:none;margin-top:10px;border:1px solid var(--border);border-radius:8px;overflow:hidden}
.perf-panel.open{display:block}
.perf-panel-row{display:grid;grid-template-columns:70px 1fr 60px 50px 60px;gap:8px;padding:9px 14px;border-bottom:1px solid var(--border);align-items:center;font-size:12px}
.perf-panel-row:last-child{border-bottom:none}
.perf-panel-row:hover{background:var(--off)}
.perf-panel-head{background:var(--off);font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--muted)}
.perf-panel-title{font-weight:700;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
@media(max-width:640px){.perf-panel-row{grid-template-columns:60px 1fr 50px}.perf-panel-row>div:nth-child(n+4){display:none}}

/* ── 尋找 ── */
.srch-tabs{display:flex;gap:0;border:1px solid var(--border);border-radius:var(--r);overflow:hidden;width:fit-content;margin-bottom:20px}
.srch-tab{padding:8px 22px;font-size:12px;font-weight:700;cursor:pointer;background:var(--white);color:var(--muted);transition:all .2s;border-right:1px solid var(--border)}
.srch-tab:last-child{border-right:none}
.srch-tab.active{background:var(--black);color:var(--white)}
.srch-pane{display:none}
.srch-pane.active{display:block}
.search-bar-wrap{padding:8px 0 18px}
.search-input{width:100%;box-sizing:border-box;padding:12px 16px;font-size:15px;border:1.5px solid var(--border);border-radius:10px;background:var(--off);color:var(--ink);outline:none;transition:border-color .2s}
.search-input:focus{border-color:var(--teal)}
.search-empty{text-align:center;padding:40px 0;color:var(--muted);font-size:13px}
.search-result{background:var(--white);border:1px solid var(--border);border-radius:var(--r);margin-bottom:14px;overflow:hidden}
.search-result-head{padding:14px 16px 10px;border-bottom:1px solid var(--border)}
.search-result-title{font-size:14px;font-weight:800;line-height:1.4;margin-bottom:4px}
.search-result-meta{font-size:11px;color:var(--muted)}
.search-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;padding:12px 16px}
.search-stat{text-align:center}
.search-stat-val{font-size:16px;font-weight:600}
.search-stat-lbl{font-size:10px;color:var(--muted);margin-top:1px}
.search-comps{padding:0 16px 14px}
.search-comps-title{font-size:11px;font-weight:700;color:var(--muted);margin-bottom:8px;text-transform:uppercase;letter-spacing:.5px}
.search-comp-row{display:flex;align-items:center;gap:10px;padding:6px 0;border-bottom:1px solid var(--border);font-size:12px}
.search-comp-row:last-child{border-bottom:none}
.search-comp-score{font-weight:700;min-width:36px;color:var(--teal)}
/* ── 關鍵字排行 ── */
.kw-rank-list{background:var(--white);border:1px solid var(--border);border-radius:var(--r);overflow:hidden}
.kw-rank-row{display:flex;align-items:center;gap:10px;padding:10px 16px;cursor:pointer;border-bottom:1px solid var(--border);transition:background .15s;user-select:none}
.kw-rank-row:last-of-type{border-bottom:none}
.kw-rank-row:hover{background:var(--off)}
.kw-rank-num{font-size:12px;font-weight:700;color:var(--muted);min-width:26px;flex-shrink:0}
.kw-chip{font-size:13px;font-weight:700;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.kw-hash{color:var(--teal)}
.kw-count{font-size:12px;color:var(--muted);white-space:nowrap;flex-shrink:0}
.kw-avg-plays{font-size:12px;font-weight:700;color:var(--ink);white-space:nowrap;min-width:76px;text-align:right;flex-shrink:0}
.kw-expand-icon{font-size:11px;color:var(--muted);margin-left:4px;flex-shrink:0}
.kw-vid-panel{display:none;background:rgba(0,0,0,.02);border-bottom:1px solid var(--border);padding:0 16px}
.kw-vid-panel.open{display:block}
.kw-vid-row{display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid var(--border);font-size:12px}
.kw-vid-row:last-child{border-bottom:none}

/* ── 指揮中心 ── */
.cmd-row{display:grid;grid-template-columns:1fr 2fr;gap:14px;margin-bottom:14px}
.cmd-row-2{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px}
.cmd-row-3{display:grid;grid-template-columns:1fr 1fr 2fr;gap:14px;margin-bottom:14px}
@media(max-width:900px){.cmd-row,.cmd-row-2,.cmd-row-3{grid-template-columns:1fr}}
.cmd-card{background:var(--white);border:1px solid var(--border);border-radius:var(--r);padding:20px}
.cmd-card-label{font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:1.5px;color:var(--muted);margin-bottom:14px}
/* 頻道健康 */
.health-emoji{font-size:38px;line-height:1;margin-bottom:8px}
.health-sentence{font-size:16px;font-weight:600;line-height:1.3;margin-bottom:6px}
.health-pct{font-size:22px;font-weight:400;letter-spacing:-0.3px}
.health-meta{font-size:11px;color:var(--muted);margin-top:8px;line-height:1.7}
/* 行動清單 */
.action-item{display:flex;align-items:flex-start;gap:10px;padding:10px 0;border-bottom:1px solid var(--border);font-size:13px;line-height:1.6}
.action-item:last-child{border-bottom:none}
.action-icon{font-size:16px;flex-shrink:0;line-height:1.4}
/* 發片節奏 */
.cadence-chart{display:flex;align-items:flex-end;gap:5px;height:64px;margin:14px 0 5px}
.cadence-bar-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px}
.cadence-bar-fill{width:100%;border-radius:3px 3px 0 0;min-height:3px;transition:opacity .2s}
.cadence-bar-fill:hover{opacity:.7}
.cadence-bar-fill.cur{background:var(--pink)}
.cadence-bar-fill.past{background:var(--teal);opacity:.55}
.cadence-bar-fill.past:hover{opacity:.9}
.cadence-lbl{font-size:9px;color:var(--muted);text-align:center;white-space:nowrap}
.cadence-num{font-size:9px;font-weight:700;color:var(--muted)}
/* 主題勝率 */
.winrate-row{display:flex;align-items:center;gap:10px;padding:7px 0;border-bottom:1px solid var(--border);font-size:12px}
.winrate-row:last-child{border-bottom:none}
.winrate-kw{font-weight:700;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.winrate-bar-wrap{width:70px;height:5px;background:var(--off);border-radius:3px;flex-shrink:0}
.winrate-bar-fill{height:100%;border-radius:3px;background:var(--teal)}
.winrate-score{font-size:13px;font-weight:600;min-width:34px;text-align:right;flex-shrink:0}
.winrate-cnt{font-size:10px;color:var(--muted);min-width:28px;text-align:right;flex-shrink:0}
/* 小字數據帶 */
.mini-section-divider{margin:22px 0 16px;display:flex;align-items:center;gap:10px;font-size:10px;font-weight:800;letter-spacing:1.5px;color:var(--muted);text-transform:uppercase}
.mini-section-divider::before,.mini-section-divider::after{content:'';flex:1;height:1px;background:var(--border)}
.mini-kpi-row{display:flex;gap:0;border:1px solid var(--border);border-radius:var(--r);overflow:hidden;margin-bottom:14px}
.mini-kpi-cell{flex:1;padding:10px 14px;border-right:1px solid var(--border);min-width:0;overflow:hidden}
.mini-kpi-cell:last-child{border-right:none}
.mini-kpi-lbl{font-size:10px;color:var(--muted);margin-bottom:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.mini-kpi-val{font-size:18px;font-weight:400;letter-spacing:-0.3px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.mini-kpi-sub{font-size:10px;color:var(--muted);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.mini-top3{background:var(--white);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;margin-bottom:14px}
.mini-top3-row{display:flex;align-items:center;gap:10px;padding:9px 14px;border-bottom:1px solid var(--border);font-size:12px}
/* ── 產出效率 ── */
.eff-num{font-size:32px;font-weight:400;letter-spacing:-1px;line-height:1;margin-bottom:4px}
.eff-sub{font-size:12px;color:var(--muted);line-height:1.6;margin-top:6px}
/* ── 演算法起飛 ── */
.rising-card{background:linear-gradient(135deg,rgba(155,44,126,.05),rgba(13,148,136,.05));border:1.5px solid rgba(155,44,126,.2);border-radius:var(--r);padding:16px 18px;margin-bottom:14px}
.rising-hdr{font-size:12px;font-weight:800;color:var(--pink);margin-bottom:12px;display:flex;align-items:center;gap:6px}
.rising-row{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid rgba(155,44,126,.1);font-size:12px}
.rising-row:last-child{border-bottom:none}
.rising-gain{font-size:12px;font-weight:700;color:var(--pink);min-width:68px;flex-shrink:0}
.rising-verdict{font-size:11px;font-weight:800;padding:2px 8px;border-radius:4px;flex-shrink:0}
.rv-good{background:rgba(13,148,136,.12);color:#1a9e95}
.rv-miss{background:rgba(190,58,103,.1);color:var(--warn)}
/* ── 今日上片 ── */
.today-list{background:var(--white);border:1px solid var(--border);border-radius:var(--r);overflow:hidden}
.today-row{display:flex;align-items:center;gap:10px;padding:9px 14px;border-bottom:1px solid var(--border);font-size:12px}
.today-row:last-child{border-bottom:none}
/* ── 題材策略 ── */
.theme-cols{display:grid;grid-template-columns:1fr 1fr;gap:16px}
@media(max-width:900px){.theme-cols{grid-template-columns:1fr}}
.theme-col{background:var(--white);border:1px solid var(--border);border-radius:var(--r);padding:20px}
.theme-col-head{font-size:14px;font-weight:800;margin-bottom:18px;padding-bottom:12px;border-bottom:2px solid var(--border);display:flex;align-items:center;gap:8px}
.theme-sec{margin-bottom:20px}
.theme-sec:last-child{margin-bottom:0}
.theme-sec-title{font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:1.2px;margin-bottom:10px;display:flex;align-items:center;gap:6px}
.theme-kw-row{display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid var(--border);font-size:12px}
.theme-kw-row:last-child{border-bottom:none}
.theme-kw-name{font-weight:700;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.trend-pill{font-size:10px;font-weight:800;padding:2px 6px;border-radius:3px;flex-shrink:0}
.t-up{background:rgba(13,148,136,.12);color:#1a9e95}
.t-down{background:rgba(190,58,103,.1);color:var(--warn)}
.t-flat{background:rgba(181,146,78,.1);color:#7a6428}
.t-new{background:rgba(100,100,100,.1);color:var(--muted)}
.theme-kw-score{font-size:13px;font-weight:400;min-width:32px;text-align:right;flex-shrink:0}
.theme-kw-cnt{font-size:10px;color:var(--muted);min-width:26px;text-align:right;flex-shrink:0}
.theme-recycle-row{display:flex;align-items:center;gap:8px;padding:7px 10px;border-bottom:1px solid var(--border);font-size:12px;background:var(--off);border-radius:4px;margin-bottom:5px}
.theme-recycle-row:last-child{margin-bottom:0}
.mini-top3-row:last-child{border-bottom:none}
.mini-top3-rank{font-size:14px;font-weight:700;min-width:20px;flex-shrink:0}
.mini-top3-title{flex:1;font-weight:700;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.mini-top3-score{font-size:14px;font-weight:400;min-width:36px;text-align:right;flex-shrink:0}
.mini-top3-plays{font-size:11px;color:var(--muted);min-width:56px;text-align:right;flex-shrink:0}
/* ── 低效分析頁 ── */
.waste-advice{background:rgba(190,58,103,.06);border:1px solid rgba(190,58,103,.2);border-radius:8px;padding:14px 16px;margin-bottom:16px;font-size:13px;line-height:1.8}
.waste-advice-title{font-weight:900;font-size:13px;margin-bottom:6px;color:var(--warn)}
.waste-kw-grid{display:flex;flex-wrap:wrap;gap:6px;margin-top:10px}
.waste-kw{padding:4px 10px;border-radius:20px;font-size:12px;font-weight:700;background:rgba(190,58,103,.1);color:var(--warn)}
.waste-stat-row{display:flex;gap:10px;flex-wrap:wrap;margin:10px 0}
.waste-stat{flex:1;min-width:110px;background:var(--off);border-radius:8px;padding:10px 12px;text-align:center}
.waste-stat-val{font-size:18px;font-weight:900;color:var(--warn)}
.waste-stat-lbl{font-size:10px;color:var(--muted);margin-top:2px}
/* 忠實度 per-video 情境標籤 */
.sit-tag{display:inline-block;font-size:10px;font-weight:800;padding:2px 7px;border-radius:3px;margin-left:6px;vertical-align:middle}
.sit-no-engage{background:rgba(251,146,60,.15);color:#c2580a}
.sit-no-reach{background:rgba(99,102,241,.15);color:#4f46e5}
.sit-both-low{background:rgba(190,58,103,.12);color:var(--warn)}
/* 行動建議 */
.tier-advice{background:var(--off);border-left:3px solid var(--border);border-radius:0 6px 6px 0;padding:10px 14px;margin:8px 0 4px;font-size:12px;line-height:1.7;color:var(--text)}


/* ── 排行亮點解析 ── */
.insight-box{background:linear-gradient(135deg,rgba(13,148,136,.06),rgba(181,146,78,.06));border:1px solid rgba(13,148,136,.25);border-radius:var(--r);padding:16px 18px;margin-bottom:18px}
.insight-box.hidden{display:none}
.insight-title{font-size:11px;font-weight:800;color:var(--teal);text-transform:uppercase;letter-spacing:.8px;margin-bottom:8px}
.insight-body{font-size:12px;line-height:1.8;color:var(--ink)}

/* ── 通用元件 ── */

.vcard{background:var(--white);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;transition:transform .2s,box-shadow .2s}

<body>

    </div>

      <span class="snapshot-badge" id="snapshotBadge">載入中…</span>
    </div>
  </div>
</header>

<div class="tabs">

    <div class="tab active" onclick="switchTab('overview',this)">📊 本週指令</div>
    <div class="tab" onclick="switchTab('theme',this)">🎯 題材策略</div>

  <!-- 本週指令 -->

  <!-- 題材策略 -->

</div>

    <div class="mob-tab" onclick="mobileSwitchTab('top20',this)"><span class="mi">🏆</span>排行</div>
    <div class="mob-tab" onclick="mobileSwitchTab('search',this)"><span class="mi">🔍</span>尋找</div>

<script>
const STATIC_DATA = __STATIC_DATA__;
const AVG = { fb: STATIC_DATA.avg_fb, ig: STATIC_DATA.avg_ig };
let activePeriod = '7';
let currentTop20Type = 'traffic';

// ── 工具 ──────────────────────────────────────────────────────────────────
function daysBetween(isoStr) {
  return Math.floor((Date.now() - new Date(isoStr)) / 86400000);
}
function fmtDate(isoStr) {
  return new Date(isoStr).toLocaleDateString('zh-TW', {
    timeZone: 'Asia/Taipei', month: '2-digit', day: '2-digit'
  });
}
function fmtNum(n) {
  n = n || 0;
  return n >= 1000000 ? (n/1000000).toFixed(2)+'M'
       : n >= 1000    ? (n/1000).toFixed(1)+'K'
       : n.toString();
}
function reachDev(v) {
  var avg = v.platform === 'fb' ? AVG.fb : AVG.ig;
  return avg > 0 ? ((v.reach || 0) - avg) / avg : 0;
}


function loyaltyRate(v) {
  return v.plays > 0 ? ((v.comments + v.shares) / v.plays * 100) : 0;
}

// 動態門檻：依自身資料的 30th / 70th 百分位數計算
var LOYALTY_HIGH, LOYALTY_LOW;
(function() {
  var rates = STATIC_DATA.videos
    .filter(function(v){ return v.plays > 0; })
    .map(function(v){ return loyaltyRate(v); })
    .sort(function(a,b){ return a-b; });
  if (rates.length < 5) { LOYALTY_HIGH = 3; LOYALTY_LOW = 1; return; }
  LOYALTY_HIGH = rates[Math.floor(rates.length * 0.7)];
  LOYALTY_LOW  = rates[Math.floor(rates.length * 0.3)];
})();

function loyaltyTier(v) {
  var r = loyaltyRate(v);
  return r >= LOYALTY_HIGH ? 'tier1' : r >= LOYALTY_LOW ? 'tier2' : 'tier3';
}
function tierLabel(lt) {
  return { tier1:'🟢 優質', tier2:'🟡 正常', tier3:'🔴 待優化' }[lt];
}
function tierExplain(lt) {
  var h = LOYALTY_HIGH != null ? LOYALTY_HIGH.toFixed(2) : '—';
  var l = LOYALTY_LOW  != null ? LOYALTY_LOW.toFixed(2)  : '—';
  return {
    tier1: '原粉互動率 ≥ ' + h + '%，高於頻道七成影片',
    tier2: '原粉互動率 ' + l + '–' + h + '%，屬頻道正常水準',
    tier3: '原粉互動率 < ' + l + '%，低於頻道三成影片，建議複盤'
  }[lt];
}

// 月比月變化（上月同期 = 上月 1 日到同天數為止）
function momBadge(pct) {
  var up = pct >= 0;
  return '<span style="display:inline-flex;align-items:center;font-size:12px;font-weight:900;padding:2px 7px;border-radius:4px;margin-left:4px;background:'
    + (up ? 'rgba(13,148,136,.15);color:#0d9488' : 'rgba(190,58,103,.12);color:#be3a67') + '">'
    + (up ? '▲ +' : '▼ ') + Math.abs(pct) + '%</span>';
}
function momStr(curr, prev, noDataLabel) {
  if (prev === 0) return noDataLabel || '尚無上月資料';
  var pct = Math.round((curr - prev) / prev * 100);
  return '上月同期 ' + fmtNum(prev) + momBadge(pct);
}
function momRateStr(currPct, prevPct) {
  if (prevPct === 0) return '尚無上月資料';
  var pct = Math.round((currPct - prevPct) / prevPct * 100);
  return '上月同期 ' + prevPct.toFixed(2) + '%' + momBadge(pct);
}

// 標題截斷（14字）
function truncTitle(s, len) {
  len = len || 14;
  if (!s) return '';
  return s.length > len ? s.slice(0, len) + '…' : s;
}
function escAttr(s) {
  return (s || '').replace(/&/g,'&amp;').replace(/"/g,'&quot;');
}

// ── 為何表現好 ────────────────────────────────────────────────────────────
function whyGood(v) {
  var reasons = [];
  var shareRate = v.plays ? v.shares/v.plays*100 : 0;
  var commentRate = v.plays ? v.comments/v.plays*100 : 0;
  var dev = reachDev(v);
  var completion = v.retention && v.retention.length > 0 ? v.retention[v.retention.length-1]*100 : 0;
  if (shareRate >= 2) reasons.push('轉發強（' + shareRate.toFixed(2) + '%）');
  else if (shareRate >= 1) reasons.push('轉發不錯（' + shareRate.toFixed(2) + '%）');
  if (commentRate >= 1.5) reasons.push('留言熱（' + commentRate.toFixed(2) + '%）');
  else if (commentRate >= 0.8) reasons.push('留言偏高（' + commentRate.toFixed(2) + '%）');
  if (dev >= 0.5) reasons.push('觸及遠超平均 +' + (dev*100).toFixed(0) + '%（演算法推爆）');
  else if (dev >= 0.2) reasons.push('觸及高於平均 +' + (dev*100).toFixed(0) + '%');
  if (completion >= 35) reasons.push('完播率佳（' + completion.toFixed(0) + '%）');
  if (reasons.length === 0) reasons.push('各項指標均衡穩健');
  return reasons.join('、');
}

// ── 排行第一名亮點解析 ────────────────────────────────────────────────────
function buildHighlight(v) {
  if (!v) return '';
  var lines = [];
  var shareRate = v.plays ? v.shares/v.plays*100 : 0;
  var commentRate = v.plays ? v.comments/v.plays*100 : 0;
  var dev = reachDev(v);
  var completion = v.retention && v.retention.length > 0 ? v.retention[v.retention.length-1]*100 : 0;
  var title = (v.description || v.caption || '').slice(0,40);
  lines.push('《' + title + (title.length >= 40 ? '…' : '') + '》拿到第一名的原因：');
  if (shareRate >= 1) lines.push('📤 轉發率 ' + shareRate.toFixed(2) + '% — 觀眾願意主動分享，話題性強');
  if (commentRate >= 0.8) lines.push('💬 留言率 ' + commentRate.toFixed(2) + '% — 觀眾有話說，互動熱度高');
  if (dev >= 0.2) lines.push('🚀 觸及超出均值 +' + (dev*100).toFixed(0) + '% — 演算法判斷優質並加大推播');
  if (completion >= 25) lines.push('⏱ 完播率 ' + completion.toFixed(0) + '% — 觀眾願意看到最後');
  if (lines.length === 1) lines.push('各項指標表現均衡，綜合評分最高');
  return lines.join('<br>');
}

// ── 續看率下降點分析 ──────────────────────────────────────────────────────
function retentionInsight(retention) {
  if (!retention || retention.length < 4) return '';
  var drops = [];
  for (var i = 1; i < retention.length; i++) {
    var drop = retention[i-1] - retention[i];
    if (drop > 0) drops.push({ i: i, drop: drop });
  }
  drops.sort(function(a, b) { return b.drop - a.drop; });
  var parts = [];
  if (drops.length > 0) {
    var pct = Math.round(drops[0].i / retention.length * 100);
    parts.push('最大流失點在 ' + pct + '% 進度');
  }
  var final = retention[retention.length-1] * 100;
  if (final < 15) parts.push('完播率 ' + final.toFixed(1) + '% 偏低，結尾可加強');
  else if (final >= 30) parts.push('完播率 ' + final.toFixed(1) + '% 佳，觀眾投入度高');
  return parts.length ? '💡 ' + parts.join('；') : '';
}

// ── Canvas 環形評分 ───────────────────────────────────────────────────────
function drawRing(canvas, score) {
  if (!canvas) return;
  var dpr = devicePixelRatio || 1;
  canvas.width = 58 * dpr; canvas.height = 58 * dpr;
  var ctx = canvas.getContext('2d');
  ctx.scale(dpr, dpr);
  var cx = 29, cy = 29, r = 24, lw = 5;
  var color = score >= 80 ? '#1a9e95' : score >= 65 ? '#9b2c7e' : '#be3a67';
  ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI * 2);
  ctx.strokeStyle = '#f0f0f0'; ctx.lineWidth = lw; ctx.stroke();
  if (score > 0) {
    ctx.beginPath();
    ctx.arc(cx, cy, r, -Math.PI / 2, -Math.PI / 2 + (score / 100) * Math.PI * 2);
    ctx.strokeStyle = color; ctx.lineWidth = lw; ctx.lineCap = 'round'; ctx.stroke();
  }
}

// ── 續看率條 ──────────────────────────────────────────────────────────────
function renderRetentionStrip(v) {
  var retention = v.retention;
  if (!retention || retention.length === 0) return '';
  var max = retention[0] || 1;
  var segs = retention.map(function(val) {
    var pct = (val / max * 100).toFixed(0);
    var alpha = (0.2 + (val / max) * 0.8).toFixed(2);
    return '<div class="ret-seg" style="height:' + Math.max(pct, 4) + '%;background:rgba(0,0,0,' + alpha + ')"></div>';
  }).join('');
  var last = retention[retention.length - 1];
  var insight = retentionInsight(retention);
  return '<div class="retention-strip">'
    + '<div class="retention-label">觀眾續看率曲線 · 完播率 ' + (last * 100).toFixed(1) + '%</div>'
    + '<div class="retention-bar">' + segs + '</div>'
    + (insight ? '<div class="retention-insight">' + insight + '</div>' : '')
    + '</div>';
}

// ── 影片卡 ────────────────────────────────────────────────────────────────
var THUMB_BG = ['#fde8f2','#e8f9f8','#fff8e1','#f3e5f5','#e8f5e9','#fce4ec','#e0f7fa'];
var THUMB_EM = ['💎','🔍','⛏','🌟','💚','💙','🤍'];

function renderVideoCard(v, idx) {
  var lt = loyaltyTier(v);
  var lr = loyaltyRate(v).toFixed(2);
  var dev = reachDev(v);
  var devPct = (dev * 100).toFixed(1);
  var devClass = dev >= 0.05 ? 'pos' : dev <= -0.05 ? 'neg' : 'neu';
  var devStr = (dev >= 0 ? '+' : '') + devPct + '%';
  var barColor = v.type === 'commerce' ? 'var(--pink)' : 'var(--teal)';
  var scoreColor = v.score >= 80 ? '#1a9e95' : v.score >= 65 ? 'var(--pink)' : 'var(--warn)';
  var tileCls = v.score >= 80 ? 'st-good' : v.score >= 65 ? 'st-mid' : 'st-low';
  var shareBar   = v.plays ? Math.min(v.shares / v.plays / 0.03 * 100, 100).toFixed(0) : 0;
  var commentBar = v.plays ? Math.min(v.comments / v.plays / 0.02 * 100, 100).toFixed(0) : 0;
  var likeBar    = v.plays ? Math.min(v.likes / v.plays / 0.15 * 100, 100).toFixed(0) : 0;
  var watchSec   = v.avgWatchMs > 0 ? (v.avgWatchMs / 1000).toFixed(1) + 's' : '—';
  var vidLen     = v.length ? v.length.toFixed(0) + 's' : '—';
  var savedStr   = v.saved != null ? fmtNum(v.saved) : '—';
  var title      = v.description || v.caption || '(無標題)';
  var tl         = tierLabel(lt);
  var te         = tierExplain(lt);

  return '<div class="vcard' + (lt === 'tier3' ? ' tier3' : '') + '">'
    + '<div class="vcard-top">'
    + '<div class="vcard-thumb" style="background:' + THUMB_BG[idx % THUMB_BG.length] + '">' + THUMB_EM[idx % THUMB_EM.length] + '</div>'
    + '<div class="vcard-meta">'
    + '<div class="vcard-badges">'
    + '<span class="badge ' + v.type + '">' + (v.type === 'commerce' ? '🛍 帶貨型' : '📈 流量型') + '</span>'
    + '<span class="badge ' + v.platform + '">' + (v.platform === 'fb' ? '📘 FB' : '📸 IG') + '</span>'
    + '<span class="badge ' + lt + '">' + tl + '</span>'
    + '</div>'
    + '<div class="vcard-title" data-full="' + escAttr(title) + '">' + truncTitle(title) + '</div>'
    + '<div class="vcard-date">' + fmtDate(v.created_time) + ' 發布 · ' + vidLen + '</div>'
    + '</div>'
    + '<div class="score-tile ' + tileCls + '"><span class="st-num" style="color:' + scoreColor + '">' + v.score + '</span><span class="st-lbl">分</span></div>'
    + '</div>'
    + renderRetentionStrip(v)
    + '<div class="vcard-metrics">'
    + '<div><div class="metric-label">轉發率</div><div class="metric-val pink">' + (v.plays ? (v.shares/v.plays*100).toFixed(2)+'%' : '—') + '</div><div class="mbar"><div class="mbar-fill" style="width:' + shareBar + '%;background:var(--pink)"></div></div></div>'
    + '<div><div class="metric-label">留言率</div><div class="metric-val ' + (v.type==='commerce'?'pink':'teal') + '">' + (v.plays ? (v.comments/v.plays*100).toFixed(2)+'%' : '—') + '</div><div class="mbar"><div class="mbar-fill" style="width:' + commentBar + '%;background:' + barColor + '"></div></div></div>'
    + '<div><div class="metric-label">點讚率</div><div class="metric-val gold">' + (v.plays ? (v.likes/v.plays*100).toFixed(2)+'%' : '—') + '</div><div class="mbar"><div class="mbar-fill" style="width:' + likeBar + '%;background:var(--gold)"></div></div></div>'
    + '<div><div class="metric-label">播放</div><div class="metric-val">' + fmtNum(v.plays) + '</div></div>'
    + '<div><div class="metric-label">觸及偏離</div><div class="metric-val"><span class="devbadge ' + devClass + '">' + devStr + '</span></div></div>'
    + '<div><div class="metric-label">' + (v.platform === 'ig' ? '儲存' : '新粉') + '</div><div class="metric-val teal">' + (v.platform === 'ig' ? savedStr : ('+' + (v.newFollowers||0))) + '</div></div>'
    + '</div>'
    + '<div class="vcard-bottom">'
    + '<div style="flex:1"><div style="font-size:10px;color:var(--muted);margin-bottom:3px">原粉忠實度（留言＋轉發）÷ 播放</div>'
    + '<div class="loyalty-val ' + lt + '">' + lr + '% ' + tl + '</div>'
    + '<div class="tier-explain">' + te + '</div></div>'
    + '<div style="text-align:right"><div style="font-size:10px;color:var(--muted);margin-bottom:3px">平均觀看 / 影片長</div>'
    + '<div style="font-size:13px;font-weight:800">' + watchSec + ' / ' + vidLen + '</div></div>'
    + '</div></div>';
}

function togglePanel(id, btn) {
  var panel = document.getElementById(id);
  var open = panel.classList.toggle('open');
  btn.textContent = btn.textContent.replace(open ? '▾' : '▴', open ? '▴' : '▾');
}

// ── 總覽 ─────────────────────────────────────────────────────────────────
function initOverview() {
  var all  = STATIC_DATA.videos;
  var now  = new Date();
  var dayOfMonth = now.getDate();
  var thisMonthStart   = new Date(now.getFullYear(), now.getMonth(), 1);
  var lastMonthStart   = new Date(now.getFullYear(), now.getMonth() - 1, 1);
  var lastMonthSameEnd = new Date(now.getFullYear(), now.getMonth() - 1, dayOfMonth + 1);
  var thisMonth    = all.filter(function(v){ return new Date(v.created_time) >= thisMonthStart; });
  var lastMonthSame= all.filter(function(v){ var d=new Date(v.created_time); return d>=lastMonthStart && d<lastMonthSameEnd; });
  var week         = all.filter(function(v){ return daysBetween(v.created_time) <= 7; });
  var fbWeek       = week.filter(function(v){ return v.platform==='fb'; });
  var igWeek       = week.filter(function(v){ return v.platform==='ig'; });

  // ── 頻道健康：近30天 vs 前30天平均分 ──
  var recent30 = all.filter(function(v){ var d=daysBetween(v.created_time); return d<=30; });
  var prev30   = all.filter(function(v){ var d=daysBetween(v.created_time); return d>30&&d<=60; });
  var avgR = recent30.length ? recent30.reduce(function(s,v){return s+(v.score||0);},0)/recent30.length : 0;
  var avgP = prev30.length   ? prev30.reduce(function(s,v){return s+(v.score||0);},0)/prev30.length   : 0;
  var hPct = avgP > 0 ? Math.round((avgR-avgP)/avgP*100) : 0;
  var hArrow = Math.abs(hPct)<5 ? '→' : hPct>0 ? '↑' : '↓';
  var hColor = Math.abs(hPct)<5 ? '#b5924e' : hPct>0 ? '#1a9e95' : '#be3a67';

  // ── 行動清單（純規則） ──
  var actions = [];
  var weekCounts4 = 0;
  for (var ww=0;ww<4;ww++) weekCounts4 += all.filter(function(v){var d=daysBetween(v.created_time);return d>ww*7&&d<=(ww+1)*7;}).length;
  var avgWeekly = Math.round(weekCounts4/4);
  var thisW = all.filter(function(v){return daysBetween(v.created_time)<=7;}).length;
  if (thisW===0)                              actions.push({t:'warn',msg:'本週還沒有新影片！近月均速 '+avgWeekly+' 支/週，今天就要開拍。'});
  else if (avgWeekly>1 && thisW < avgWeekly-1) actions.push({t:'warn',msg:'本週只發了 '+thisW+' 支，低於近月均速（'+avgWeekly+' 支/週），需要補齊。'});
  else                                         actions.push({t:'good',msg:'本週發片節奏正常（'+thisW+' 支），繼續維持。'});
  var badCom = all.filter(function(v){return v.type==='commerce'&&(v.score||0)<50&&daysBetween(v.created_time)<=30;});
  if (badCom.length>=2) actions.push({t:'warn',msg:'近30天有 '+badCom.length+' 支帶貨影片分數 < 50，這些主題不要再拍了，複盤找共同點。'});
  var hidden = all.filter(function(v){return loyaltyTier(v)!=='tier3'&&reachDev(v)<-0.3&&daysBetween(v.created_time)<=60;});
  if (hidden.length>=2) actions.push({t:'act',msg:'有 '+hidden.length+' 支影片鐵粉喜歡但流量低，值得改標題重發或加投廣告。'});
  var fbR=all.filter(function(v){return v.platform==='fb'&&daysBetween(v.created_time)<=30;}).length;
  var igR=all.filter(function(v){return v.platform==='ig'&&daysBetween(v.created_time)<=30;}).length;
  if (fbR>0&&igR>0&&Math.max(fbR,igR)/Math.min(fbR,igR)>=2){
    var more=fbR>igR?'FB':'IG', less=fbR>igR?'IG':'FB';
    actions.push({t:'act',msg:'近30天 '+more+'（'+Math.max(fbR,igR)+'支）遠多於 '+less+'（'+Math.min(fbR,igR)+'支），建議補齊 '+less+'。'});
  }
  if (avgP>0&&avgR<avgP*0.85) actions.push({t:'warn',msg:'近30天平均分 '+avgR.toFixed(0)+' vs 前30天 '+avgP.toFixed(0)+'，品質下滑 '+Math.abs(hPct)+'%，需檢視內容方向。'});
  if (actions.length===1&&actions[0].t==='good') actions.push({t:'good',msg:'帶貨影片品質穩定，繼續這個方向。'});

  // ── 發片節奏：近 8 週 ──
  var wkData=[];
  for (var w2=7;w2>=0;w2--){
    var c=all.filter(function(v){var d=daysBetween(v.created_time);return d>w2*7&&d<=(w2+1)*7;}).length;
    wkData.push({cnt:c,label:w2===0?'本週':w2===1?'上週':'-'+w2+'週'});
  }
  var maxWk=Math.max.apply(null,wkData.map(function(x){return x.cnt;})); if(maxWk<1)maxWk=1;

  // ── 主題勝率：關鍵字平均分 ≥ 3支 ──
  var STOP3=new Set(['的','了','我','你','他','她','它','們','在','是','有','和','也','但','都','到','就','這','那','什麼','一個','可以','沒有','因為','所以','如果','不是','可是','還是','只是','還有','就是','其實','現在','已經','非常','一起','大家','真的','這個','那個','一下','一直','好像','感覺','覺得']);
  var kwS={},kwC={};
  all.forEach(function(v){
    var txt=(v.description||v.caption||''),tags=[];
    txt=txt.replace(/#([^\s#，。！？、；：\n]+)/g,function(m,t){tags.push('#'+t);return ' ';});
    var tokens=txt.split(/[\s，。！？、；：「」『』【】（）(),.!?;:\n]+/).filter(Boolean).concat(tags);
    var seen=new Set();
    tokens.forEach(function(w){
      w=w.trim(); if(!w)return;
      var isH=w[0]==='#';
      if(!isH&&(w.length<2||STOP3.has(w)||/^\d+$/.test(w)))return;
      if(seen.has(w))return; seen.add(w);
      kwS[w]=(kwS[w]||0)+(v.score||0);
      kwC[w]=(kwC[w]||0)+1;
    });
  });
  var kwTop=Object.keys(kwC).filter(function(k){return kwC[k]>=3;})
    .map(function(k){return{kw:k,avg:kwS[k]/kwC[k],cnt:kwC[k]};})
    .sort(function(a,b){return b.avg-a.avg;}).slice(0,8);
  var maxAvg=kwTop.length?kwTop[0].avg:100;

  // ── Mini KPIs（小字帶） ──
  var thisComPlays=thisMonth.filter(function(v){return v.type==='commerce';}).reduce(function(s,v){return s+(v.plays||0);},0);
  var prevComPlays=lastMonthSame.filter(function(v){return v.type==='commerce';}).reduce(function(s,v){return s+(v.plays||0);},0);
  var thisIgSaves =thisMonth.filter(function(v){return v.platform==='ig';}).reduce(function(s,v){return s+(v.saved||0);},0);
  var prevIgSaves =lastMonthSame.filter(function(v){return v.platform==='ig';}).reduce(function(s,v){return s+(v.saved||0);},0);
  var thisCom=thisMonth.filter(function(v){return v.type==='commerce'&&v.plays>0;});
  var prevCom=lastMonthSame.filter(function(v){return v.type==='commerce'&&v.plays>0;});
  var comCR=thisCom.length?thisCom.reduce(function(s,v){return s+(v.comments||0);},0)/thisCom.reduce(function(s,v){return s+(v.plays||0);},0)*100:0;
  var prevComCR=prevCom.length?prevCom.reduce(function(s,v){return s+(v.comments||0);},0)/prevCom.reduce(function(s,v){return s+(v.plays||0);},0)*100:0;
  var thisFbNewF=thisMonth.filter(function(v){return v.platform==='fb';}).reduce(function(s,v){return s+(v.newFollowers||0);},0);
  var prevFbNewF=lastMonthSame.filter(function(v){return v.platform==='fb';}).reduce(function(s,v){return s+(v.newFollowers||0);},0);
  var prevFbCount=lastMonthSame.filter(function(v){return v.platform==='fb';}).length;

  // ── Top 3 本週（小列表） ──
  var top3=week.slice().sort(function(a,b){return b.score-a.score;}).slice(0,3);
  var rnk=['🥇','🥈','🥉'];

  // ── Loyalty（小字） ──
  var lh=LOYALTY_HIGH!=null?LOYALTY_HIGH.toFixed(2):'—';
  var ll=LOYALTY_LOW!=null?LOYALTY_LOW.toFixed(2):'—';
  var t1v=week.filter(function(v){return loyaltyTier(v)==='tier1';}),
      t2v=week.filter(function(v){return loyaltyTier(v)==='tier2';}),
      t3v=week.filter(function(v){return loyaltyTier(v)==='tier3';});
  var tot=week.length||1;

  // ── 健康描述（白話） ──
  var hEmoji, hSentence;
  if (avgP===0)      { hEmoji='📊'; hSentence='開始累積數據中'; }
  else if (hPct>10)  { hEmoji='🚀'; hSentence='越來越好！品質持續提升'; }
  else if (hPct>4)   { hEmoji='📈'; hSentence='小幅進步，方向正確'; }
  else if (hPct>=-4) { hEmoji='➡️'; hSentence='穩定發揮，維持現狀'; }
  else if (hPct>=-10){ hEmoji='📉'; hSentence='稍微滑落，需要留意'; }
  else               { hEmoji='⚠️'; hSentence='品質明顯下滑，需要檢視'; }

  // ── 產出效率 ──
  var lastMonthAll = all.filter(function(v){ var d=new Date(v.created_time); return d>=lastMonthStart && d<thisMonthStart; });
  var thisQual = thisMonth.filter(function(v){ return (v.score||0)>=65; });
  var prevQual = lastMonthAll.filter(function(v){ return (v.score||0)>=65; });
  var qualRate = thisMonth.length ? Math.round(thisQual.length/thisMonth.length*100) : 0;
  var prevQualRate = lastMonthAll.length ? Math.round(prevQual.length/lastMonthAll.length*100) : 0;
  var qualTrend = prevQualRate > 0 ? qualRate - prevQualRate : 0;
  var qualColor = qualTrend > 0 ? '#1a9e95' : qualTrend < -5 ? '#be3a67' : '#b5924e';

  // ── 演算法正在推 ──
  var rising = all.filter(function(v){
    if (daysBetween(v.created_time) > 7) return false;
    var prev = v.playsPrev || 0; if (prev <= 0) return false;
    return (v.plays||0) - prev >= 300;
  }).sort(function(a,b){ return ((b.plays||0)-(b.playsPrev||0))-((a.plays||0)-(a.playsPrev||0)); }).slice(0,5);

  // ── 今日 / 最近上片 ──
  var todayVids = all.filter(function(v){ return daysBetween(v.created_time)===0; })
    .sort(function(a,b){ return new Date(b.created_time)-new Date(a.created_time); });
  var recentLabel = '今天上片';
  if (todayVids.length===0) {
    todayVids = all.filter(function(v){ return daysBetween(v.created_time)<=2; })
      .sort(function(a,b){ return new Date(b.created_time)-new Date(a.created_time); });
    recentLabel = '近 48 小時上片';
  }

  // ── 行動清單 emoji ──
  var actionIcon = { good:'✅', warn:'⚠️', act:'💡' };
  var cadenceSummary = '近4週均速 '+avgWeekly+' 支/週，本週 '+thisW+' 支 '+(thisW>=avgWeekly?'👍':'⚡');

  // ── RENDER ──
  document.getElementById('cmdCenter').innerHTML =

    // Row 1: 頻道健康 | 產出效率 | 行動清單
    '<div style="display:grid;grid-template-columns:1fr 1fr 2fr;gap:14px;margin-bottom:14px" class="cmd-row-3">'
    + '<div class="cmd-card">'
    + '<div class="cmd-card-label">頻道近況 · 近30天</div>'
    + '<div class="health-emoji">'+hEmoji+'</div>'
    + '<div class="health-sentence" style="color:'+hColor+'">'+hSentence+'</div>'
    + '<div class="health-pct" style="color:'+hColor+'">'+(hPct>=0?'+':'')+hPct+'%</div>'
    + '<div class="health-meta">平均分 <strong>'+avgR.toFixed(0)+'</strong>（前30天 '+avgP.toFixed(0)+'）</div>'
    + '</div>'
    + '<div class="cmd-card">'
    + '<div class="cmd-card-label">本月產出效率</div>'
    + '<div class="health-emoji">'+(qualRate>=40?'🎯':qualRate>=25?'📊':'😬')+'</div>'
    + '<div class="eff-num" style="color:'+qualColor+'">'+qualRate+'%</div>'
    + '<div class="health-sentence" style="color:'+qualColor+'">優質片比例</div>'
    + '<div class="eff-sub">本月 '+thisMonth.length+' 支，'+thisQual.length+' 支達65分以上<br>'
    + (prevQualRate>0?'上月 '+prevQualRate+'%，'+(qualTrend>=0?'▲ 進步':'▼ 下滑')+' '+Math.abs(qualTrend)+'%':'上月資料累積中')
    + '</div></div>'
    + '<div class="cmd-card">'
    + '<div class="cmd-card-label">本週行動清單</div>'
    + actions.map(function(a){
        return '<div class="action-item"><span class="action-icon">'+actionIcon[a.t]+'</span><span>'+a.msg+'</span></div>';
      }).join('')
    + '</div>'
    + '</div>'

    // 演算法起飛（有資料才顯示）
    + (rising.length===0 ? '' :
      '<div class="rising-card">'
      + '<div class="rising-hdr">🚀 演算法正在推這些片 — 接住了嗎？</div>'
      + rising.map(function(v){
          var gain = (v.plays||0)-(v.playsPrev||0);
          var lt = loyaltyTier(v);
          var caught = lt!=='tier3';
          var title = truncTitle(v.description||v.caption||'',22);
          var age = daysBetween(v.created_time);
          return '<div class="rising-row">'
            +'<span class="rising-gain">+'+fmtNum(gain)+' 播</span>'
            +'<span style="flex:1;font-weight:700;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+title+'</span>'
            +'<span style="font-size:11px;color:var(--muted);flex-shrink:0;margin:0 6px">'+age+'天前</span>'
            +'<span class="rising-verdict '+(caught?'rv-good':'rv-miss')+'">'+(caught?'✅ 接住了':'⚠️ 沒接住')+'</span>'
            +'</div>';
        }).join('')
      + '</div>')

    // Row 2: 發片節奏 + 主題勝率
    + '<div class="cmd-row-2">'
    + '<div class="cmd-card">'
    + '<div class="cmd-card-label">發片節奏 · 近 8 週</div>'
    + '<div style="font-size:12px;color:var(--muted);margin-bottom:10px">'+cadenceSummary+'</div>'
    + '<div class="cadence-chart">'
    + wkData.map(function(x,i){
        var h=Math.max(Math.round(x.cnt/maxWk*52),x.cnt>0?6:2);
        return '<div class="cadence-bar-col">'
          +'<span class="cadence-num">'+(x.cnt||'·')+'</span>'
          +'<div class="cadence-bar-fill '+(i===7?'cur':'past')+'" style="height:'+h+'px"></div>'
          +'</div>';
      }).join('')
    + '</div>'
    + '<div style="display:flex;gap:5px">'
    + wkData.map(function(x){return '<div class="cadence-lbl" style="flex:1">'+x.label+'</div>';}).join('')
    + '</div></div>'
    + '<div class="cmd-card">'
    + '<div class="cmd-card-label">主題勝率 · 詳細請看「題材策略」</div>'
    + (kwTop.length===0
      ? '<div style="color:var(--muted);font-size:12px;padding:10px 0">資料不足</div>'
      : kwTop.slice(0,6).map(function(x,xi){
          var barW=Math.round(x.avg/maxAvg*100);
          var sc=x.avg>=65?'#1a9e95':x.avg>=50?'#b5924e':'#be3a67';
          return '<div class="winrate-row">'
            +'<span class="winrate-kw'+(x.kw[0]==='#'?' kw-hash':'')+'">'+x.kw
            +(xi===0?'<span style="font-size:10px;background:#fff3cd;color:#856404;border-radius:3px;padding:1px 5px;margin-left:5px;font-weight:700">🏆</span>':'')
            +'</span>'
            +'<div class="winrate-bar-wrap"><div class="winrate-bar-fill" style="width:'+barW+'%;background:'+sc+'"></div></div>'
            +'<span class="winrate-score" style="color:'+sc+'">'+x.avg.toFixed(0)+'分</span>'
            +'<span class="winrate-cnt">'+x.cnt+'支</span>'
            +'</div>';
        }).join(''))
    + '</div></div>'

    // ── 詳細數字 ──
    + '<div class="mini-section-divider">詳細數字</div>'
    + '<div class="mini-kpi-row">'
    + miniKpiCell('🛍 賣貨影片被看幾次',fmtNum(thisComPlays),momStr(thisComPlays,prevComPlays),'本月累計')

// ── 題材策略 ──────────────────────────────────────────────────────────────
function initTheme() {
  var all = STATIC_DATA.videos || [];
  var STOP = new Set(['的','了','我','你','他','她','它','們','在','是','有','和','也','但','都','到','就','這','那',
    '什麼','一個','可以','沒有','因為','所以','如果','不是','可是','還是','只是','還有','就是','其實',
    '現在','已經','非常','一起','大家','真的','這個','那個','一下','一直','好像','感覺','覺得']);

  function extractKw(v) {
    var text = (v.description || v.caption || '');
    var hashtags = [];
    text = text.replace(/#([^\s#，。！？、；：\n]+)/g, function(m, tag) { hashtags.push('#'+tag); return ' '; });
    var words = text.split(/[\s，。！？、；：「」『』【】（）(),.!?;:\n]+/).filter(Boolean);
    var result = [], seen = new Set();
    words.concat(hashtags).forEach(function(w) {
      w = w.trim(); if (!w) return;
      var isH = w[0]==='#';
      if (!isH && (w.length<2 || STOP.has(w) || /^\d+$/.test(w))) return;
      if (!seen.has(w)) { seen.add(w); result.push(w); }
    });
    return result;
  }

  function arrAvg(arr) { return arr.length ? arr.reduce(function(s,x){return s+x;},0)/arr.length : 0; }

  function buildKwData(type) {
    var kd = {};
    all.filter(function(v){ return v.type===type; }).forEach(function(v) {
      var age = daysBetween(v.created_time);
      extractKw(v).forEach(function(kw) {
        if (!kd[kw]) kd[kw] = { scores:[], recent:[], prev:[] };
        kd[kw].scores.push(v.score||0);
        if (age<=30) kd[kw].recent.push(v.score||0);
        else if (age<=60) kd[kw].prev.push(v.score||0);
      });
    });
    Object.keys(kd).forEach(function(k){ if (kd[k].scores.length<3) delete kd[k]; });
    return kd;
  }

  function trendPill(kd) {
    if (!kd.recent.length) return '<span class="trend-pill t-new">新</span>';
    if (!kd.prev.length)   return '<span class="trend-pill t-new">近期</span>';
    var pct = arrAvg(kd.prev)>0 ? Math.round((arrAvg(kd.recent)-arrAvg(kd.prev))/arrAvg(kd.prev)*100) : 0;
    if (pct>=8)  return '<span class="trend-pill t-up">↑ +'+pct+'%</span>';
    if (pct<=-8) return '<span class="trend-pill t-down">↓ '+pct+'%</span>';
    return '<span class="trend-pill t-flat">→</span>';
  }

  function classify(kd) {
    var a = arrAvg(kd.scores);
    var pct = (kd.prev.length&&arrAvg(kd.prev)>0) ? Math.round((arrAvg(kd.recent)-arrAvg(kd.prev))/arrAvg(kd.prev)*100) : 0;
    if (a>=62 && pct>=-5) return 'add';
    if (a<52 || pct<=-15) return 'stop';
    return 'hold';
  }

  function renderKwRows(kd) {
    var keys = Object.keys(kd).sort(function(a,b){ return arrAvg(kd[b].scores)-arrAvg(kd[a].scores); });
    if (!keys.length) return '<div style="color:var(--muted);font-size:12px;padding:8px 0">資料不足（需3支以上）</div>';
    return keys.map(function(kw) {
      var a = arrAvg(kd[kw].scores), aStr = a.toFixed(0);
      var sc = a>=65?'#1a9e95':a>=50?'#b5924e':'#be3a67';
      return '<div class="theme-kw-row">'
        +'<span class="theme-kw-name'+(kw[0]==='#'?' kw-hash':'')+'">'+kw+'</span>'
        +trendPill(kd[kw])
        +'<span class="theme-kw-score" style="color:'+sc+'">'+aStr+'分</span>'
        +'<span class="theme-kw-cnt">'+kd[kw].scores.length+'支</span>'
        +'</div>';
    }).join('');
  }

  function recycleHtml(type) {
    var recs = all.filter(function(v){
      var age=daysBetween(v.created_time);
      return v.type===type && age>=30 && age<=150 && (v.score||0)>=65;
    }).sort(function(a,b){return (b.score||0)-(a.score||0);}).slice(0,5);
    if (!recs.length) return '<div style="color:var(--muted);font-size:12px;padding:6px 0">暫無符合條件影片</div>';
    return recs.map(function(v){
      var title=truncTitle(v.description||v.caption||'',22);
      var age=daysBetween(v.created_time);
      var sc=v.score||0;
      return '<div class="theme-recycle-row">'
        +'<span style="font-size:10px;color:var(--muted);min-width:34px;flex-shrink:0">'+age+'天</span>'
        +'<span style="flex:1;font-weight:700;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+title+'</span>'
        +'<span style="font-size:13px;font-weight:400;color:'+(sc>=80?'#1a9e95':'#b5924e')+';min-width:28px;text-align:right;flex-shrink:0">'+sc+'分</span>'
        +'</div>';
    }).join('');
  }

  function renderTypeCol(type, label, icon) {
    var kd = buildKwData(type);
    var addKw={}, stopKw={}, holdKw={};
    Object.keys(kd).forEach(function(k){
      var c=classify(kd[k]);
      if(c==='add') addKw[k]=kd[k];
      else if(c==='stop') stopKw[k]=kd[k];
      else holdKw[k]=kd[k];
    });
    return '<div class="theme-col">'
      +'<div class="theme-col-head">'+icon+' '+label+'</div>'
      +'<div class="theme-sec">'
      +'<div class="theme-sec-title" style="color:#1a9e95">✅ 值得加碼（'+Object.keys(addKw).length+' 個主題）</div>'
      +renderKwRows(addKw)
      +'</div>'
      +'<div class="theme-sec">'
      +'<div class="theme-sec-title" style="color:#be3a67">🚫 考慮停拍（'+Object.keys(stopKw).length+' 個主題）</div>'
      +renderKwRows(stopKw)
      +'</div>'
      +(Object.keys(holdKw).length ? '<div class="theme-sec">'
        +'<div class="theme-sec-title" style="color:#b5924e">👀 持續觀察（'+Object.keys(holdKw).length+' 個主題）</div>'
        +renderKwRows(holdKw)
        +'</div>' : '')
      +'<div class="theme-sec">'
      +'<div class="theme-sec-title" style="color:#b5924e">♻ 可復投影片（30-150天 · 分數≥65）</div>'
      +recycleHtml(type)
      +'</div>'
      +'</div>';
  }

  document.getElementById('themeContent').innerHTML =
    '<div class="slabel" style="margin-bottom:16px">主題策略 · 依歷史表現分類建議</div>'
    +'<div style="background:rgba(181,146,78,.07);border:1px solid rgba(181,146,78,.25);border-radius:var(--r);padding:12px 16px;margin-bottom:18px;font-size:12px;line-height:1.8;color:var(--ink)">'
    +'<strong>判斷邏輯：</strong>✅ 值得加碼 = 平均分≥62且近30天沒衰退　🚫 考慮停拍 = 平均分&lt;52或近期下滑≥15%　♻ 可復投 = 30-150天前的高分影片，可換封面重發</div>'
    +'<div class="theme-cols">'
    +renderTypeCol('traffic','流量型','📈')
    +renderTypeCol('commerce','帶貨型','🛍')
    +'</div>';
}

function renderTop10() {
  var platF = document.getElementById('platFilter').value;

  var data  = STATIC_DATA.videos.filter(function(v) { return v.type === currentTop20Type; });

  data.sort(function(a, b) { return b.score - a.score; });
  var top10 = data.slice(0, 10);

  var insightBox = document.getElementById('insightBox');
  if (top10.length > 0) {
    insightBox.classList.remove('hidden');
    document.getElementById('insightBody').innerHTML = buildHighlight(top10[0]);
  } else {
    insightBox.classList.add('hidden');
  }

  if (top10.length === 0) {
    document.getElementById('rankingTable').innerHTML = '<div class="loading-row">暫無符合條件的影片</div>';
    return;
  }

  var rankClass  = function(i) { return i===0?'gold-r':i===1?'silver-r':i===2?'bronze-r':''; };
  var scoreClass = currentTop20Type === 'traffic' ? 't-score' : 'c-score';
  var colHeaders = currentTop20Type === 'traffic'

    : ['#','影片','評分','播放','留言率','觸及偏離','儲存/新粉',''];

  var rows = top10.map(function(v, i) {
    var dev     = reachDev(v);
    var devPct  = (dev >= 0 ? '+' : '') + (dev * 100).toFixed(1) + '%';
    var devColor = dev >= 0.05 ? '#1a9e95' : dev <= -0.05 ? 'var(--warn)' : '#7a6428';
    var daysOld = daysBetween(v.created_time);
    var extra   = v.platform === 'ig' ? fmtNum(v.saved || 0) : '+' + (v.newFollowers || 0);
    var title   = v.description || v.caption || '';
    var cols;
    if (currentTop20Type === 'traffic') {
      cols = [
        '<div class="rt-rank ' + rankClass(i) + '">' + (i+1) + '</div>',
        '<div><div class="rt-title" data-full="' + escAttr(title) + '">' + truncTitle(title) + '</div><div class="rt-date">' + daysOld + '天前 · ' + v.platform.toUpperCase() + '</div></div>',
        '<div class="rt-score ' + scoreClass + '">' + v.score + '</div>',
        '<div class="rt-num">' + fmtNum(v.plays||0) + '</div>',
        '<div class="rt-num">' + (v.plays?(v.shares/v.plays*100).toFixed(2)+'%':'—') + '</div>',
        '<div class="rt-num">' + (v.plays?(v.comments/v.plays*100).toFixed(2)+'%':'—') + '</div>',
        '<div class="rt-num" style="color:' + devColor + '">' + devPct + '</div>',
        '<div>' + (daysOld>=30&&daysOld<=150?'<span class="reuse-badge">♻ 復投</span>':'') + '</div>',
      ];
    } else {
      cols = [
        '<div class="rt-rank ' + rankClass(i) + '">' + (i+1) + '</div>',
        '<div><div class="rt-title" data-full="' + escAttr(title) + '">' + truncTitle(title) + '</div><div class="rt-date">' + daysOld + '天前 · ' + v.platform.toUpperCase() + '</div></div>',
        '<div class="rt-score ' + scoreClass + '">' + v.score + '</div>',
        '<div class="rt-num">' + fmtNum(v.plays||0) + '</div>',
        '<div class="rt-num">' + (v.plays?(v.comments/v.plays*100).toFixed(2)+'%':'—') + '</div>',
        '<div class="rt-num" style="color:' + devColor + '">' + devPct + '</div>',
        '<div class="rt-num">' + extra + '</div>',
        '<div>' + (daysOld>=30&&daysOld<=150?'<span class="reuse-badge">♻ 復投</span>':'') + '</div>',
      ];
    }
    return '<div class="rt-row">' + cols.join('') + '</div>';
  }).join('');

  document.getElementById('rankingTable').innerHTML =
    '<div class="rt-head">' + colHeaders.map(function(c) { return '<div>' + c + '</div>'; }).join('') + '</div>'
    + rows;
}

// ── 低效分析 ──────────────────────────────────────────────────────────────
function initWaste() {
  var all = STATIC_DATA.videos.filter(function(v){ return (v.plays||0) > 0; });
  // 爛片 = 低互動 + 低觸及（低流量低互動）
  var bad = all.filter(function(v){
    return loyaltyTier(v) === 'tier3' && reachDev(v) < -0.1;
  }).sort(function(a,b){ return a.score - b.score; });

  // 有流量沒互動（另一類需關注）
  var noEngage = all.filter(function(v){
    return loyaltyTier(v) === 'tier3' && reachDev(v) >= -0.1;
  }).sort(function(a,b){ return a.score - b.score; });

  // 低流量高互動（潛力片）
  var hidden = all.filter(function(v){
    return loyaltyTier(v) !== 'tier3' && reachDev(v) < -0.3;
  }).sort(function(a,b){ return b.plays - a.plays; });

  // 關鍵詞分析（從爛片標題取高頻詞）
  var stopWords = '的了是在我你他她它這那就都也很到說要去好不大沒來可會但和與及而或所如為上下中之以被得著過嗎呢啊喔哦吧呀一個有人片影片我們泰熙爾札娜IP'.split('');
  var wordCount = {};
  bad.slice(0,20).forEach(function(v){
    var text = (v.description || v.caption || '').replace(/[！？，。、「」【】\n\r!?,.]/g,' ');
    text.split(/\s+/).forEach(function(w){
      w = w.trim();
      if (w.length < 2) return;
      if (w.charAt(0) === '#') return;  // 排除 hashtag
      var isStop = stopWords.some(function(s){ return w === s; });
      if (isStop) return;
      wordCount[w] = (wordCount[w]||0) + 1;
    });
  });
  var topWords = Object.keys(wordCount).filter(function(w){ return wordCount[w] >= 2; })
    .sort(function(a,b){ return wordCount[b]-wordCount[a]; }).slice(0,12);

  var badComRate = bad.length ? Math.round(bad.filter(function(v){return v.type==='commerce';}).length/bad.length*100) : 0;
  var badFbRate  = bad.length ? Math.round(bad.filter(function(v){return v.platform==='fb';}).length/bad.length*100) : 0;
  var avgBadPlays = bad.length ? Math.round(bad.reduce(function(s,v){return s+(v.plays||0);},0)/bad.length) : 0;
  var medAll = (function(){
    var ps = all.map(function(v){return v.plays||0;}).sort(function(a,b){return a-b;});
    return ps.length ? ps[Math.floor(ps.length/2)] : 1;
  })();

  function badRow(v,i){
    var dev = reachDev(v); var devStr = (dev>=0?'+':'')+(dev*100).toFixed(0)+'%';
    var lr = loyaltyRate(v).toFixed(2);
    var title = v.description||v.caption||'';
    return '<div class="perf-panel-row" style="background:'+(i%2?'var(--off)':'')+';">'
      +'<div style="color:var(--muted)">'+(i+1)+'</div>'
      +'<div class="rt-title" data-full="'+escAttr(title)+'">'+truncTitle(title,14)+'</div>'
      +'<div style="font-weight:800">'+fmtNum(v.plays||0)+'</div>'
      +'<div style="color:var(--warn);font-weight:800">'+lr+'%</div>'
      +'<div style="color:var(--warn);font-size:11px">觸及 '+devStr+'</div>'
      +'</div>';
  }

  var html = '';

  // 區塊 1：爛片排行
  html += '<div class="slabel" style="margin-bottom:8px">🚫 低流量低互動 · 建議減少拍攝的主題（'+bad.length+' 支）</div>'
    +'<div class="perf-panel open" style="max-height:none;overflow:visible;margin-bottom:16px">'
    +'<div class="perf-panel-row perf-panel-head"><div>#</div><div>影片</div><div>播放</div><div>互動率</div><div>觸及</div></div>'
    +(bad.slice(0,10).map(badRow).join('') || '<div style="padding:12px;text-align:center;color:var(--muted)">暫無符合條件影片</div>')
    +'</div>';

  // 區塊 2：有流量沒互動
  if (noEngage.length) {
    html += '<div class="insight-box" style="border-color:rgba(251,146,60,.4);margin-bottom:14px">'
      +'<div class="insight-title" style="color:#c2580a">⚡ 有流量沒互動（'+noEngage.length+' 支）· 有機會翻身</div>'
      +'<div style="font-size:12px;line-height:1.7">演算法有在推，但觀眾看完就走。<strong>行動</strong>：①結尾加互動問句 ②加強 CTA「留言+1 領取」 ③前 3 秒鉤子要更強</div>'
      +'<div class="perf-panel open" style="max-height:none;overflow:visible;margin-top:10px">'
      +'<div class="perf-panel-row perf-panel-head"><div>#</div><div>影片</div><div>播放</div><div>互動率</div><div>觸及</div></div>'
      +noEngage.slice(0,10).map(badRow).join('')
      +'</div></div>';
  }

  // 區塊 3：潛力片
  if (hidden.length) {
    html += '<div class="insight-box" style="border-color:rgba(99,102,241,.3);margin-bottom:14px">'
      +'<div class="insight-title" style="color:#4f46e5">💎 低流量高互動（'+hidden.length+' 支）· 鐵粉喜歡但沒被推</div>'
      +'<div style="font-size:12px;line-height:1.7"><strong>行動</strong>：①換封面／標題重新發布 ②這類腳本值得重拍或複製 ③小額投廣測試看看</div>'
      +'<div class="perf-panel open" style="max-height:none;overflow:visible;margin-top:10px">'
      +'<div class="perf-panel-row perf-panel-head"><div>#</div><div>影片</div><div>播放</div><div>互動率</div><div>觸及</div></div>'
      +hidden.slice(0,10).map(badRow).join('')
      +'</div></div>';
  }

  document.getElementById('wasteContent').innerHTML = html;
}

// ── 搜尋分頁切換 ─────────────────────────────────────────────────────────
function switchSearchTab(id, el) {

// ── 關鍵字排行 ────────────────────────────────────────────────────────────
var _kwInited = false;
var _kwVidMap = {};

function initKeywordRank() {
  if (_kwInited) return;
  _kwInited = true;
  var all = STATIC_DATA.videos || [];
  var STOP = new Set(['的','了','我','你','他','她','它','們','在','是','有','和','也','但','都','到','就','這','那',
    '什麼','一個','可以','沒有','因為','所以','如果','不是','可是','還是','只是','還有','就是','其實',
    '現在','已經','非常','一起','大家','真的','這個','那個','一下','一直','好像','感覺','覺得','還是']);
  var freq = {};
  _kwVidMap = {};

  all.forEach(function(v) {
    var text = (v.description || v.caption || '');
    // 先把 # 標籤單獨取出，再分割剩餘文字
    var hashtags = [];
    text = text.replace(/#([^\s#，。！？、；：\n]+)/g, function(m, tag) {
      hashtags.push('#' + tag);
      return ' ';
    });
    var words = text.split(/[\s，。！？、；：「」『』【】（）(),.!?;:\n]+/).filter(Boolean);
    var tokens = words.concat(hashtags);
    var seen = new Set();
    tokens.forEach(function(w) {
      w = w.trim();
      if (!w) return;
      var isHash = w.charAt(0) === '#';
      if (!isHash) {
        if (w.length < 2) return;
        if (STOP.has(w)) return;
        // 過濾純數字
        if (/^\d+$/.test(w)) return;
      }
      if (seen.has(w)) return;
      seen.add(w);
      freq[w] = (freq[w] || 0) + 1;
      if (!_kwVidMap[w]) _kwVidMap[w] = [];
      _kwVidMap[w].push(v);
    });
  });

  var sorted = Object.keys(freq)
    .filter(function(k){ return freq[k] >= 2; })
    .sort(function(a, b){ return freq[b] - freq[a]; })
    .slice(0, 120);

  var html = '<div class="kw-rank-list">';
  sorted.forEach(function(kw, i) {
    var vids = _kwVidMap[kw];
    var avgPlays = Math.round(vids.reduce(function(s,v){ return s + (v.plays||0); }, 0) / vids.length);
    var isHash = kw.charAt(0) === '#';
    html += '<div class="kw-rank-row" data-idx="' + i + '" data-kw="' + escAttr(kw) + '" onclick="toggleKwPanel(' + i + ',this)">'
      + '<span class="kw-rank-num">' + (i+1) + '</span>'
      + '<span class="kw-chip' + (isHash ? ' kw-hash' : '') + '">' + kw + '</span>'
      + '<span class="kw-count">' + freq[kw] + ' 支</span>'
      + '<span class="kw-avg-plays">均 ' + fmtNum(avgPlays) + ' 播</span>'
      + '<span class="kw-expand-icon">▾</span>'
      + '</div>'
      + '<div class="kw-vid-panel" id="kwp-' + i + '"></div>';
  });
  html += '</div>';
  document.getElementById('keywordRankContent').innerHTML = html;
}

function toggleKwPanel(idx, rowEl) {
  var panel = document.getElementById('kwp-' + idx);
  var icon = rowEl.querySelector('.kw-expand-icon');
  if (panel.classList.contains('open')) {
    panel.classList.remove('open');
    icon.textContent = '▾';
    return;
  }
  var kw = rowEl.getAttribute('data-kw');
  var vids = (_kwVidMap[kw] || []).slice().sort(function(a,b){ return (b.plays||0)-(a.plays||0); });
  panel.innerHTML = vids.map(function(v) {
    var title = v.description || v.caption || '(無標題)';
    var scoreColor = v.score >= 80 ? '#1a9e95' : v.score >= 65 ? 'var(--pink)' : 'var(--warn)';
    var dev = reachDev(v);
    var devPct = (dev >= 0 ? '+' : '') + (dev * 100).toFixed(1) + '%';
    var devClass = dev >= 0.05 ? 'pos' : dev <= -0.05 ? 'neg' : 'neu';
    var lt = loyaltyTier(v);
    var tl = tierLabel(lt);
    return '<div class="kw-vid-row">'
      + '<span style="font-size:10px;color:var(--muted);min-width:54px;flex-shrink:0">' + fmtDate(v.created_time) + '</span>'
      + '<span style="flex:1;font-size:12px;font-weight:700;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">' + title + '</span>'
      + '<span style="font-size:13px;font-weight:600;color:' + scoreColor + ';min-width:32px;text-align:right;flex-shrink:0">' + (v.score||0) + '分</span>'
      + '<span style="font-size:12px;font-weight:700;min-width:64px;text-align:right;flex-shrink:0">' + fmtNum(v.plays||0) + ' 播</span>'
      + '<span class="devbadge ' + devClass + '" style="margin-left:6px;flex-shrink:0">' + devPct + '</span>'
      + '<span class="badge ' + lt + '" style="margin-left:6px;flex-shrink:0">' + tl + '</span>'
      + '</div>';
  }).join('');
  panel.classList.add('open');
  icon.textContent = '▴';
}

// ── 尋找 ─────────────────────────────────────────────────────────────────
function runSearch(q) {
  var out = document.getElementById('searchResults');
  q = (q || '').trim();
  if (!q) {
    out.innerHTML = '<div class="search-empty">輸入關鍵字尋找影片</div>';
    return;
  }
  var lq = q.toLowerCase();
  var all = (STATIC_DATA.videos || []);
  var matches = all.filter(function(v) {
    var t = (v.description || v.caption || '').toLowerCase();
    return t.indexOf(lq) !== -1;
  });
  if (!matches.length) {
    out.innerHTML = '<div class="search-empty">找不到「' + q + '」相關影片</div>';
    return;
  }
  out.innerHTML = matches.slice(0, 20).map(function(v) {
    var title = v.description || v.caption || '(無標題)';
    var age = daysBetween(v.created_time);
    var platIcon = v.platform === 'fb' ? '📘 FB' : '📸 IG';
    var scoreColor = v.score >= 80 ? '#1a9e95' : v.score >= 65 ? 'var(--pink)' : 'var(--warn)';
    var lr = loyaltyRate(v).toFixed(2);
    var lt = loyaltyTier(v);
    var tl = tierLabel(lt);
    var dev = reachDev(v);
    var devPct = (dev >= 0 ? '+' : '') + (dev * 100).toFixed(1) + '%';
    var devClass = dev >= 0.05 ? 'pos' : dev <= -0.05 ? 'neg' : 'neu';
    // similar-score comparisons
    var comps = all.filter(function(c) {
      return c !== v && Math.abs((c.score || 0) - (v.score || 0)) <= 10;
    }).sort(function(a, b) { return (b.plays || 0) - (a.plays || 0); }).slice(0, 5);
    var compsHtml = comps.length
      ? '<div class="search-comps"><div class="search-comps-title">相似分數影片（±10分）</div>'
        + comps.map(function(c) {
            var ct = c.description || c.caption || '(無標題)';
            return '<div class="search-comp-row">'
              + '<span class="search-comp-score" style="color:' + (c.score >= 80 ? '#1a9e95' : c.score >= 65 ? 'var(--pink)' : 'var(--warn)') + '">' + (c.score || 0) + '分</span>'
              + '<span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:12px">' + ct + '</span>'
              + '<span style="font-size:11px;color:var(--muted);margin-left:8px;white-space:nowrap">' + fmtNum(c.plays || 0) + ' 播</span>'
              + '</div>';
          }).join('')
        + '</div>'
      : '';
    return '<div class="search-result">'
      + '<div class="search-result-head">'
      + '<div class="search-result-title">' + title + '</div>'
      + '<div class="search-result-meta">' + fmtDate(v.created_time) + ' · ' + age + '天前 · ' + platIcon
      + ' · <span style="color:' + scoreColor + ';font-weight:800">' + (v.score || 0) + '分</span>'
      + ' · <span class="badge ' + lt + '">' + tl + '</span>'
      + '</div>'
      + '</div>'
      + '<div class="search-stats">'
      + '<div class="search-stat"><div class="search-stat-val">' + fmtNum(v.plays || 0) + '</div><div class="search-stat-lbl">播放</div></div>'
      + '<div class="search-stat"><div class="search-stat-val">' + fmtNum(v.likes || 0) + '</div><div class="search-stat-lbl">讚</div></div>'
      + '<div class="search-stat"><div class="search-stat-val">' + fmtNum(v.comments || 0) + '</div><div class="search-stat-lbl">留言</div></div>'
      + '<div class="search-stat"><div class="search-stat-val"><span class="devbadge ' + devClass + '">' + devPct + '</span></div><div class="search-stat-lbl">觸及偏離</div></div>'
      + '</div>'
      + compsHtml
      + '</div>';
  }).join('');
}

// ── Tab 切換 ──────────────────────────────────────────────────────────────
var initiated = { overview: false, theme: false, top20: false, search: false };

function switchTab(id, el) {
  document.querySelectorAll('.section').forEach(function(s) { s.classList.remove('active'); });
  document.querySelectorAll('.tab').forEach(function(t) { t.classList.remove('active'); });
  document.getElementById('sec-' + id).classList.add('active');
  el.classList.add('active');
  if (!initiated[id]) {
    initiated[id] = true;
    if (id === 'overview') initOverview();
    if (id === 'theme') initTheme();
    if (id === 'top20') renderTop10();
  }
  if (id === 'search') {
    setTimeout(function() { document.getElementById('searchInput').focus(); }, 50);
    var sr = document.getElementById('searchResults');
    if (!sr.innerHTML) sr.innerHTML = '<div class="search-empty">輸入關鍵字尋找影片</div>';
  }
}

function mobileSwitchTab(id, el) {
  var tabMap = { overview: 0, theme: 1, top20: 2, search: 3 };
  var tabs = document.querySelectorAll('.tab');
  if (tabs[tabMap[id]] !== undefined) tabs[tabMap[id]].click();
  document.querySelectorAll('.mob-tab').forEach(function(t) { t.classList.remove('active'); });
  el.classList.add('active');
}

// ── 標題點擊展開 ──────────────────────────────────────────────────────────
document.addEventListener('click', function(e) {
  var el = e.target;
  if (el.classList.contains('vcard-title') || el.classList.contains('rt-title')) {
    var full = el.dataset.full || el.textContent;
    if (el.classList.contains('expanded')) {
      el.textContent = truncTitle(full);
      el.classList.remove('expanded');
    } else {
      el.textContent = full;
      el.classList.add('expanded');
    }
  }
});

// ── 初始化 ────────────────────────────────────────────────────────────────
window.addEventListener('DOMContentLoaded', function() {
  function updateClock() {
    var now = new Date();
    var pad = function(n) { return n < 10 ? '0' + n : '' + n; };
    var s = now.getFullYear() + '-' + pad(now.getMonth()+1) + '-' + pad(now.getDate())
          + ' ' + pad(now.getHours()) + ':' + pad(now.getMinutes()) + ':' + pad(now.getSeconds());
    document.getElementById('snapshotBadge').textContent = '🕐 ' + s;
  }
  updateClock();
  setInterval(updateClock, 1000);
  initiated.overview = true;
  initOverview();
});
