<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>泰熙爾札娜 IP 影片成效儀表板</title>
<style>
:root{
  --pink:#9b2c7e;--rose:#7d1a5e;--teal:#0d9488;--gold:#b5924e;
  --black:#1e293b;--white:#fff;--off:#f8f7f5;--ink:#1a1a1a;--muted:#7a7a7a;--border:#e8e8e8;
  --good:#0d9488;--ok:#b5924e;--warn:#be3a67;
  --font:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang TC','Microsoft JhengHei',sans-serif;
  --r:10px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font);background:var(--off);color:var(--ink);min-height:100vh;-webkit-font-smoothing:antialiased}
.hdr{background:var(--white);position:sticky;top:0;z-index:200;border-bottom:2px solid var(--teal);box-shadow:0 1px 8px rgba(0,0,0,.07)}
.hdr-in{max-width:1400px;margin:0 auto;padding:0 28px;display:flex;align-items:stretch;justify-content:space-between;min-height:56px;gap:16px}
.brand{display:flex;align-items:center;gap:10px}
.brand-mark{width:30px;height:30px;background:var(--pink);border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0}
.brand-name{font-size:13px;font-weight:800;color:var(--ink);letter-spacing:.3px;line-height:1.3}
.brand-name small{display:block;font-size:10px;font-weight:400;color:var(--muted);letter-spacing:.5px}
@media(max-width:640px){.brand-name{font-size:11px;white-space:nowrap}.brand-name small{display:none}}
.hdr-right{display:flex;align-items:center;gap:10px}
.snapshot-badge{font-size:12px;font-weight:700;color:var(--muted);background:var(--off);border:1px solid var(--border);border-radius:6px;padding:4px 10px;white-space:nowrap}
.tabs{background:var(--white);border-bottom:1px solid var(--border)}
.tabs-in{max-width:1400px;margin:0 auto;padding:0 28px;display:flex}
.tab{padding:12px 22px;font-size:13px;font-weight:600;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;transition:all .2s;white-space:nowrap}
.tab:hover{color:var(--ink)}
.tab.active{color:var(--teal);border-bottom-color:var(--teal)}
.page{max-width:1400px;margin:0 auto;padding:24px 28px 60px}
.section{display:none}
.section.active{display:block}
.slabel{font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:2px;color:var(--muted);margin-bottom:18px;display:flex;align-items:center;gap:10px}
.slabel::before{content:'';width:16px;height:3px;background:var(--gold);border-radius:2px;flex-shrink:0}

/* ── 總覽 KPI ── */
.kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:28px}
@media(max-width:900px){.kpi-grid{grid-template-columns:repeat(2,1fr)}}
.kpi-card{background:var(--white);border:1px solid var(--border);border-radius:var(--r);padding:18px 20px;position:relative;overflow:hidden}
.kpi-label{font-size:10px;color:var(--muted);margin-bottom:8px;font-weight:700;text-transform:uppercase;letter-spacing:.8px}
.kpi-val{font-size:30px;font-weight:900;line-height:1;letter-spacing:-1px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.kpi-sub{font-size:11px;color:var(--muted);margin-top:6px}
.kpi-accent{position:absolute;bottom:0;left:0;right:0;height:3px}

/* ── 本週精選 ── */
.top3-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:28px}
@media(max-width:960px){.top3-grid{grid-template-columns:1fr 1fr}}
@media(max-width:600px){.top3-grid{grid-template-columns:1fr}}
.mini-card{background:var(--white);border:1px solid var(--border);border-radius:var(--r);padding:16px}
.mini-card-rank{font-size:10px;font-weight:800;color:var(--muted);margin-bottom:8px;display:flex;align-items:center;gap:6px;text-transform:uppercase;letter-spacing:.8px}
.mini-rank-num{font-size:20px;font-weight:900}
.mini-rank-num.gold-r{color:var(--gold)}
.mini-rank-num.silver-r{color:#b0b0b0}
.mini-rank-num.bronze-r{color:#cd7f32}
.mini-card-title{font-size:13px;font-weight:700;line-height:1.4;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;margin-bottom:12px;min-height:36px}
.mini-score{font-size:36px;font-weight:900;letter-spacing:-2px;line-height:1;margin-bottom:6px}
.mini-card-stats{display:flex;gap:14px;font-size:11px;margin-bottom:10px}
.mini-card-stats span{display:flex;flex-direction:column;gap:2px}
.mini-card-stats .ms-label{color:var(--muted)}
.mini-card-stats .ms-val{font-size:13px;font-weight:800;color:var(--ink)}
.mini-card-why{background:var(--off);border-radius:6px;padding:8px 10px;font-size:11px;color:var(--ink);line-height:1.6}
.mini-plat-badge{display:inline-flex;padding:2px 7px;border-radius:4px;font-size:10px;font-weight:700}

/* ── 平台對比 ── */
.plat-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:28px}
@media(max-width:640px){.plat-grid{grid-template-columns:1fr}}
.plat-card{background:var(--white);border:1px solid var(--border);border-radius:var(--r);padding:18px 20px}
.plat-head{display:flex;align-items:center;gap:10px;margin-bottom:14px;border-bottom:1px solid var(--border);padding-bottom:12px}
.plat-icon{font-size:22px}
.plat-name{font-size:15px;font-weight:800}
.plat-count{font-size:11px;color:var(--muted);margin-left:auto}
.plat-stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.plat-stat{padding:10px;background:var(--off);border-radius:6px}
.plat-stat-label{font-size:10px;color:var(--muted);margin-bottom:4px;font-weight:600}
.plat-stat-val{font-size:16px;font-weight:900}

/* ── 表現分佈 ── */
.perf-dist{background:var(--white);border:1px solid var(--border);border-radius:var(--r);padding:20px;margin-bottom:28px}
.perf-dist-title{font-size:12px;font-weight:700;color:var(--ink);margin-bottom:14px}
.perf-dist-rows{display:flex;flex-direction:column;gap:12px}
.perf-dist-row{display:flex;align-items:center;gap:10px}
.perf-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.perf-label{font-size:12px;color:var(--ink);width:64px;font-weight:600;flex-shrink:0}
.perf-bar-wrap{flex:1;height:10px;background:var(--off);border-radius:5px;overflow:hidden}
.perf-bar-fill{height:100%;border-radius:5px}
.perf-count{font-size:13px;font-weight:800;min-width:24px;text-align:right}
.perf-desc{font-size:10px;color:var(--muted);margin-left:6px;white-space:nowrap}
.perf-toggle{margin-left:auto;flex-shrink:0;font-size:11px;font-weight:700;padding:3px 10px;border-radius:5px;border:1px solid var(--border);background:var(--white);cursor:pointer;color:var(--ink);font-family:var(--font)}
.perf-toggle:hover{background:var(--off)}
.perf-panel{display:none;margin-top:10px;border:1px solid var(--border);border-radius:8px;overflow:hidden}
.perf-panel.open{display:block}
.perf-panel-row{display:grid;grid-template-columns:70px 1fr 60px 50px 60px;gap:8px;padding:9px 14px;border-bottom:1px solid var(--border);align-items:center;font-size:12px}
.perf-panel-row:last-child{border-bottom:none}
.perf-panel-row:hover{background:var(--off)}
.perf-panel-head{background:var(--off);font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--muted)}
.perf-panel-title{font-weight:700;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
@media(max-width:640px){.perf-panel-row{grid-template-columns:60px 1fr 50px}.perf-panel-row>div:nth-child(n+4){display:none}}

/* ── 低效分析頁 ── */
.waste-advice{background:rgba(190,58,103,.06);border:1px solid rgba(190,58,103,.2);border-radius:8px;padding:14px 16px;margin-bottom:16px;font-size:13px;line-height:1.8}
.waste-advice-title{font-weight:900;font-size:13px;margin-bottom:6px;color:var(--warn)}
.waste-kw-grid{display:flex;flex-wrap:wrap;gap:6px;margin-top:10px}
.waste-kw{padding:4px 10px;border-radius:20px;font-size:12px;font-weight:700;background:rgba(190,58,103,.1);color:var(--warn)}
.waste-stat-row{display:flex;gap:10px;flex-wrap:wrap;margin:10px 0}
.waste-stat{flex:1;min-width:110px;background:var(--off);border-radius:8px;padding:10px 12px;text-align:center}
.waste-stat-val{font-size:18px;font-weight:900;color:var(--warn)}
.waste-stat-lbl{font-size:10px;color:var(--muted);margin-top:2px}
/* 忠實度 per-video 情境標籤 */
.sit-tag{display:inline-block;font-size:10px;font-weight:800;padding:2px 7px;border-radius:3px;margin-left:6px;vertical-align:middle}
.sit-no-engage{background:rgba(251,146,60,.15);color:#c2580a}
.sit-no-reach{background:rgba(99,102,241,.15);color:#4f46e5}
.sit-both-low{background:rgba(190,58,103,.12);color:var(--warn)}
/* 行動建議 */
.tier-advice{background:var(--off);border-left:3px solid var(--border);border-radius:0 6px 6px 0;padding:10px 14px;margin:8px 0 4px;font-size:12px;line-height:1.7;color:var(--text)}

/* ── 爆流量警報 ── */
.viral-alert{background:linear-gradient(135deg,rgba(239,68,68,.07),rgba(251,146,60,.07));border:1.5px solid rgba(239,68,68,.35);border-radius:var(--r);padding:14px 16px}
.viral-hdr{font-size:13px;font-weight:900;color:#e03030;margin-bottom:10px;display:flex;align-items:center;gap:6px}
.viral-item{display:flex;align-items:center;gap:10px;padding:7px 0;border-bottom:1px solid rgba(239,68,68,.12);font-size:13px}
.viral-item:last-child{border-bottom:none}
.viral-plays{font-weight:900;color:#e03030;min-width:60px}
.viral-gain{font-size:11px;font-weight:700;background:rgba(239,68,68,.12);color:#e03030;padding:2px 7px;border-radius:4px}
.viral-badge{display:inline-block;font-size:10px;font-weight:800;background:#e03030;color:#fff;padding:1px 6px;border-radius:3px;margin-left:4px}

/* ── 排行亮點解析 ── */
.insight-box{background:linear-gradient(135deg,rgba(13,148,136,.06),rgba(181,146,78,.06));border:1px solid rgba(13,148,136,.25);border-radius:var(--r);padding:16px 18px;margin-bottom:18px}
.insight-box.hidden{display:none}
.insight-title{font-size:11px;font-weight:800;color:var(--teal);text-transform:uppercase;letter-spacing:.8px;margin-bottom:8px}
.insight-body{font-size:12px;line-height:1.8;color:var(--ink)}

/* ── 通用元件 ── */
.alert-banner{display:flex;align-items:center;gap:12px;background:rgba(190,58,103,.06);border:1px solid rgba(190,58,103,.2);border-left:4px solid var(--warn);border-radius:var(--r);padding:12px 18px;margin-bottom:20px;font-size:13px}
.alert-banner.hidden{display:none}
.alert-banner strong{color:var(--warn)}
.state-box{background:var(--white);border:1px solid var(--border);border-radius:var(--r);padding:48px 24px;text-align:center;color:var(--muted)}
.state-box .state-icon{font-size:40px;margin-bottom:12px}
.state-box h3{font-size:15px;font-weight:700;color:var(--ink);margin-bottom:6px}
.yday-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:16px}
@media(max-width:900px){.yday-grid{grid-template-columns:1fr}}
.vcard{background:var(--white);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;transition:transform .2s,box-shadow .2s}
.vcard:hover{transform:translateY(-2px);box-shadow:0 8px 28px rgba(0,0,0,.08)}
.vcard.tier3{border-color:rgba(190,58,103,.3)}
.vcard-top{padding:16px 18px 12px;display:flex;align-items:flex-start;gap:14px;border-bottom:1px solid var(--border)}
.vcard-thumb{width:52px;height:52px;border-radius:8px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:24px}
.vcard-meta{flex:1;min-width:0}
.vcard-badges{display:flex;gap:6px;margin-bottom:6px;flex-wrap:wrap}
.badge{display:inline-flex;align-items:center;gap:3px;padding:2px 8px;border-radius:4px;font-size:10px;font-weight:700;letter-spacing:.3px}
.badge.commerce{background:rgba(155,44,126,.1);color:var(--pink);border:1px solid rgba(155,44,126,.2)}
.badge.traffic{background:rgba(13,148,136,.1);color:#0d9488;border:1px solid rgba(13,148,136,.2)}
.badge.fb{background:rgba(197,179,130,.12);color:#7a6428}
.badge.ig{background:rgba(13,148,136,.1);color:#1a9e95}
.badge.tier1{background:rgba(13,148,136,.12);color:#1a9e95}
.badge.tier2{background:rgba(197,179,130,.15);color:#7a6428}
.badge.tier3{background:rgba(190,58,103,.08);color:var(--warn)}
.vcard-title{font-size:13px;font-weight:700;line-height:1.4;margin-bottom:2px;display:-webkit-box;-webkit-line-clamp:1;-webkit-box-orient:vertical;overflow:hidden;cursor:pointer;user-select:none}
.vcard-title.expanded{display:block;overflow:visible;white-space:normal;-webkit-line-clamp:unset}
.vcard-date{font-size:11px;color:var(--muted)}
.score-ring{position:relative;width:58px;height:58px;flex-shrink:0}
.score-ring canvas{position:absolute;top:0;left:0}
.score-num{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;line-height:1}
.score-num strong{font-size:18px;font-weight:900;letter-spacing:-1px}
.score-num span{font-size:8px;color:var(--muted);margin-top:1px}
.vcard-metrics{padding:14px 18px;display:grid;grid-template-columns:repeat(3,1fr);gap:10px;border-bottom:1px solid var(--border)}
.metric-label{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px}
.metric-val{font-size:14px;font-weight:800;margin-top:2px}
.metric-val.pink{color:var(--pink)}
.metric-val.teal{color:#1a9e95}
.metric-val.gold{color:#7a6428}
.mbar{height:3px;background:var(--off);border-radius:2px;overflow:hidden;margin-top:4px}
.mbar-fill{height:100%;border-radius:2px}
.retention-strip{padding:10px 18px;border-bottom:1px solid var(--border);background:var(--off)}
.retention-label{font-size:10px;color:var(--muted);margin-bottom:5px}
.retention-bar{display:flex;gap:1px;height:18px;align-items:flex-end}
.ret-seg{flex:1;border-radius:1px;min-width:2px}
.retention-insight{font-size:11px;color:var(--ink);margin-top:6px;padding:5px 8px;background:var(--white);border-radius:4px;line-height:1.5}
.vcard-bottom{padding:12px 18px;display:flex;gap:16px;background:var(--off)}
.loyalty-val{font-size:13px;font-weight:800}
.loyalty-val.t1{color:#1a9e95}
.loyalty-val.t2{color:#7a6428}
.loyalty-val.t3{color:var(--warn)}
.tier-explain{font-size:10px;color:var(--muted);margin-top:3px;line-height:1.5}
.devbadge{display:inline-flex;font-size:11px;font-weight:700;padding:2px 7px;border-radius:4px}
.devbadge.pos{background:rgba(13,148,136,.12);color:#1a9e95}
.devbadge.neg{background:rgba(190,58,103,.08);color:var(--warn)}
.devbadge.neu{background:rgba(197,179,130,.12);color:#7a6428}
.period-btns{display:flex;gap:0;border:1px solid var(--border);border-radius:var(--r);overflow:hidden;width:fit-content}
.period-btn{padding:7px 18px;font-size:12px;font-weight:700;cursor:pointer;background:var(--white);color:var(--muted);border:none;border-right:1px solid var(--border);font-family:var(--font);transition:all .2s}
.period-btn:last-child{border-right:none}
.period-btn.active{background:var(--black);color:var(--white)}
.top20-tabs{display:flex;gap:0;margin-bottom:20px;border:1px solid var(--border);border-radius:var(--r);overflow:hidden;width:fit-content}
.t20-tab{padding:9px 22px;font-size:13px;font-weight:700;cursor:pointer;background:var(--white);color:var(--muted);transition:all .2s;border-right:1px solid var(--border)}
.t20-tab:last-child{border-right:none}
.t20-tab.active.traffic{background:var(--teal);color:var(--white)}
.t20-tab.active.commerce{background:var(--pink);color:var(--white)}
.top20-filters{display:flex;gap:10px;margin-bottom:18px;flex-wrap:wrap;align-items:center}
.filter-select{background:var(--white);border:1px solid var(--border);border-radius:6px;padding:6px 12px;font-size:12px;font-family:var(--font);color:var(--ink);cursor:pointer}
.ranking-table{background:var(--white);border:1px solid var(--border);border-radius:var(--r);overflow:hidden}
.table-scroll{overflow-x:auto}
.rt-head{display:grid;background:var(--off);border-bottom:1px solid var(--border);padding:9px 18px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--muted);grid-template-columns:32px 2fr 64px 80px 80px 80px 90px 80px}
.rt-row{display:grid;padding:12px 18px;border-bottom:1px solid var(--border);align-items:center;transition:background .15s;grid-template-columns:32px 2fr 64px 80px 80px 80px 90px 80px;min-width:600px}
@media(max-width:640px){
  .rt-head{grid-template-columns:28px 1fr 44px;padding:8px 12px}
  .rt-head div:nth-child(n+4){display:none}
  .rt-row{grid-template-columns:28px 1fr 44px;min-width:0;padding:10px 12px}
  .rt-row>div:nth-child(n+4){display:none}
  .rt-row>div:nth-child(2){min-width:0;overflow:hidden}
}
.rt-row:last-child{border-bottom:none}
.rt-row:hover{background:var(--off)}
.rt-rank{font-size:16px;font-weight:900;color:var(--border)}
.rt-rank.gold-r{color:var(--gold)}
.rt-rank.silver-r{color:#b0b0b0}
.rt-rank.bronze-r{color:#cd7f32}
.rt-title{font-size:13px;font-weight:700;line-height:1.3;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;cursor:pointer;user-select:none;max-width:100%}
.rt-title.expanded{white-space:normal;overflow:visible;text-overflow:unset}
.rt-date{font-size:11px;color:var(--muted);margin-top:1px}
.rt-score{font-size:20px;font-weight:900;letter-spacing:-1px}
.rt-score.t-score{color:#1a9e95}
.rt-score.c-score{color:var(--pink)}
.rt-num{font-size:13px;font-weight:700}
.reuse-badge{display:inline-flex;align-items:center;gap:4px;padding:3px 8px;border-radius:4px;font-size:10px;font-weight:800;background:var(--black);color:var(--white)}
.loading-row{padding:20px;text-align:center;color:var(--muted);font-size:13px;border-bottom:1px solid var(--border)}
.mob-nav{display:none;position:fixed;bottom:0;left:0;right:0;background:var(--black);border-top:1px solid rgba(255,255,255,.08);z-index:200;padding:8px 0 max(8px,env(safe-area-inset-bottom))}
.mob-nav-in{display:flex;justify-content:space-around}
.mob-tab{display:flex;flex-direction:column;align-items:center;gap:2px;color:rgba(255,255,255,.3);font-size:9px;cursor:pointer;padding:4px 10px;transition:color .2s}
.mob-tab .mi{font-size:18px}
.mob-tab.active{color:var(--teal)}
@media(max-width:640px){.mob-nav{display:block};body{padding-bottom:70px}.tabs{display:none}}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
</style>
</head>
<body>

<header class="hdr">
  <div class="hdr-in">
    <div class="brand">
      <div class="brand-mark">◈</div>
      <div class="brand-name">泰熙爾札娜 IP<small>影片成效儀表板</small></div>
    </div>
    <div class="hdr-right">
      <span class="snapshot-badge" id="snapshotBadge">載入中…</span>
    </div>
  </div>
</header>

<div class="tabs">
  <div class="tabs-in">
    <div class="tab active" onclick="switchTab('overview',this)">📊 總覽</div>
    <div class="tab" onclick="switchTab('top20',this)">🏆 排行榜</div>
    <div class="tab" onclick="switchTab('detail',this)">🎬 影片詳細</div>
    <div class="tab" onclick="switchTab('waste',this)">🚫 低效分析</div>
  </div>
</div>

<div class="page">

  <!-- 總覽 -->
  <div class="section active" id="sec-overview">
    <div id="viralSection" style="display:none;margin-bottom:12px"></div>

    <div class="slabel">本月成績 · 與上月同期相比</div>
    <div class="kpi-grid" id="kpiGrid"></div>

    <div class="slabel">本週表現最好的影片 · Top 3</div>
    <div class="top3-grid" id="top3Grid"></div>

    <div class="slabel">平台對比 · 近 7 天</div>
    <div class="plat-grid" id="platGrid"></div>

    <div class="slabel">忠實度分佈 · 近 7 天</div>
    <div class="perf-dist" id="perfDist"></div>
  </div>

  <!-- 排行榜 -->
  <div class="section" id="sec-top20">
    <div class="slabel">長期排行 · Top 10</div>
    <div class="top20-tabs">
      <div class="t20-tab active traffic" onclick="switchTop20('traffic',this)">📈 流量型 Top 10</div>
      <div class="t20-tab commerce" onclick="switchTop20('commerce',this)">🛍 帶貨型 Top 10</div>
    </div>
    <div class="top20-filters">
      <div class="period-btns">
        <button class="period-btn active" onclick="setPeriod('7',this)">7天</button>
        <button class="period-btn" onclick="setPeriod('30',this)">30天</button>
        <button class="period-btn" onclick="setPeriod('90',this)">90天</button>
        <button class="period-btn" onclick="setPeriod('9999',this)">全部</button>
      </div>
      <select class="filter-select" id="platFilter" onchange="renderTop10()">
        <option value="all">全部平台</option>
        <option value="fb">Facebook</option>
        <option value="ig">Instagram</option>
      </select>
    </div>
    <div class="insight-box hidden" id="insightBox">
      <div class="insight-title">🔍 第一名亮點解析</div>
      <div class="insight-body" id="insightBody"></div>
    </div>
    <div class="table-scroll">
      <div class="ranking-table" id="rankingTable">
        <div class="loading-row">載入中…</div>
      </div>
    </div>
  </div>

  <!-- 低效分析 -->
  <div class="section" id="sec-waste">
    <div id="wasteContent"></div>
  </div>

  <!-- 影片詳細 -->
  <div class="section" id="sec-detail">
    <div class="alert-banner hidden" id="alertBanner">
      ⚠ <strong>今日有 <span id="alertCount">0</span> 支影片需優化</strong>（原粉互動率 &lt; 1%，詳見下方）
    </div>
    <div class="slabel" id="detailLabel">影片詳細 · 載入中…</div>
    <div id="detailGrid"></div>
  </div>
</div>

<div class="mob-nav">
  <div class="mob-nav-in">
    <div class="mob-tab active" onclick="mobileSwitchTab('overview',this)"><span class="mi">📊</span>總覽</div>
    <div class="mob-tab" onclick="mobileSwitchTab('top20',this)"><span class="mi">🏆</span>排行</div>
    <div class="mob-tab" onclick="mobileSwitchTab('detail',this)"><span class="mi">🎬</span>詳細</div>
    <div class="mob-tab" onclick="mobileSwitchTab('waste',this)"><span class="mi">🚫</span>低效</div>
  </div>
</div>

<script>
const STATIC_DATA = __STATIC_DATA__;
const AVG = { fb: STATIC_DATA.avg_fb, ig: STATIC_DATA.avg_ig };
let activePeriod = '7';
let currentTop20Type = 'traffic';

// ── 工具 ──────────────────────────────────────────────────────────────────
function daysBetween(isoStr) {
  return Math.floor((Date.now() - new Date(isoStr)) / 86400000);
}
function fmtDate(isoStr) {
  return new Date(isoStr).toLocaleDateString('zh-TW', {
    timeZone: 'Asia/Taipei', month: '2-digit', day: '2-digit'
  });
}
function fmtNum(n) {
  n = n || 0;
  return n >= 1000000 ? (n/1000000).toFixed(2)+'M'
       : n >= 1000    ? (n/1000).toFixed(1)+'K'
       : n.toString();
}
function reachDev(v) {
  var avg = v.platform === 'fb' ? AVG.fb : AVG.ig;
  return avg > 0 ? ((v.reach || 0) - avg) / avg : 0;
}

// ── 爆流量偵測 ────────────────────────────────────────────────────────────
function isViral(v) {
  if ((v.plays || 0) < 10000) return false;
  var age = daysBetween(v.created_time);
  if (age > 20) return false;  // 超過 20 天就算好片，不算爆流量
  // 方法1：2小時內新增 2000+ 播放（每2小時更新，能即時抓到）
  var prev = v.playsPrev || 0;
  if (prev > 0 && (v.plays - prev) >= 2000 && v.playsPrevAt && daysBetween(v.playsPrevAt) <= 1) return true;
  // 方法2（補強）：觸及超出頻道中位數 100%+ = 演算法正在推送
  if (reachDev(v) >= 1.0) return true;
  return false;
}
function viralGain(v) {
  var prev = v.playsPrev || 0;
  return prev > 0 ? v.plays - prev : 0;
}
function renderViralSection(virals) {
  var el = document.getElementById('viralSection');
  if (!virals || virals.length === 0) { el.style.display = 'none'; return; }
  el.style.display = 'block';
  el.innerHTML = '<div class="viral-alert"><div class="viral-hdr">🚀 爆流量警報 — 這幾支影片正在衝！</div>'
    + virals.slice(0, 5).map(function(v) {
      var gain = viralGain(v);
      var title = (v.description || v.caption || '').slice(0, 22);
      var plat = v.platform === 'fb'
        ? '<span style="font-size:10px;color:#1877f2;font-weight:800">FB</span>'
        : '<span style="font-size:10px;color:#e1306c;font-weight:800">IG</span>';
      var gainHtml = gain > 0
        ? ' <span class="viral-gain">本次 +' + fmtNum(gain) + '</span>'
        : '';
      return '<div class="viral-item">'
        + plat + ' '
        + '<span style="flex:1;overflow:hidden;white-space:nowrap;text-overflow:ellipsis">' + title + '</span>'
        + '<span class="viral-plays">' + fmtNum(v.plays) + ' 播</span>'
        + gainHtml
        + '</div>';
    }).join('')
    + '</div>';
}
function loyaltyRate(v) {
  return v.plays > 0 ? ((v.comments + v.shares) / v.plays * 100) : 0;
}

// 動態門檻：依自身資料的 30th / 70th 百分位數計算
var LOYALTY_HIGH, LOYALTY_LOW;
(function() {
  var rates = STATIC_DATA.videos
    .filter(function(v){ return v.plays > 0; })
    .map(function(v){ return loyaltyRate(v); })
    .sort(function(a,b){ return a-b; });
  if (rates.length < 5) { LOYALTY_HIGH = 3; LOYALTY_LOW = 1; return; }
  LOYALTY_HIGH = rates[Math.floor(rates.length * 0.7)];
  LOYALTY_LOW  = rates[Math.floor(rates.length * 0.3)];
})();

function loyaltyTier(v) {
  var r = loyaltyRate(v);
  return r >= LOYALTY_HIGH ? 'tier1' : r >= LOYALTY_LOW ? 'tier2' : 'tier3';
}
function tierLabel(lt) {
  return { tier1:'🟢 優質', tier2:'🟡 正常', tier3:'🔴 待優化' }[lt];
}
function tierExplain(lt) {
  var h = LOYALTY_HIGH != null ? LOYALTY_HIGH.toFixed(2) : '—';
  var l = LOYALTY_LOW  != null ? LOYALTY_LOW.toFixed(2)  : '—';
  return {
    tier1: '原粉互動率 ≥ ' + h + '%，高於頻道七成影片',
    tier2: '原粉互動率 ' + l + '–' + h + '%，屬頻道正常水準',
    tier3: '原粉互動率 < ' + l + '%，低於頻道三成影片，建議複盤'
  }[lt];
}

// 月比月變化（上月同期 = 上月 1 日到同天數為止）
function momBadge(pct) {
  var up = pct >= 0;
  return '<span style="display:inline-flex;align-items:center;font-size:12px;font-weight:900;padding:2px 7px;border-radius:4px;margin-left:4px;background:'
    + (up ? 'rgba(13,148,136,.15);color:#0d9488' : 'rgba(190,58,103,.12);color:#be3a67') + '">'
    + (up ? '▲ +' : '▼ ') + Math.abs(pct) + '%</span>';
}
function momStr(curr, prev, noDataLabel) {
  if (prev === 0) return noDataLabel || '尚無上月資料';
  var pct = Math.round((curr - prev) / prev * 100);
  return '上月同期 ' + fmtNum(prev) + momBadge(pct);
}
function momRateStr(currPct, prevPct) {
  if (prevPct === 0) return '尚無上月資料';
  var pct = Math.round((currPct - prevPct) / prevPct * 100);
  return '上月同期 ' + prevPct.toFixed(2) + '%' + momBadge(pct);
}

// 標題截斷（14字）
function truncTitle(s, len) {
  len = len || 14;
  if (!s) return '';
  return s.length > len ? s.slice(0, len) + '…' : s;
}
function escAttr(s) {
  return (s || '').replace(/&/g,'&amp;').replace(/"/g,'&quot;');
}

// ── 為何表現好 ────────────────────────────────────────────────────────────
function whyGood(v) {
  var reasons = [];
  var shareRate = v.plays ? v.shares/v.plays*100 : 0;
  var commentRate = v.plays ? v.comments/v.plays*100 : 0;
  var dev = reachDev(v);
  var completion = v.retention && v.retention.length > 0 ? v.retention[v.retention.length-1]*100 : 0;
  if (shareRate >= 2) reasons.push('轉發強（' + shareRate.toFixed(2) + '%）');
  else if (shareRate >= 1) reasons.push('轉發不錯（' + shareRate.toFixed(2) + '%）');
  if (commentRate >= 1.5) reasons.push('留言熱（' + commentRate.toFixed(2) + '%）');
  else if (commentRate >= 0.8) reasons.push('留言偏高（' + commentRate.toFixed(2) + '%）');
  if (dev >= 0.5) reasons.push('觸及遠超平均 +' + (dev*100).toFixed(0) + '%（演算法推爆）');
  else if (dev >= 0.2) reasons.push('觸及高於平均 +' + (dev*100).toFixed(0) + '%');
  if (completion >= 35) reasons.push('完播率佳（' + completion.toFixed(0) + '%）');
  if (reasons.length === 0) reasons.push('各項指標均衡穩健');
  return reasons.join('、');
}

// ── 排行第一名亮點解析 ────────────────────────────────────────────────────
function buildHighlight(v) {
  if (!v) return '';
  var lines = [];
  var shareRate = v.plays ? v.shares/v.plays*100 : 0;
  var commentRate = v.plays ? v.comments/v.plays*100 : 0;
  var dev = reachDev(v);
  var completion = v.retention && v.retention.length > 0 ? v.retention[v.retention.length-1]*100 : 0;
  var title = (v.description || v.caption || '').slice(0,40);
  lines.push('《' + title + (title.length >= 40 ? '…' : '') + '》拿到第一名的原因：');
  if (shareRate >= 1) lines.push('📤 轉發率 ' + shareRate.toFixed(2) + '% — 觀眾願意主動分享，話題性強');
  if (commentRate >= 0.8) lines.push('💬 留言率 ' + commentRate.toFixed(2) + '% — 觀眾有話說，互動熱度高');
  if (dev >= 0.2) lines.push('🚀 觸及超出均值 +' + (dev*100).toFixed(0) + '% — 演算法判斷優質並加大推播');
  if (completion >= 25) lines.push('⏱ 完播率 ' + completion.toFixed(0) + '% — 觀眾願意看到最後');
  if (lines.length === 1) lines.push('各項指標表現均衡，綜合評分最高');
  return lines.join('<br>');
}

// ── 續看率下降點分析 ──────────────────────────────────────────────────────
function retentionInsight(retention) {
  if (!retention || retention.length < 4) return '';
  var drops = [];
  for (var i = 1; i < retention.length; i++) {
    var drop = retention[i-1] - retention[i];
    if (drop > 0) drops.push({ i: i, drop: drop });
  }
  drops.sort(function(a, b) { return b.drop - a.drop; });
  var parts = [];
  if (drops.length > 0) {
    var pct = Math.round(drops[0].i / retention.length * 100);
    parts.push('最大流失點在 ' + pct + '% 進度');
  }
  var final = retention[retention.length-1] * 100;
  if (final < 15) parts.push('完播率 ' + final.toFixed(1) + '% 偏低，結尾可加強');
  else if (final >= 30) parts.push('完播率 ' + final.toFixed(1) + '% 佳，觀眾投入度高');
  return parts.length ? '💡 ' + parts.join('；') : '';
}

// ── Canvas 環形評分 ───────────────────────────────────────────────────────
function drawRing(canvas, score) {
  if (!canvas) return;
  var dpr = devicePixelRatio || 1;
  canvas.width = 58 * dpr; canvas.height = 58 * dpr;
  var ctx = canvas.getContext('2d');
  ctx.scale(dpr, dpr);
  var cx = 29, cy = 29, r = 24, lw = 5;
  var color = score >= 80 ? '#1a9e95' : score >= 65 ? '#9b2c7e' : '#be3a67';
  ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI * 2);
  ctx.strokeStyle = '#f0f0f0'; ctx.lineWidth = lw; ctx.stroke();
  if (score > 0) {
    ctx.beginPath();
    ctx.arc(cx, cy, r, -Math.PI / 2, -Math.PI / 2 + (score / 100) * Math.PI * 2);
    ctx.strokeStyle = color; ctx.lineWidth = lw; ctx.lineCap = 'round'; ctx.stroke();
  }
}

// ── 續看率條 ──────────────────────────────────────────────────────────────
function renderRetentionStrip(v) {
  var retention = v.retention;
  if (!retention || retention.length === 0) return '';
  var max = retention[0] || 1;
  var segs = retention.map(function(val) {
    var pct = (val / max * 100).toFixed(0);
    var alpha = (0.2 + (val / max) * 0.8).toFixed(2);
    return '<div class="ret-seg" style="height:' + Math.max(pct, 4) + '%;background:rgba(0,0,0,' + alpha + ')"></div>';
  }).join('');
  var last = retention[retention.length - 1];
  var insight = retentionInsight(retention);
  return '<div class="retention-strip">'
    + '<div class="retention-label">觀眾續看率曲線 · 完播率 ' + (last * 100).toFixed(1) + '%</div>'
    + '<div class="retention-bar">' + segs + '</div>'
    + (insight ? '<div class="retention-insight">' + insight + '</div>' : '')
    + '</div>';
}

// ── 影片卡 ────────────────────────────────────────────────────────────────
var THUMB_BG = ['#fde8f2','#e8f9f8','#fff8e1','#f3e5f5','#e8f5e9','#fce4ec','#e0f7fa'];
var THUMB_EM = ['💎','🔍','⛏','🌟','💚','💙','🤍'];

function renderVideoCard(v, idx) {
  var lt = loyaltyTier(v);
  var lr = loyaltyRate(v).toFixed(2);
  var dev = reachDev(v);
  var devPct = (dev * 100).toFixed(1);
  var devClass = dev >= 0.05 ? 'pos' : dev <= -0.05 ? 'neg' : 'neu';
  var devStr = (dev >= 0 ? '+' : '') + devPct + '%';
  var barColor = v.type === 'commerce' ? 'var(--pink)' : 'var(--teal)';
  var scoreColor = v.score >= 80 ? '#1a9e95' : v.score >= 65 ? 'var(--pink)' : 'var(--warn)';
  var shareBar   = v.plays ? Math.min(v.shares / v.plays / 0.03 * 100, 100).toFixed(0) : 0;
  var commentBar = v.plays ? Math.min(v.comments / v.plays / 0.02 * 100, 100).toFixed(0) : 0;
  var likeBar    = v.plays ? Math.min(v.likes / v.plays / 0.15 * 100, 100).toFixed(0) : 0;
  var watchSec   = v.avgWatchMs > 0 ? (v.avgWatchMs / 1000).toFixed(1) + 's' : '—';
  var vidLen     = v.length ? v.length.toFixed(0) + 's' : '—';
  var savedStr   = v.saved != null ? fmtNum(v.saved) : '—';
  var title      = v.description || v.caption || '(無標題)';
  var tl         = tierLabel(lt);
  var te         = tierExplain(lt);

  return '<div class="vcard' + (lt === 'tier3' ? ' tier3' : '') + '">'
    + '<div class="vcard-top">'
    + '<div class="vcard-thumb" style="background:' + THUMB_BG[idx % THUMB_BG.length] + '">' + THUMB_EM[idx % THUMB_EM.length] + '</div>'
    + '<div class="vcard-meta">'
    + '<div class="vcard-badges">'
    + '<span class="badge ' + v.type + '">' + (v.type === 'commerce' ? '🛍 帶貨型' : '📈 流量型') + '</span>'
    + '<span class="badge ' + v.platform + '">' + (v.platform === 'fb' ? '📘 FB' : '📸 IG') + '</span>'
    + '<span class="badge ' + lt + '">' + tl + '</span>'
    + '</div>'
    + '<div class="vcard-title" data-full="' + escAttr(title) + '">' + truncTitle(title) + '</div>'
    + '<div class="vcard-date">' + fmtDate(v.created_time) + ' 發布 · ' + vidLen + '</div>'
    + '</div>'
    + '<div class="score-ring"><canvas id="ring-' + idx + '"></canvas>'
    + '<div class="score-num"><strong style="color:' + scoreColor + '">' + v.score + '</strong><span>分</span></div>'
    + '</div></div>'
    + renderRetentionStrip(v)
    + '<div class="vcard-metrics">'
    + '<div><div class="metric-label">轉發率</div><div class="metric-val pink">' + (v.plays ? (v.shares/v.plays*100).toFixed(2)+'%' : '—') + '</div><div class="mbar"><div class="mbar-fill" style="width:' + shareBar + '%;background:var(--pink)"></div></div></div>'
    + '<div><div class="metric-label">留言率</div><div class="metric-val ' + (v.type==='commerce'?'pink':'teal') + '">' + (v.plays ? (v.comments/v.plays*100).toFixed(2)+'%' : '—') + '</div><div class="mbar"><div class="mbar-fill" style="width:' + commentBar + '%;background:' + barColor + '"></div></div></div>'
    + '<div><div class="metric-label">點讚率</div><div class="metric-val gold">' + (v.plays ? (v.likes/v.plays*100).toFixed(2)+'%' : '—') + '</div><div class="mbar"><div class="mbar-fill" style="width:' + likeBar + '%;background:var(--gold)"></div></div></div>'
    + '<div><div class="metric-label">播放</div><div class="metric-val">' + fmtNum(v.plays) + '</div></div>'
    + '<div><div class="metric-label">觸及偏離</div><div class="metric-val"><span class="devbadge ' + devClass + '">' + devStr + '</span></div></div>'
    + '<div><div class="metric-label">' + (v.platform === 'ig' ? '儲存' : '新粉') + '</div><div class="metric-val teal">' + (v.platform === 'ig' ? savedStr : ('+' + (v.newFollowers||0))) + '</div></div>'
    + '</div>'
    + '<div class="vcard-bottom">'
    + '<div style="flex:1"><div style="font-size:10px;color:var(--muted);margin-bottom:3px">原粉忠實度（留言＋轉發）÷ 播放</div>'
    + '<div class="loyalty-val ' + lt + '">' + lr + '% ' + tl + '</div>'
    + '<div class="tier-explain">' + te + '</div></div>'
    + '<div style="text-align:right"><div style="font-size:10px;color:var(--muted);margin-bottom:3px">平均觀看 / 影片長</div>'
    + '<div style="font-size:13px;font-weight:800">' + watchSec + ' / ' + vidLen + '</div></div>'
    + '</div></div>';
}

function togglePanel(id, btn) {
  var panel = document.getElementById(id);
  var open = panel.classList.toggle('open');
  btn.textContent = btn.textContent.replace(open ? '▾' : '▴', open ? '▴' : '▾');
}

// ── 總覽 ─────────────────────────────────────────────────────────────────
function initOverview() {
  var all  = STATIC_DATA.videos;
  var week = all.filter(function(v) { return daysBetween(v.created_time) <= 7; });

  // 爆流量警報（全部影片掃一遍）
  var virals = all.filter(isViral).sort(function(a, b) { return b.plays - a.plays; });
  renderViralSection(virals);

  // 月份邊界
  var now = new Date();
  var dayOfMonth = now.getDate();
  var thisMonthStart = new Date(now.getFullYear(), now.getMonth(), 1);
  var lastMonthStart = new Date(now.getFullYear(), now.getMonth() - 1, 1);
  var lastMonthSameEnd = new Date(now.getFullYear(), now.getMonth() - 1, dayOfMonth + 1); // 上月同天數截止

  var thisMonth = all.filter(function(v){ return new Date(v.created_time) >= thisMonthStart; });
  var lastMonthSame = all.filter(function(v){
    var d = new Date(v.created_time);
    return d >= lastMonthStart && d < lastMonthSameEnd;
  });

  var fbWeek = week.filter(function(v){ return v.platform==='fb'; });
  var igWeek = week.filter(function(v){ return v.platform==='ig'; });

  // KPI 1: 帶貨觸及
  var thisComPlays = thisMonth.filter(function(v){ return v.type==='commerce'; }).reduce(function(s,v){ return s+(v.plays||0); }, 0);
  var prevComPlays = lastMonthSame.filter(function(v){ return v.type==='commerce'; }).reduce(function(s,v){ return s+(v.plays||0); }, 0);

  // KPI 2: IG 儲存
  var thisIgSaves = thisMonth.filter(function(v){ return v.platform==='ig'; }).reduce(function(s,v){ return s+(v.saved||0); }, 0);
  var prevIgSaves = lastMonthSame.filter(function(v){ return v.platform==='ig'; }).reduce(function(s,v){ return s+(v.saved||0); }, 0);

  // KPI 3: 帶貨留言率（本月 vs 上月同期）
  var thisCom = thisMonth.filter(function(v){ return v.type==='commerce' && v.plays>0; });
  var prevCom = lastMonthSame.filter(function(v){ return v.type==='commerce' && v.plays>0; });
  var comCR = thisCom.length
    ? thisCom.reduce(function(s,v){ return s+(v.comments||0); },0) / thisCom.reduce(function(s,v){ return s+(v.plays||0); },0) * 100 : 0;
  var prevComCR = prevCom.length
    ? prevCom.reduce(function(s,v){ return s+(v.comments||0); },0) / prevCom.reduce(function(s,v){ return s+(v.plays||0); },0) * 100 : 0;

  // KPI 4: FB 新增粉絲
  var thisFbNewF    = thisMonth.filter(function(v){ return v.platform==='fb'; }).reduce(function(s,v){ return s+(v.newFollowers||0); }, 0);
  var prevFbNewF    = lastMonthSame.filter(function(v){ return v.platform==='fb'; }).reduce(function(s,v){ return s+(v.newFollowers||0); }, 0);
  var prevFbCount   = lastMonthSame.filter(function(v){ return v.platform==='fb'; }).length;

  document.getElementById('kpiGrid').innerHTML = [
    kpiCard('🛍 賣貨影片播放', fmtNum(thisComPlays),
      momStr(thisComPlays, prevComPlays) + '<br><span style="font-size:10px;color:var(--muted)">賣貨類影片本月累計被看到幾次</span>',
      thisComPlays >= prevComPlays ? 'var(--teal)' : 'var(--warn)'),
    kpiCard('🔖 IG 收藏數', fmtNum(thisIgSaves),
      momStr(thisIgSaves, prevIgSaves) + '<br><span style="font-size:10px;color:var(--muted)">觀眾把影片存下來（想買的信號）</span>',
      thisIgSaves >= prevIgSaves ? 'var(--teal)' : 'var(--warn)'),
    kpiCard('💬 賣貨留言率', comCR.toFixed(2) + '%',
      momRateStr(comCR, prevComCR) + '<br><span style="font-size:10px;color:var(--muted)">每 100 次播放有幾人留言詢問</span>',
      comCR >= prevComCR ? 'var(--teal)' : 'var(--warn)'),
    kpiCard('👥 FB 新增粉絲', '+' + thisFbNewF,
      momStr(thisFbNewF, prevFbNewF, prevFbCount === 0 ? 'FB 本月首次記錄' : '尚無上月資料')
        + '<br><span style="font-size:10px;color:var(--muted)">本月新追蹤 FB 粉絲頁的人數</span>',
      prevFbCount > 0 ? (thisFbNewF >= prevFbNewF ? 'var(--teal)' : 'var(--warn)') : 'var(--gold)'),
  ].join('');

  // 供下方 platGrid / perfDist 使用
  var fbAvg = fbWeek.length ? Math.round(fbWeek.reduce(function(s,v){return s+v.score;},0)/fbWeek.length) : 0;
  var igAvg = igWeek.length ? Math.round(igWeek.reduce(function(s,v){return s+v.score;},0)/igWeek.length) : 0;

  var sorted = week.slice().sort(function(a,b){return b.score-a.score;}).slice(0,3);
  var rankCls   = ['gold-r','silver-r','bronze-r'];
  var rankNames = ['第 1 名','第 2 名','第 3 名'];
  if (sorted.length === 0) {
    document.getElementById('top3Grid').innerHTML = '<div class="state-box" style="grid-column:1/-1"><div class="state-icon">📭</div><h3>本週暫無影片</h3></div>';
  } else {
    document.getElementById('top3Grid').innerHTML = sorted.map(function(v, i) {
      var scoreColor = v.score >= 80 ? 'var(--teal)' : v.score >= 65 ? 'var(--pink)' : 'var(--warn)';
      var platBadge = v.platform === 'fb'
        ? '<span class="mini-plat-badge badge fb">📘 FB</span>'
        : '<span class="mini-plat-badge badge ig">📸 IG</span>';
      return '<div class="mini-card">'
        + '<div class="mini-card-rank"><span class="mini-rank-num ' + rankCls[i] + '">' + (i+1) + '</span>'
        + rankNames[i] + platBadge + '</div>'
        + '<div class="mini-card-title">' + truncTitle(v.description || v.caption || '', 28) + '</div>'
        + '<div class="mini-score" style="color:' + scoreColor + '">' + v.score
        + '<span style="font-size:14px;font-weight:400;color:var(--muted)"> 分</span></div>'
        + '<div class="mini-card-stats">'
        + '<span><div class="ms-label">播放</div><div class="ms-val">' + fmtNum(v.plays) + '</div></span>'
        + '<span><div class="ms-label">轉發率</div><div class="ms-val">' + (v.plays?(v.shares/v.plays*100).toFixed(2)+'%':'—') + '</div></span>'
        + '<span><div class="ms-label">留言率</div><div class="ms-val">' + (v.plays?(v.comments/v.plays*100).toFixed(2)+'%':'—') + '</div></span>'
        + '</div>'
        + '<div class="mini-card-why">' + whyGood(v) + '</div>'
        + '</div>';
    }).join('');
  }

  var fbPlays = fbWeek.reduce(function(s,v){return s+(v.plays||0);},0);
  var igPlays = igWeek.reduce(function(s,v){return s+(v.plays||0);},0);
  var fbGood  = fbWeek.filter(function(v){return loyaltyTier(v)==='tier1';}).length;
  var igGood  = igWeek.filter(function(v){return loyaltyTier(v)==='tier1';}).length;
  document.getElementById('platGrid').innerHTML =
    platCard('📘','Facebook',fbWeek.length,fbAvg,fbPlays,fbGood) +
    platCard('📸','Instagram',igWeek.length,igAvg,igPlays,igGood);

  var t1 = week.filter(function(v){return loyaltyTier(v)==='tier1';}).length;
  var t2 = week.filter(function(v){return loyaltyTier(v)==='tier2';}).length;
  var t3 = week.filter(function(v){return loyaltyTier(v)==='tier3';}).length;
  var tot = week.length || 1;
  var lh = LOYALTY_HIGH != null ? LOYALTY_HIGH.toFixed(2) : '—';
  var ll = LOYALTY_LOW  != null ? LOYALTY_LOW.toFixed(2)  : '—';
  var t1vids = week.filter(function(v){return loyaltyTier(v)==='tier1';});
  var t2vids = week.filter(function(v){return loyaltyTier(v)==='tier2';});
  var t3vids = week.filter(function(v){return loyaltyTier(v)==='tier3';});
  document.getElementById('perfDist').innerHTML =
    '<div class="perf-dist-title">共 ' + week.length + ' 支影片的忠實度分佈（點按鈕查看明細）</div>'
    + '<div class="perf-dist-rows">'
    + perfDistRow('#1a9e95','🟢 優質',t1,tot,'互動率 ≥ ' + lh + '%',t1vids,'panel-t1')
    + perfDistRow('#b5924e','🟡 正常',t2,tot,'互動率 ' + ll + '–' + lh + '%',t2vids,'panel-t2')
    + perfDistRow('#be3a67','🔴 待優化',t3,tot,'互動率 < ' + ll + '%',t3vids,'panel-t3')
    + '</div>';
}

function kpiCard(label, val, sub, accent) {
  return '<div class="kpi-card">'
    + '<div class="kpi-label">' + label + '</div>'
    + '<div class="kpi-val">' + val + '</div>'
    + '<div class="kpi-sub" style="line-height:1.8">' + sub + '</div>'
    + '<div class="kpi-accent" style="background:' + accent + '"></div>'
    + '</div>';
}

function platCard(icon, name, count, avgSc, plays, goodCnt) {
  return '<div class="plat-card">'
    + '<div class="plat-head"><span class="plat-icon">' + icon + '</span>'
    + '<span class="plat-name">' + name + '</span>'
    + '<span class="plat-count">' + count + ' 支</span></div>'
    + '<div class="plat-stat-grid">'
    + '<div class="plat-stat"><div class="plat-stat-label">平均評分</div><div class="plat-stat-val">' + (count ? avgSc : '—') + '</div></div>'
    + '<div class="plat-stat"><div class="plat-stat-label">本週播放</div><div class="plat-stat-val">' + fmtNum(plays) + '</div></div>'
    + '<div class="plat-stat"><div class="plat-stat-label">優質影片</div><div class="plat-stat-val" style="color:var(--teal)">' + goodCnt + ' 支</div></div>'
    + '<div class="plat-stat"><div class="plat-stat-label">優質率</div><div class="plat-stat-val">' + (count ? Math.round(goodCnt/count*100) : '—') + '%</div></div>'
    + '</div></div>';
}

function sitTag(v) {
  var dev = reachDev(v);
  var lt  = loyaltyTier(v);
  if (lt === 'tier3' && dev >= -0.1)  return '<span class="sit-tag sit-no-engage">有流量沒互動</span>';
  if (lt === 'tier3' && dev < -0.1)   return '<span class="sit-tag sit-both-low">低流量低互動</span>';
  if (lt !== 'tier3' && dev < -0.3)   return '<span class="sit-tag sit-no-reach">低流量高互動</span>';
  return '';
}
var TIER_ADVICE = {
  tier1: '<div class="tier-advice" style="border-color:#1a9e95">✅ <strong>複製這類腳本</strong>：粉絲黏度高，這種主題/形式是你的強項。考慮同系列再拍，或直接重新剪輯投廣。</div>',
  tier2: '<div class="tier-advice">📌 <strong>觀察趨勢即可</strong>：屬於頻道正常水準，不需要特別優化，持續產出保持節奏。</div>',
  tier3: '<div class="tier-advice" style="border-color:var(--warn)">'
    + '⚡ <strong>有流量沒互動</strong>：演算法有在推，但觀眾看完就走。→ 結尾加互動問句（「你覺得呢？留言告訴我」），或在影片中加入更明確的購買 CTA。<br>'
    + '🚫 <strong>低流量低互動</strong>：這類主題客人不買單。→ 分析共同特徵（見低效分析頁），這類選題要少拍或完全換方向。<br>'
    + '💎 <strong>低流量高互動</strong>：鐵粉很喜歡但演算法沒推。→ 換個封面/標題重新發，或考慮小額投廣，這種片值得復活。'
    + '</div>',
};
function perfDistRow(color, label, count, total, desc, videos, panelId) {
  var pct = Math.round(count / total * 100);
  var tier = panelId === 'panel-t1' ? 'tier1' : panelId === 'panel-t2' ? 'tier2' : 'tier3';
  var panelRows = videos.slice().sort(function(a,b){ return b.plays-a.plays; }).map(function(v) {
    var lr = loyaltyRate(v).toFixed(2);
    var platLabel = v.platform === 'fb' ? '📘FB' : '📸IG';
    return '<div class="perf-panel-row">'
      + '<div style="color:var(--muted)">' + fmtDate(v.created_time) + '</div>'
      + '<div class="perf-panel-title" title="' + escAttr(v.description||v.caption||'') + '">' + truncTitle(v.description||v.caption||'') + sitTag(v) + '</div>'
      + '<div>' + platLabel + '</div>'
      + '<div style="font-weight:800">' + fmtNum(v.plays) + '</div>'
      + '<div style="font-weight:800">' + lr + '%</div>'
      + '</div>';
  }).join('');
  return '<div style="margin-bottom:4px">'
    + '<div class="perf-dist-row">'
    + '<div class="perf-dot" style="background:' + color + '"></div>'
    + '<div class="perf-label">' + label + '</div>'
    + '<div class="perf-bar-wrap"><div class="perf-bar-fill" style="width:' + pct + '%;background:' + color + '"></div></div>'
    + '<div class="perf-count">' + count + '</div>'
    + '<div class="perf-desc">' + desc + '</div>'
    + '<button class="perf-toggle" onclick="togglePanel(\'' + panelId + '\',this)">' + count + ' 支 ▾</button>'
    + '</div>'
    + '<div class="perf-panel" id="' + panelId + '">'
    + (TIER_ADVICE[tier] || '')
    + '<div class="perf-panel-row perf-panel-head"><div>日期</div><div>影片標題</div><div>平台</div><div>播放</div><div>互動率</div></div>'
    + (panelRows || '<div style="padding:12px;text-align:center;color:var(--muted);font-size:12px">本週無此類影片</div>')
    + '</div>'
    + '</div>';
}

function initDetail() {

// ── 排行榜 ────────────────────────────────────────────────────────────────
function renderTop10() {
  var platF = document.getElementById('platFilter').value;
  var days  = Number(activePeriod);
  var data  = STATIC_DATA.videos.filter(function(v) { return v.type === currentTop20Type; });
  if (platF !== 'all') data = data.filter(function(v) { return v.platform === platF; });
  data = data.filter(function(v) { return daysBetween(v.created_time) <= days; });
  data.sort(function(a, b) { return b.score - a.score; });
  var top10 = data.slice(0, 10);

  var insightBox = document.getElementById('insightBox');
  if (top10.length > 0) {
    insightBox.classList.remove('hidden');
    document.getElementById('insightBody').innerHTML = buildHighlight(top10[0]);
  } else {
    insightBox.classList.add('hidden');
  }

  if (top10.length === 0) {
    document.getElementById('rankingTable').innerHTML = '<div class="loading-row">暫無符合條件的影片</div>';
    return;
  }

  var rankClass  = function(i) { return i===0?'gold-r':i===1?'silver-r':i===2?'bronze-r':''; };
  var scoreClass = currentTop20Type === 'traffic' ? 't-score' : 'c-score';
  var colHeaders = currentTop20Type === 'traffic'
    ? ['#','影片','評分','播放','轉發率','留言率','觸及偏離','']
    : ['#','影片','評分','播放','留言率','觸及偏離','儲存/新粉',''];

  var rows = top10.map(function(v, i) {
    var dev     = reachDev(v);
    var devPct  = (dev >= 0 ? '+' : '') + (dev * 100).toFixed(1) + '%';
    var devColor = dev >= 0.05 ? '#1a9e95' : dev <= -0.05 ? 'var(--warn)' : '#7a6428';
    var daysOld = daysBetween(v.created_time);
    var extra   = v.platform === 'ig' ? fmtNum(v.saved || 0) : '+' + (v.newFollowers || 0);
    var title   = v.description || v.caption || '';
    var viralBadge = isViral(v) ? '<span class="viral-badge">🚀 爆</span>' : '';
    var cols;
    if (currentTop20Type === 'traffic') {
      cols = [
        '<div class="rt-rank ' + rankClass(i) + '">' + (i+1) + '</div>',
        '<div><div class="rt-title" data-full="' + escAttr(title) + '">' + truncTitle(title) + viralBadge + '</div><div class="rt-date">' + daysOld + '天前 · ' + v.platform.toUpperCase() + '</div></div>',
        '<div class="rt-score ' + scoreClass + '">' + v.score + '</div>',
        '<div class="rt-num">' + fmtNum(v.plays||0) + '</div>',
        '<div class="rt-num">' + (v.plays?(v.shares/v.plays*100).toFixed(2)+'%':'—') + '</div>',
        '<div class="rt-num">' + (v.plays?(v.comments/v.plays*100).toFixed(2)+'%':'—') + '</div>',
        '<div class="rt-num" style="color:' + devColor + '">' + devPct + '</div>',
        '<div>' + (daysOld>=30&&daysOld<=150?'<span class="reuse-badge">♻ 復投</span>':'') + '</div>',
      ];
    } else {
      cols = [
        '<div class="rt-rank ' + rankClass(i) + '">' + (i+1) + '</div>',
        '<div><div class="rt-title" data-full="' + escAttr(title) + '">' + truncTitle(title) + viralBadge + '</div><div class="rt-date">' + daysOld + '天前 · ' + v.platform.toUpperCase() + '</div></div>',
        '<div class="rt-score ' + scoreClass + '">' + v.score + '</div>',
        '<div class="rt-num">' + fmtNum(v.plays||0) + '</div>',
        '<div class="rt-num">' + (v.plays?(v.comments/v.plays*100).toFixed(2)+'%':'—') + '</div>',
        '<div class="rt-num" style="color:' + devColor + '">' + devPct + '</div>',
        '<div class="rt-num">' + extra + '</div>',
        '<div>' + (daysOld>=30&&daysOld<=150?'<span class="reuse-badge">♻ 復投</span>':'') + '</div>',
      ];
    }
    return '<div class="rt-row">' + cols.join('') + '</div>';
  }).join('');

  document.getElementById('rankingTable').innerHTML =
    '<div class="rt-head">' + colHeaders.map(function(c) { return '<div>' + c + '</div>'; }).join('') + '</div>'
    + rows;
}

function setPeriod(p, el) {
  activePeriod = p;

}

  renderTop10();
}

// ── 低效分析 ──────────────────────────────────────────────────────────────
function initWaste() {
  var all = STATIC_DATA.videos.filter(function(v){ return (v.plays||0) > 0; });
  // 爛片 = 低互動 + 低觸及（低流量低互動）
  var bad = all.filter(function(v){
    return loyaltyTier(v) === 'tier3' && reachDev(v) < -0.1;
  }).sort(function(a,b){ return a.score - b.score; });

  // 有流量沒互動（另一類需關注）
  var noEngage = all.filter(function(v){
    return loyaltyTier(v) === 'tier3' && reachDev(v) >= -0.1;
  }).sort(function(a,b){ return a.score - b.score; });

  // 低流量高互動（潛力片）
  var hidden = all.filter(function(v){
    return loyaltyTier(v) !== 'tier3' && reachDev(v) < -0.3;
  }).sort(function(a,b){ return b.plays - a.plays; });

  // 關鍵詞分析（從爛片標題取高頻詞）
  var stopWords = '的了是在我你他她它這那就都也很到說要去好不大沒來可會但和與及而或所如為上下中之以被得著過嗎呢啊喔哦吧呀一個有人片影片我們泰熙爾札娜IP'.split('');
  var wordCount = {};
  bad.slice(0,20).forEach(function(v){
    var text = (v.description || v.caption || '').replace(/[！？，。、「」【】\n\r!?,.]/g,' ');
    text.split(/\s+/).forEach(function(w){
      w = w.trim();
      if (w.length < 2) return;
      if (w.charAt(0) === '#') return;  // 排除 hashtag
      var isStop = stopWords.some(function(s){ return w === s; });
      if (isStop) return;
      wordCount[w] = (wordCount[w]||0) + 1;
    });
  });
  var topWords = Object.keys(wordCount).filter(function(w){ return wordCount[w] >= 2; })
    .sort(function(a,b){ return wordCount[b]-wordCount[a]; }).slice(0,12);

  var badComRate = bad.length ? Math.round(bad.filter(function(v){return v.type==='commerce';}).length/bad.length*100) : 0;
  var badFbRate  = bad.length ? Math.round(bad.filter(function(v){return v.platform==='fb';}).length/bad.length*100) : 0;
  var avgBadPlays = bad.length ? Math.round(bad.reduce(function(s,v){return s+(v.plays||0);},0)/bad.length) : 0;
  var medAll = (function(){
    var ps = all.map(function(v){return v.plays||0;}).sort(function(a,b){return a-b;});
    return ps.length ? ps[Math.floor(ps.length/2)] : 1;
  })();

  function badRow(v,i){
    var dev = reachDev(v); var devStr = (dev>=0?'+':'')+(dev*100).toFixed(0)+'%';
    var lr = loyaltyRate(v).toFixed(2);
    var title = v.description||v.caption||'';
    return '<div class="perf-panel-row" style="background:'+(i%2?'var(--off)':'')+';">'
      +'<div style="color:var(--muted)">'+(i+1)+'</div>'
      +'<div class="rt-title" data-full="'+escAttr(title)+'">'+truncTitle(title,14)+'</div>'
      +'<div style="font-weight:800">'+fmtNum(v.plays||0)+'</div>'
      +'<div style="color:var(--warn);font-weight:800">'+lr+'%</div>'
      +'<div style="color:var(--warn);font-size:11px">觸及 '+devStr+'</div>'
      +'</div>';
  }

  var html = '';

  // 區塊 1：爛片排行
  html += '<div class="slabel" style="margin-bottom:8px">🚫 低流量低互動 · 建議減少拍攝的主題（'+bad.length+' 支）</div>'
    +'<div class="perf-panel open" style="max-height:none;overflow:visible;margin-bottom:16px">'
    +'<div class="perf-panel-row perf-panel-head"><div>#</div><div>影片</div><div>播放</div><div>互動率</div><div>觸及</div></div>'
    +(bad.slice(0,10).map(badRow).join('') || '<div style="padding:12px;text-align:center;color:var(--muted)">暫無符合條件影片</div>')
    +'</div>';

  // 區塊 2：有流量沒互動
  if (noEngage.length) {
    html += '<div class="insight-box" style="border-color:rgba(251,146,60,.4);margin-bottom:14px">'
      +'<div class="insight-title" style="color:#c2580a">⚡ 有流量沒互動（'+noEngage.length+' 支）· 有機會翻身</div>'
      +'<div style="font-size:12px;line-height:1.7">演算法有在推，但觀眾看完就走。<strong>行動</strong>：①結尾加互動問句 ②加強 CTA「留言+1 領取」 ③前 3 秒鉤子要更強</div>'
      +'<div class="perf-panel open" style="max-height:none;overflow:visible;margin-top:10px">'
      +'<div class="perf-panel-row perf-panel-head"><div>#</div><div>影片</div><div>播放</div><div>互動率</div><div>觸及</div></div>'
      +noEngage.slice(0,5).map(badRow).join('')
      +'</div></div>';
  }

  // 區塊 3：潛力片
  if (hidden.length) {
    html += '<div class="insight-box" style="border-color:rgba(99,102,241,.3);margin-bottom:14px">'
      +'<div class="insight-title" style="color:#4f46e5">💎 低流量高互動（'+hidden.length+' 支）· 鐵粉喜歡但沒被推</div>'
      +'<div style="font-size:12px;line-height:1.7"><strong>行動</strong>：①換封面／標題重新發布 ②這類腳本值得重拍或複製 ③小額投廣測試看看</div>'
      +'<div class="perf-panel open" style="max-height:none;overflow:visible;margin-top:10px">'
      +'<div class="perf-panel-row perf-panel-head"><div>#</div><div>影片</div><div>播放</div><div>互動率</div><div>觸及</div></div>'
      +hidden.slice(0,5).map(badRow).join('')
      +'</div></div>';
  }

  document.getElementById('wasteContent').innerHTML = html;
}

// ── Tab 切換 ──────────────────────────────────────────────────────────────
var initiated = { overview: false, top20: false, detail: false, waste: false };

function switchTab(id, el) {
  document.querySelectorAll('.section').forEach(function(s) { s.classList.remove('active'); });
  document.querySelectorAll('.tab').forEach(function(t) { t.classList.remove('active'); });
  document.getElementById('sec-' + id).classList.add('active');
  el.classList.add('active');
  if (!initiated[id]) {
    initiated[id] = true;
    if (id === 'overview') initOverview();
    if (id === 'top20') renderTop10();
    if (id === 'detail') initDetail();
    if (id === 'waste') initWaste();
  }
}

function mobileSwitchTab(id, el) {
  var tabMap = { overview: 0, top20: 1, detail: 2, waste: 3 };
  var tabs = document.querySelectorAll('.tab');
  if (tabs[tabMap[id]]) tabs[tabMap[id]].click();
  document.querySelectorAll('.mob-tab').forEach(function(t) { t.classList.remove('active'); });
  el.classList.add('active');
}

// ── 標題點擊展開 ──────────────────────────────────────────────────────────
document.addEventListener('click', function(e) {
  var el = e.target;
  if (el.classList.contains('vcard-title') || el.classList.contains('rt-title')) {
    var full = el.dataset.full || el.textContent;
    if (el.classList.contains('expanded')) {
      el.textContent = truncTitle(full);
      el.classList.remove('expanded');
    } else {
      el.textContent = full;
      el.classList.add('expanded');
    }
  }
});

// ── 初始化 ────────────────────────────────────────────────────────────────
window.addEventListener('DOMContentLoaded', function() {
  function updateClock() {
    var now = new Date();
    var pad = function(n) { return n < 10 ? '0' + n : '' + n; };
    var s = now.getFullYear() + '-' + pad(now.getMonth()+1) + '-' + pad(now.getDate())
          + ' ' + pad(now.getHours()) + ':' + pad(now.getMinutes()) + ':' + pad(now.getSeconds());
    document.getElementById('snapshotBadge').textContent = '🕐 ' + s;
  }
  updateClock();
  setInterval(updateClock, 1000);
  initiated.overview = true;
  initOverview();
});
</script>
</body>
</html>
